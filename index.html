<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PVOC二級遊樂船考試準備</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f0;--card:#fff;--primary:#1a5276;--primary-light:#2980b9;--success:#27ae60;--danger:#c0392b;--warn:#f39c12;--text:#2c3e50;--text-light:#7f8c8d;--border:#dce1e6;--shadow:0 2px 8px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header h1{font-size:18px;font-weight:700}
.lang-switch{display:flex;gap:4px}
.lang-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer}
.lang-btn.active{background:#fff;color:var(--primary);font-weight:600}
.progress-bar{height:4px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--success);transition:width .3s}
.stats{display:flex;gap:12px;margin-top:8px;font-size:12px;opacity:.9}
.page{display:none;padding:16px;max-width:640px;margin:0 auto}.page.active{display:block}
.menu-card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--primary)}
.menu-card h3{font-size:16px;margin-bottom:4px}.menu-card p{font-size:13px;color:var(--text-light)}.menu-card .count{float:right;font-size:13px;color:var(--primary);font-weight:600}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.mode-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer}
.mode-btn h3{font-size:15px;margin-bottom:4px}.mode-btn p{font-size:12px;color:var(--text-light)}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;color:var(--text-light)}
.q-chapter{background:var(--primary);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px}
.q-body{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:12px}
.q-text{font-size:16px;font-weight:500;line-height:1.7;margin-bottom:12px}
.q-image{max-width:100%;border-radius:8px;border:1px solid var(--border);margin:12px auto;display:block}
.q-image-container{text-align:center;margin:12px 0}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.option{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:15px;user-select:none;-webkit-tap-highlight-color:transparent}
.option:active{transform:scale(.98)}
.option .letter{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.option.selected{border-color:var(--primary);background:#eaf2f8}.option.selected .letter{background:var(--primary);color:#fff;border-color:var(--primary)}
.option.correct{border-color:var(--success);background:#eafaf1}.option.correct .letter{background:var(--success);color:#fff;border-color:var(--success)}
.option.wrong{border-color:var(--danger);background:#fdedec}.option.wrong .letter{background:var(--danger);color:#fff;border-color:var(--danger)}
.option.disabled{pointer-events:none;opacity:.7}
.explanation{background:#fef9e7;border:1px solid #f9e79f;border-radius:10px;padding:16px;margin-bottom:16px;font-size:14px;line-height:1.7;display:none}.explanation.show{display:block}
.explanation .label{font-weight:700;color:var(--warn);margin-bottom:4px}
.nav-bar{display:flex;gap:8px;margin-bottom:20px}
.nav-btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.nav-btn.prev{background:var(--card);border:2px solid var(--border);color:var(--text)}.nav-btn.next{background:var(--primary);color:#fff}.nav-btn:disabled{opacity:.4;cursor:default}
.result-card{background:var(--card);border-radius:16px;padding:24px;text-align:center;box-shadow:var(--shadow);margin-bottom:16px}
.result-score{font-size:48px;font-weight:800;margin:12px 0}.result-score.pass{color:var(--success)}.result-score.fail{color:var(--danger)}
.result-bar{height:12px;background:#eee;border-radius:6px;overflow:hidden;margin:12px 0}.result-bar-fill{height:100%;border-radius:6px;transition:width .5s}
.result-detail{display:flex;justify-content:center;gap:24px;margin-top:16px;font-size:14px}
.result-detail .correct{color:var(--success);font-weight:700}.result-detail .wrong{color:var(--danger);font-weight:700}
.review-item{background:var(--card);border-radius:10px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--danger)}
.review-item .q-num{font-weight:700;font-size:13px;color:var(--text-light)}.review-item .q-preview{font-size:14px;margin-top:4px}
.bottom-spacer{height:80px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a2e;--card:#16213e;--text:#eaeaea;--text-light:#a0a0b0;--border:#2a2a4a;--shadow:0 2px 8px rgba(0,0,0,.3)}.option.selected{background:#1a3a5c}.option.correct{background:#1a3c2a}.option.wrong{background:#3c1a1a}.explanation{background:#2a2a1e;border-color:#4a4a2e}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <h1 id="pageTitle">🚢 二級遊樂船考試準備</h1>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('zh-CN')">简体</button>
      <button class="lang-btn" onclick="setLang('zh-TW')">繁體</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="stats" id="statsBar"></div>
</div>
<div class="page active" id="menuPage">
  <div class="mode-grid">
    <div class="mode-btn" onclick="startMode('practice')" style="border-color:var(--primary)"><h3 id="btnPractice">📝 章節練習</h3><p id="btnPracticeDesc">按章節學習</p></div>
    <div class="mode-btn" onclick="startMode('exam')" style="border-color:var(--danger)"><h3 id="btnExam">📋 模擬考試</h3><p id="btnExamDesc">40題/45分鐘/60%合格</p></div>
  </div>
  <h3 style="margin:16px 0 8px" id="chapterTitle">選擇章節</h3>
  <div id="chapterList"></div>
</div>
<div class="page" id="questionPage">
  <div class="q-header"><span><span id="qNum">1</span> / <span id="qTotal">40</span></span><span class="q-chapter" id="qChapter"></span></div>
  <div class="q-body">
    <div class="q-text" id="qText"></div>
    <div class="q-image-container" id="qImageContainer" style="display:none"><img class="q-image" id="qImage" src="" alt="題目圖片"></div>
  </div>
  <div class="options" id="optionsContainer"></div>
  <div class="explanation" id="explanation"><div class="label" id="explainLabel">📖 解析</div><div id="explainText"></div></div>
  <div class="nav-bar"><button class="nav-btn prev" id="btnPrev" onclick="prevQ()">← 上一題</button><button class="nav-btn next" id="btnNext" onclick="nextQ()">下一題 →</button></div>
</div>
<div id="timerBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--border);padding:12px 20px;text-align:center;font-size:15px;font-weight:600;z-index:100">⏱️ <span id="timerDisplay">45:00</span></div>
<div class="page" id="resultPage">
  <div class="result-card"><div style="font-size:14px;color:var(--text-light)" id="resultTitle"></div><div class="result-score" id="resultScore">0%</div><div class="result-bar"><div class="result-bar-fill" id="resultBarFill" style="width:0%"></div></div><div style="font-size:14px;color:var(--text-light)" id="resultMsg"></div><div class="result-detail"><span>✅ <span class="correct" id="resultCorrect">0</span></span><span>❌ <span class="wrong" id="resultWrong">0</span></span></div></div>
  <h3 style="margin:16px 0 8px" id="reviewTitle"></h3><div id="reviewList"></div>
  <div class="nav-bar" style="margin-top:16px"><button class="nav-btn prev" onclick="goMenu()">🏠</button><button class="nav-btn next" onclick="retryWrong()">🔄</button></div>
</div>
<div class="bottom-spacer"></div>

let currentQuestions=[],currentIndex=0,answers={},mode='practice',timerInterval=null,timeLeft=0,locked=false;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('timerBar').style.display=id==='questionPage'&&mode==='exam'?'block':'none'}
const CH_NAMES={'zh-CN':{ch1:'船舶特性',ch2:'锚泊',ch3:'安全检查',ch4:'海图作业',ch5:'本地知识',ch6:'避碰规则',ch7:'安全设备',ch8:'VHF通讯',ch9:'紧急应变',ch10:'轮机知识'},'zh-TW':{ch1:'船舶特性',ch2:'錨泊',ch3:'安全檢查',ch4:'海圖作業',ch5:'本地知識',ch6:'避碰規則',ch7:'安全設備',ch8:'VHF通訊',ch9:'緊急應變',ch10:'輪機知識'},'en':{ch1:'Vessel',ch2:'Anchor',ch3:'Safety',ch4:'Chart',ch5:'Local',ch6:'COLREGS',ch7:'Equipment',ch8:'VHF',ch9:'Emergency',ch10:'Engine'}};
function getChapterName(ch){return(CH_NAMES[lang]&&CH_NAMES[lang][ch])||ch}
function renderMenu(){const cl=document.getElementById('chapterList');const ch={};allQuestions.forEach(q=>{if(!ch[q.ch])ch[q.ch]=0;ch[q.ch]++});let h=`<div class="menu-card" onclick="startPractice(null)" style="border-left-color:var(--success)"><h3>${t('allQ')} <span class="count">${allQuestions.length}</span></h3><p>${t('allQDesc')}</p></div>`;Object.entries(ch).sort().forEach(([c,n])=>{h+=`<div class="menu-card" onclick="startPractice('${c}')"><h3>${getChapterName(c)} <span class="count">${n}</span></h3></div>`});cl.innerHTML=h}
function startMode(m){mode=m;if(m==='exam'){if(!confirm(t('examWarning')))return;currentQuestions=shuffle(allQuestions).slice(0,40);answers={};currentIndex=0;startTimer(45*60);showQuestion();showPage('questionPage')}else{renderMenu();showPage('menuPage')}}
function startPractice(ch){mode='practice';currentQuestions=ch?allQuestions.filter(q=>q.ch===ch):shuffle(allQuestions);if(!ch)currentQuestions=currentQuestions.slice(0,50);answers={};currentIndex=0;showQuestion();showPage('questionPage')}
function showQuestion(){locked=false;const q=currentQuestions[currentIndex];document.getElementById('qNum').textContent=currentIndex+1;document.getElementById('qTotal').textContent=currentQuestions.length;document.getElementById('qChapter').textContent=getChapterName(q.ch);document.getElementById('qText').textContent=q.q[lang]||q.q['zh-CN'];const ic=document.getElementById('qImageContainer');if(q.img){ic.style.display='block';document.getElementById('qImage').src='images/'+q.img}else{ic.style.display='none'}const oc=document.getElementById('optionsContainer');const L=['A','B','C','D'];let h='';q.o.forEach((o,i)=>{const sel=answers[currentIndex]===i;const ans=answers[currentIndex]!==undefined;const cor=i===q.a;let cls='option';if(ans){cls+=' disabled';if(sel&&cor)cls+=' correct';else if(sel&&!cor)cls+=' wrong';else if(cor)cls+=' correct'}h+=`<div class="${cls}" onclick="selectOption(${i})"><span class="letter">${L[i]}</span><span>${o[lang]||o['zh-CN']}</span></div>`});oc.innerHTML=h;const exp=document.getElementById('explanation');if(answers[currentIndex]!==undefined&&q.exp){exp.classList.add('show');document.getElementById('explainText').textContent=q.exp[lang]||q.exp['zh-CN']}else{exp.classList.remove('show')}document.getElementById('btnPrev').disabled=currentIndex===0;const bn=document.getElementById('btnNext');if(currentIndex===currentQuestions.length-1&&answers[currentIndex]!==undefined){bn.textContent=t('submit');bn.onclick=()=>finishQuiz()}else{bn.textContent=t('next');bn.onclick=()=>nextQ()}bn.disabled=answers[currentIndex]===undefined;const a=Object.keys(answers).length;document.getElementById('progressFill').style.width=(a/currentQuestions.length*100)+'%';document.getElementById('statsBar').textContent=`${t('correct')}:${Object.entries(answers).filter(([i,a])=>currentQuestions[parseInt(i)].a===a).length} | ${t('wrong')}:${Object.entries(answers).filter(([i,a])=>currentQuestions[parseInt(i)].a!==a).length}`}
function selectOption(i){if(locked||answers[currentIndex]!==undefined)return;locked=true;answers[currentIndex]=i;showQuestion()}
function nextQ(){if(currentIndex<currentQuestions.length-1){currentIndex++;showQuestion()}}
function prevQ(){if(currentIndex>0){currentIndex--;showQuestion()}}
function finishQuiz(){if(mode==='exam'&&Object.keys(answers).length<currentQuestions.length){if(!confirm(t('confirmSubmit')))return}clearInterval(timerInterval);showResults()}
function showResults(){let c=0,w=0;const wl=[];currentQuestions.forEach((q,i)=>{if(answers[i]===q.a)c++;else{w++;wl.push({idx:i,q})}});const pct=Math.round(c/currentQuestions.length*100);const pass=pct>=60;document.getElementById('resultScore').textContent=pct+'%';document.getElementById('resultScore').className='result-score '+(pass?'pass':'fail');document.getElementById('resultMsg').textContent=pass?t('passMsg'):t('failMsg');document.getElementById('resultCorrect').textContent=c;document.getElementById('resultWrong').textContent=w;document.getElementById('resultBarFill').style.width=pct+'%';document.getElementById('resultBarFill').style.background=pass?'var(--success)':'var(--danger)';document.getElementById('resultTitle').textContent=mode==='exam'?t('result'):t('practiceResult');document.getElementById('reviewTitle').textContent=t('review');const rl=document.getElementById('reviewList');let h='';wl.forEach(i=>{h+=`<div class="review-item" onclick="reviewQ(${i.idx})"><div class="q-num">#${i.idx+1}</div><div class="q-preview">${(i.q.q[lang]||i.q.q['zh-CN']).substring(0,60)}...</div></div>`});rl.innerHTML=h||'<p style="text-align:center;color:var(--text-light)">🎉</p>';showPage('resultPage')}
function reviewQ(i){currentIndex=i;showQuestion();showPage('questionPage')}
function retryWrong(){const wi=Object.entries(answers).filter(([i,a])=>currentQuestions[parseInt(i)].a!==a).map(([i])=>parseInt(i));if(!wi.length)return;currentQuestions=wi.map(i=>currentQuestions[i]);answers={};currentIndex=0;showQuestion();showPage('questionPage')}
function goMenu(){clearInterval(timerInterval);document.getElementById('timerBar').style.display='none';renderMenu();showPage('menuPage')}
function startTimer(s){timeLeft=s;clearInterval(timerInterval);timerInterval=setInterval(()=>{timeLeft--;const m=Math.floor(timeLeft/60);const sec=timeLeft%60;document.getElementById('timerDisplay').textContent=`${m}:${sec<10?'0':''}${sec}`;if(timeLeft<=300)document.getElementById('timerDisplay').style.color='var(--danger)';if(timeLeft<=0){clearInterval(timerInterval);alert(t('timeUp'));finishQuiz()}},1000)}
document.addEventListener('DOMContentLoaded',()=>{setLang(lang);renderMenu()});
</script>
