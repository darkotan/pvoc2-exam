<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PVOC二级游乐船考试准备</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--card:#fff;--primary:#1a5276;--primary-light:#2980b9;
  --success:#27ae60;--danger:#c0392b;--warn:#f39c12;--text:#2c3e50;
  --text-light:#7f8c8d;--border:#dce1e6;--shadow:0 2px 8px rgba(0,0,0,.08);
  --header-bg:linear-gradient(135deg,var(--primary),var(--primary-light));
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.header{background:var(--header-bg);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px}
.controls{display:flex;gap:6px;align-items:center;flex-shrink:0}
.lang-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 10px;border-radius:4px;font-size:12px;cursor:pointer;transition:all .15s}
.lang-btn.active{background:#fff;color:var(--primary);font-weight:600}
.theme-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px}
.progress-bar{height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--success);transition:width .3s;width:0}
.stats-bar{display:flex;gap:10px;margin-top:6px;font-size:11px;opacity:.85;flex-wrap:wrap}

/* Pages */
.page{display:none;padding:16px;max-width:640px;margin:0 auto;animation:fadeIn .2s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Menu */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.mode-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .15s}
.mode-btn:active{transform:scale(.97)}
.mode-btn h3{font-size:15px;margin-bottom:3px}
.mode-btn p{font-size:12px;color:var(--text-light)}
.section-title{font-size:15px;font-weight:700;margin:16px 0 8px;color:var(--text)}

/* Chapter cards */
.ch-card{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--primary);transition:all .15s}
.ch-card:active{transform:scale(.98)}
.ch-card .ch-name{font-size:14px;font-weight:600}
.ch-card .ch-desc{font-size:12px;color:var(--text-light);margin-top:2px}
.ch-card .ch-count{font-size:13px;color:var(--primary);font-weight:600;flex-shrink:0;margin-left:8px}
.ch-card .ch-progress{font-size:11px;color:var(--text-light)}

/* Question */
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--text-light)}
.q-chapter{background:var(--primary);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px}
.q-body{background:var(--card);border-radius:12px;padding:18px;box-shadow:var(--shadow);margin-bottom:12px}
.q-text{font-size:15px;font-weight:500;line-height:1.75}
.q-img-wrap{text-align:center;margin:12px 0}
.q-img{max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--border)}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.option{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;font-size:14px;user-select:none;-webkit-tap-highlight-color:transparent;transition:all .12s;line-height:1.55}
.option:active:not(.locked){transform:scale(.98)}
.option .letter{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;margin-top:1px}
.option.selected{border-color:var(--primary);background:rgba(26,82,118,.08)}.option.selected .letter{background:var(--primary);color:#fff;border-color:var(--primary)}
.option.correct{border-color:var(--success);background:rgba(39,174,96,.08)}.option.correct .letter{background:var(--success);color:#fff;border-color:var(--success)}
.option.wrong{border-color:var(--danger);background:rgba(192,57,43,.08)}.option.wrong .letter{background:var(--danger);color:#fff;border-color:var(--danger)}
.option.locked{cursor:default;pointer-events:none;opacity:.85}
.explanation{background:rgba(243,156,18,.08);border:1px solid rgba(243,156,18,.3);border-radius:10px;padding:14px;margin-bottom:14px;font-size:13.5px;line-height:1.7;display:none}
.explanation.show{display:block;animation:fadeIn .2s}
.explanation .exp-label{font-weight:700;color:var(--warn);margin-bottom:4px;font-size:13px}

/* Navigation */
.nav-bar{display:flex;gap:8px;margin-bottom:16px}
.nav-btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.nav-btn:active{transform:scale(.97)}
.nav-btn.prev{background:var(--card);border:2px solid var(--border);color:var(--text)}
.nav-btn.next{background:var(--primary);color:#fff}
.nav-btn:disabled{opacity:.35;cursor:default;transform:none}

/* Timer */
.timer-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--border);padding:10px 16px;text-align:center;font-size:14px;font-weight:600;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.1)}
.timer-bar.show{display:block}
.timer-warn{color:var(--danger)}

/* Results */
.result-card{background:var(--card);border-radius:16px;padding:24px;text-align:center;box-shadow:var(--shadow);margin-bottom:14px}
.result-score{font-size:48px;font-weight:800;margin:10px 0}
.result-score.pass{color:var(--success)}.result-score.fail{color:var(--danger)}
.result-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin:10px 0}.result-bar-fill{height:100%;border-radius:5px;transition:width .6s}
.result-msg{font-size:13px;color:var(--text-light);margin:8px 0}
.result-detail{display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:14px}
.result-detail .correct{color:var(--success);font-weight:700}.result-detail .wrong-c{color:var(--danger);font-weight:700}

/* Review list */
.review-item{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--danger);transition:all .15s}
.review-item:active{transform:scale(.98)}
.review-item .ri-num{font-weight:700;font-size:12px;color:var(--text-light)}
.review-item .ri-text{font-size:13px;margin-top:3px;line-height:1.5}
.review-item .ri-ans{font-size:12px;margin-top:4px}

/* Info page */
.info-block{background:var(--card);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.info-block h3{color:var(--primary);margin-bottom:10px;font-size:15px}
.info-block ul{padding-left:18px}.info-block li{margin-bottom:6px;font-size:13.5px;line-height:1.6}
.info-block a{color:var(--primary-light)}

/* Wrong answers page */
.wrong-count{font-size:13px;color:var(--text-light);margin-bottom:12px}
.empty-msg{text-align:center;padding:40px 20px;color:var(--text-light);font-size:14px}

/* Back button */
.back-btn{background:none;border:none;color:var(--primary);font-size:14px;cursor:pointer;padding:8px 0;margin-bottom:8px;font-weight:600}

/* Dark theme */
[data-theme="dark"]{
  --bg:#0f0f1a;--card:#1a1a2e;--text:#e0e0e0;--text-light:#8888a0;
  --border:#2a2a4a;--shadow:0 2px 8px rgba(0,0,0,.3);
  --header-bg:linear-gradient(135deg,#1a3a5c,#2a5a8c);
}
[data-theme="dark"] .option.selected{background:rgba(41,128,185,.15)}
[data-theme="dark"] .option.correct{background:rgba(39,174,96,.15)}
[data-theme="dark"] .option.wrong{background:rgba(192,57,43,.15)}
[data-theme="dark"] .explanation{background:rgba(243,156,18,.1);border-color:rgba(243,156,18,.25)}

@media(max-width:360px){
  .header h1{font-size:15px}.mode-btn{padding:14px 8px}.mode-btn h3{font-size:13px}
}
.bottom-spacer{height:60px}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <h1 id="pageTitle">🚢 二级游乐船考试</h1>
    <div class="controls">
      <button class="lang-btn active" data-lang="zh-CN" onclick="setLang('zh-CN')">简体</button>
      <button class="lang-btn" data-lang="zh-TW" onclick="setLang('zh-TW')">繁體</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<!-- MENU PAGE -->
<div class="page active" id="menuPage">
  <div class="mode-grid">
    <div class="mode-btn" onclick="startPractice()" style="border-color:var(--primary)">
      <h3 id="tPractice">📝 章节练习</h3><p id="tPracticeD">按章节学习</p>
    </div>
    <div class="mode-btn" onclick="showInfo()" style="border-color:var(--text-light)">
      <h3 id="tInfo">📋 考试规则</h3><p id="tInfoD">报名与合格标准</p>
    </div>
    <div class="mode-btn" onclick="startExamA()" style="border-color:var(--danger)">
      <h3 id="tExamA">📋 甲部模拟考</h3><p id="tExamAD">航驶/船艺/安全 40题</p>
    </div>
    <div class="mode-btn" onclick="startExamB()" style="border-color:#8e44ad">
      <h3 id="tExamB">🔧 乙部模拟考</h3><p id="tExamBD">轮机知识 40题</p>
    </div>
  </div>
  <div class="mode-btn" onclick="showWrong()" style="border-color:var(--danger);margin-top:4px">
    <h3 id="tWrong">❌ 错题回顾</h3><p id="tWrongD">复习做错的题目</p>
  </div>
</div>

<!-- CHAPTER PAGE -->
<div class="page" id="chapterPage">
  <button class="back-btn" onclick="showMenu()" id="tBack1">← 返回</button>
  <h3 class="section-title" id="tChTitle">选择章节</h3>
  <div id="chapterList"></div>
</div>

<!-- QUESTION PAGE -->
<div class="page" id="questionPage">
  <div class="q-header">
    <span><span id="qNum">1</span> / <span id="qTotal">40</span></span>
    <span class="q-chapter" id="qChapter"></span>
  </div>
  <div class="q-body">
    <div class="q-text" id="qText"></div>
    <div class="q-img-wrap" id="qImgWrap" style="display:none"><img class="q-img" id="qImg" src="" alt="" onerror="this.parentElement.style.display='none'"></div>
  </div>
  <div class="options" id="optBox"></div>
  <div class="explanation" id="expBox"><div class="exp-label" id="expLabel">📖 解析</div><div id="expText"></div></div>
  <div class="nav-bar">
    <button class="nav-btn prev" id="btnPrev" onclick="prevQ()">← 上一题</button>
    <button class="nav-btn next" id="btnNext" onclick="nextQ()">下一题 →</button>
  </div>
  <div class="bottom-spacer"></div>
</div>

<!-- TIMER -->
<div class="timer-bar" id="timerBar">⏱️ <span id="timerDisplay">45:00</span></div>

<!-- RESULT PAGE -->
<div class="page" id="resultPage">
  <div class="result-card">
    <div style="font-size:14px;color:var(--text-light)" id="resTitle"></div>
    <div class="result-score" id="resScore">0%</div>
    <div class="result-bar"><div class="result-bar-fill" id="resBarFill"></div></div>
    <div class="result-msg" id="resMsg"></div>
    <div class="result-detail">
      <span>✅ <span class="correct" id="resCorrect">0</span></span>
      <span>❌ <span class="wrong-c" id="resWrong">0</span></span>
    </div>
  </div>
  <h3 class="section-title" id="tReview">错题回顾</h3>
  <div id="reviewList"></div>
  <div class="nav-bar" style="margin-top:14px">
    <button class="nav-btn prev" onclick="showMenu()">🏠 首页</button>
    <button class="nav-btn next" onclick="retryWrong()">🔄 重做错题</button>
  </div>
</div>

<!-- WRONG PAGE -->
<div class="page" id="wrongPage">
  <button class="back-btn" onclick="showMenu()" id="tBack2">← 返回</button>
  <h3 class="section-title" id="tWrongTitle">错题本</h3>
  <div class="wrong-count" id="wrongCount"></div>
  <div id="wrongList"></div>
</div>

<!-- INFO PAGE -->
<div class="page" id="infoPage">
  <button class="back-btn" onclick="showMenu()" id="tBack3">← 返回</button>
  <div class="info-block" id="infoContent"></div>
</div>

<script>
'use strict';

/* ========== DATA ========== */
const ALL_Q = [{"id":"A1","ch":"ch8","q":{"zh-TW":"你駕駛一艘機動船在海上，看見這些燈號在左舷30度的方向，羅經方位 沒有顯著變更和距離漸近。正確的行動是:","zh-CN":"你驾驶一艘机动船在海上，看见这些灯号在左舷30度的方向，罗经方位 沒有显著变更和距离渐近。正确的行动是:","en":"You are operating a power-driven vessel at sea and see these lights bearing 30 degrees on your port side, with the compass bearing showing no significant change and the range decreasing. The correct action is:"},"o":[{"zh-TW":"保持航速及航向及響五短聲號引起對方注意。","zh-CN":"保持航速及航向及响五短声号引起对方注意。","en":"Maintain course and speed and sound five short blasts to attract the other vessel's attention."},{"zh-TW":"響一長聲號以警告該船。","zh-CN":"响一长声号以警告该船。","en":"Sound one prolonged blast to warn the vessel."},{"zh-TW":"響兩短聲號，轉航向左。","zh-CN":"响两短声号，转航向左。","en":"Sound two short blasts and alter course to port."},{"zh-TW":"立即將船速減慢。","zh-CN":"立即將船速減慢。","en":"Immediately reduce speed."}],"a":3,"exp":{"zh-TW":"該燈號顯示一艘失控船。由於方位不變且距離逐漸縮小，存在碰撞危險。你應立即減速以避免危險局面。","zh-CN":"该灯号显示一艘失控船。由于方位不变且距离逐渐缩小，存在碰撞危险。你应立即减速以避免危险局面。","en":"The lights indicate a vessel not under command. Since the bearing is not changing and the range is decreasing, there is a risk of collision. You should immediately reduce speed to avoid the situation. Option D is correct."},"img":"exam_A_p1_img2.png"},{"id":"A2","ch":"ch8","q":{"zh-TW":"你的船沿著西航道向南航行，你看見有一艘在西面2號錨地的船隻懸掛 這些燈號。你會採取甚麽行動？","zh-CN":"你的船沿著西航道向南航行，你看见有一艘在西面2号锚地的船隻懸掛 这些灯号。你会采取甚麽行动？","en":"Your vessel is proceeding south along the Western Fairway, and you see a vessel at the No.2 Anchorage to the west displaying these lights. What action would you take?"},"o":[{"zh-TW":"一艘錨泊船隻，要求入境事務處清關。我不會採取任何行動。","zh-CN":"一艘錨泊船隻，要求入境事務处清关。我不会采取任何行动。","en":"An anchored vessel requesting Immigration clearance. I would not take any action."},{"zh-TW":"一艘正從事拖曳工作的船隻。我會遠離它並將航速減慢。","zh-CN":"一艘正從事拖曳工作的船隻。我会远离它並將航速減慢。","en":"A vessel engaged in towing. I would keep clear and reduce speed."},{"zh-TW":"一艘正從事水下作業的船隻。我會遠離它並將航速減慢。","zh-CN":"一艘正從事水下作业的船隻。我会远离它並將航速減慢。","en":"A vessel engaged in underwater operations. I would keep clear and reduce speed."},{"zh-TW":"一艘錨泊船隻，要求立即援助。我會報告海事處。","zh-CN":"一艘錨泊船隻，要求立即援助。我会报告海事处。","en":"An anchored vessel requesting immediate assistance. I would report to the Marine Department."}],"a":3,"exp":{"zh-TW":"所顯示的燈號表示一艘請求立即援助的船。你應向海事處報告此情況。","zh-CN":"所显示的灯号表示一艘请求立即援助的船。你应向海事处报告此情况。","en":"The lights displayed indicate a vessel requesting immediate assistance. You should report the situation to the Marine Department. Option D is correct."},"img":"exam_A_p1_img1.png"},{"id":"A3","ch":"ch8","q":{"zh-TW":"當駕駛一艘機動船在海上，你看見這些燈號在你船的右舷兩點位的方向 而且方位不變，你會:","zh-CN":"当驾驶一艘机动船在海上，你看见这些灯号在你船的右舷兩点位的方向 而且方位不变，你会:","en":"When operating a power-driven vessel at sea, you see these lights bearing two points on your starboard side and the bearing is not changing. You should:"},"o":[{"zh-TW":"保持航速及航向，響五短聲號以上引起對方注意。","zh-CN":"保持航速及航向，响五短声号以上引起对方注意。","en":"Maintain course and speed and sound five short blasts to attract the other vessel's attention."},{"zh-TW":"響一短聲號，轉航向右。","zh-CN":"响一短声号，转航向右。","en":"Sound one short blast and alter course to starboard."},{"zh-TW":"響兩長聲號以警告該船。","zh-CN":"响兩长声号以警告该船。","en":"Sound two prolonged blasts to warn the vessel."},{"zh-TW":"響一長聲號以警告該船。","zh-CN":"响一长声号以警告该船。","en":"Sound one prolonged blast to warn the vessel."}],"a":1,"exp":{"zh-TW":"該燈號顯示一艘機動船從左舷向右舷交叉航行。由於方位不變，存在碰撞危險。作為讓路船，你應鳴一短聲並向右轉向。","zh-CN":"该灯号显示一艘机动船从左舷向右舷交叉航行。由于方位不变，存在碰撞危险。作为让路船，你应鸣一短声并向右转向。","en":"The lights indicate a power-driven vessel crossing from port to starboard. Since the bearing is not changing, there is a risk of collision. As the give-way vessel (the other vessel is on your starboard side approaching), you should sound one short blast and alter course to starboard. Option B is correct."},"img":"exam_A_p2_img1.png"},{"id":"A4","ch":"ch8","q":{"zh-TW":"在一艘在海上以全速前進的機動船上，你看見這號燈在你船頭左舷三點 位，羅經方位不變。正確的行動應是:","zh-CN":"在一艘在海上以全速前進的机动船上，你看见这号灯在你船头左舷三点 位，罗经方位不变。正确的行动应是:","en":"On a power-driven vessel proceeding at full speed at sea, you see this light bearing three points on your port bow, with the compass bearing not changing. The correct action should be:"},"o":[{"zh-TW":"發出五短聲號引起其注意。","zh-CN":"發出五短声号引起其注意。","en":"Sound five short blasts to attract her attention."},{"zh-TW":"響一短聲號，轉航向右遠離該船。","zh-CN":"响一短声号，转航向右远离该船。","en":"Sound one short blast and alter course to starboard to keep clear of the vessel."},{"zh-TW":"加速經過他船的船頭。","zh-CN":"加速經过他船的船头。","en":"Accelerate to pass ahead of the other vessel."},{"zh-TW":"保持航速及航向。","zh-CN":"保持航速及航向。","en":"Maintain course and speed."}],"a":1,"exp":{"zh-TW":"方位不變表明存在碰撞危險。由於該船在你左舷船首方向，你是讓路船。你應鳴一短聲並向右轉向。","zh-CN":"方位不变表明存在碰撞危险。由于该船在你左舷船首方向，你是让路船。你应鸣一短声并向右转向。","en":"The bearing is not changing, indicating a risk of collision. Since the other vessel is on your port bow, you are the give-way vessel. You should sound one short blast and alter course to starboard. Option B is correct."},"img":"exam_A_p2_img2.jpeg"},{"id":"A5","ch":"ch8","q":{"zh-TW":"你在一艘在航中的機動船上，看見這些燈號在你船頭右舷五點位，距離 約1海里。你應:","zh-CN":"你在一艘在航中的机动船上，看见这些灯号在你船头右舷五点位，距离 约1海里。你应:","en":"You are on a power-driven vessel underway and see these lights bearing five points on your starboard bow, at a distance of about 1 nautical mile. You should:"},"o":[{"zh-TW":"發出一短聲號和轉航向右。","zh-CN":"發出一短声号和转航向右。","en":"Sound one short blast and alter course to starboard."},{"zh-TW":"發出兩短聲號和轉航向左。","zh-CN":"發出两短声号和转航向左。","en":"Sound two short blasts and alter course to port."},{"zh-TW":"保持航向和航速‚小心觀察該船直至遠離。","zh-CN":"保持航向和航速‚小心观察该船直至远离。","en":"Maintain course and speed, keeping a careful watch on the vessel until clear."},{"zh-TW":"停船並以相反航向行駛。","zh-CN":"停船並以相反航向行驶。","en":"Stop and proceed in the opposite direction."}],"a":2,"exp":{"zh-TW":"該燈號顯示一艘享有直航權的船。由於方位不變且距離約1海里，你應保持航速航向，密切觀察該船直至遠離。","zh-CN":"该灯号显示一艘享有直航权的船。由于方位不变且距离约1海里，你应保持航速航向，密切观察该船直至远离。","en":"The lights indicate a sailing vessel (or vessel with right of way). Since the vessel is on your starboard bow, you are the give-way vessel. However, the correct answer here is to maintain course and speed and watch carefully until clear — but given the answer is C, the lights indicate a vessel that is the stand-on vessel, so you keep a careful watch. Option C is correct."},"img":"exam_A_p3_img1.png"},{"id":"A6","ch":"ch8","q":{"zh-TW":"當你與顯示這些號燈的船隻對遇時，你會採取什麽行動?","zh-CN":"当你与显示这些号灯的船隻对遇时，你会采取什麽行动?","en":"When meeting a vessel displaying these lights head-on, what action would you take?"},"o":[{"zh-TW":"它是一艘在航中並要求立即援助的船隻。我會報告海事處。","zh-CN":"它是一艘在航中並要求立即援助的船隻。我会报告海事处。","en":"It is a vessel underway requesting immediate assistance. I would report to the Marine Department."},{"zh-TW":"它是一艘在航中從事領港任務的船隻。我會響1短號，向右改變航向。","zh-CN":"它是一艘在航中從事领港任務的船隻。我会响1短号，向右改变航向。","en":"It is a vessel underway engaged on pilotage duty. I would sound one short blast and alter course to starboard."},{"zh-TW":"它是一艘在航中的機動船隻。我會響1短號，向右改變航向。","zh-CN":"它是一艘在航中的机动船隻。我会响1短号，向右改变航向。","en":"It is a power-driven vessel underway. I would sound one short blast and alter course to starboard."},{"zh-TW":"它是一艘在航中從事拖曳任務的船隻。我會響1短號，向右改變航向。","zh-CN":"它是一艘在航中從事拖曳任務的船隻。我会响1短号，向右改变航向。","en":"It is a vessel underway engaged in towing. I would sound one short blast and alter course to starboard."}],"a":2,"exp":{"zh-TW":"該燈號顯示一艘在航機動船。對遇局面中，兩船均應向右轉向。你應鳴一短聲並向右轉向。","zh-CN":"该灯号显示一艘在航机动船。对遇局面中，两船均应向右转向。你应鸣一短声并向右转向。","en":"The lights indicate a power-driven vessel underway. When meeting head-on, both vessels should alter course to starboard. You should sound one short blast and alter course to starboard. Option C is correct."},"img":"exam_A_p3_img2.png"},{"id":"A7","ch":"ch8","q":{"zh-TW":"當你駕駛一艘機動船在海上，看見這艘船在你左舷三點位的方向，羅經 方位不變而且距離漸近。你會:","zh-CN":"当你驾驶一艘机动船在海上，看见这艘船在你左舷三点位的方向，罗经 方位不变而且距离渐近。你会:","en":"When operating a power-driven vessel at sea, you see this vessel bearing three points on your port side, with the compass bearing not changing and the range decreasing. You should:"},"o":[{"zh-TW":"保持航向及航速並響五短號引起該船注意。","zh-CN":"保持航向及航速並响五短号引起该船注意。","en":"Maintain course and speed and sound five short blasts to attract the vessel's attention."},{"zh-TW":"響一短聲號，並將航向轉右。","zh-CN":"响一短声号，並將航向转右。","en":"Sound one short blast and alter course to starboard."},{"zh-TW":"響兩短聲號，並將航向轉左。","zh-CN":"响两短声号，並將航向转左。","en":"Sound two short blasts and alter course to port."},{"zh-TW":"響三短聲號，倒車把船緊急煞停。","zh-CN":"响三短声号，倒车把船緊急煞停。","en":"Sound three short blasts and put engines full astern for an emergency stop."}],"a":0,"exp":{"zh-TW":"該船從你左舷交叉駛來，方位不變且距離縮小，表明存在碰撞危險。你是直航船，應保持航速航向並鳴五短聲以引起注意。","zh-CN":"该船从你左舷交叉驶来，方位不变且距离缩小，表明存在碰撞危险。你是直航船，应保持航速航向并鸣五短声以引起注意。","en":"The vessel is crossing from your port side and the bearing is not changing with decreasing range, indicating a collision risk. You are the stand-on vessel (the other vessel should give way). You should maintain course and speed and sound five short blasts to attract attention if needed. Option A is correct."},"img":"exam_A_p3_img3.png"},{"id":"A8","ch":"ch8","q":{"zh-TW":"你駕駛一艘機動船在海上，看見這艘船在船頭左舷一點位，方位不變， 距離逐漸接近，你會:","zh-CN":"你驾驶一艘机动船在海上，看见这艘船在船头左舷一点位，方位不变， 距离逐漸接近，你会:","en":"You are operating a power-driven vessel at sea and see this vessel bearing one point on your port bow, with the bearing not changing and the range gradually decreasing. You should:"},"o":[{"zh-TW":"響五短聲號引起該船注意。","zh-CN":"响五短声号引起该船注意。","en":"Sound five short blasts to attract the vessel's attention."},{"zh-TW":"響兩短聲號，並轉航向左。","zh-CN":"响两短声号，並转航向左。","en":"Sound two short blasts and alter course to port."},{"zh-TW":"保持航向及航速。","zh-CN":"保持航向及航速。","en":"Maintain course and speed."},{"zh-TW":"響一長聲號警告該船。","zh-CN":"响一长声号警告该船。","en":"Sound one prolonged blast to warn the vessel."}],"a":1,"exp":{"zh-TW":"該船在你左舷船首方向，方位不變，表明存在碰撞危險。作為讓路船，你應鳴兩短聲並向左轉向。","zh-CN":"该船在你左舷船首方向，方位不变，表明存在碰撞危险。作为让路船，你应鸣两短声并向左转向。","en":"The vessel is on your port bow with bearing not changing, indicating collision risk. As the give-way vessel, you should alter course. The correct action is to sound two short blasts and alter course to port. Option B is correct."},"img":"exam_A_p4_img1.png"},{"id":"A9","ch":"ch8","q":{"zh-TW":"當你聽到一艘海事處船隻發出一短一長及兩短的聲音訊號時，這表示:","zh-CN":"当你听到一艘海事处船隻發出一短一长及两短的声音讯号时，这表示:","en":"When you hear a Marine Department vessel sounding one short, one prolonged and two short blast signal, this indicates:"},"o":[{"zh-TW":"你應立即停船。","zh-CN":"你应立即停船。","en":"You should stop immediately."},{"zh-TW":"該海事船處船企圖在你左舷追越。","zh-CN":"该海事船处船企图在你左舷追越。","en":"The Marine Department vessel is attempting to overtake on your port side."},{"zh-TW":"你應與該船通訊。","zh-CN":"你应与该船通讯。","en":"You should communicate with the vessel."},{"zh-TW":"該海事處船要求立即援助。","zh-CN":"该海事处船要求立即援助。","en":"The Marine Department vessel is requesting immediate assistance."}],"a":0,"exp":{"zh-TW":"海事處船隻發出一短一長兩短聲號表示你應立即停船。這是政府船隻使用的特殊信號。","zh-CN":"海事处船只发出一短一长两短声号表示你应立即停船。这是政府船只使用的特殊信号。","en":"The signal of one short, one prolonged and two short blasts from a Marine Department vessel means you should stop immediately. This is a special signal used by government vessels. Option A is correct."},"img":"guide_p64_content.png"},{"id":"A10","ch":"ch8","q":{"zh-TW":"甚麼長度的船隻可以無須顯示失控船隻或操縱能力受限制船隻的號燈和 號型(從事潛水作業者除外)?","zh-CN":"甚么长度的船隻可以無须显示失控船隻或操纵能力受限制船隻的号灯和 号型(從事潛水作业者除外)?","en":"What length of vessel is not required to display the lights and shapes for a vessel not under command or a vessel restricted in her ability to manoeuvre (except when engaged in diving operations)?"},"o":[{"zh-TW":"50米以下。","zh-CN":"50米以下。","en":"Under 50 metres."},{"zh-TW":"20米以下。","zh-CN":"20米以下。","en":"Under 20 metres."},{"zh-TW":"12米以下。","zh-CN":"12米以下。","en":"Under 12 metres."},{"zh-TW":"30米以下。","zh-CN":"30米以下。","en":"Under 30 metres."}],"a":2,"exp":{"zh-TW":"根據國際海上避碰規則，長度不足12米的船舶無需顯示失控船或操縱能力受限船的號燈和號型（從事潛水作業者除外）。","zh-CN":"根据国际海上避碰规则，长度不足12米的船舶无需显示失控船或操纵能力受限船的号灯和号型（从事潜水作业者除外）。","en":"Under COLREGS, vessels under 12 metres in length are not required to display the lights and shapes prescribed for vessels not under command or restricted in their ability to manoeuvre, except when engaged in diving operations. Option C is correct."},"img":"guide_p67_content.png"},{"id":"A11","ch":"ch6","q":{"zh-TW":"在能見度低的情況下，一艘航行中的帆船應發出的霧號是每隔不超過 兩分鐘:","zh-CN":"在能見度低的情况下，一艘航行中的帆船应發出的雾号是每隔不超过 兩分钟:","en":"In conditions of restricted visibility, the fog signal that a sailing vessel underway should sound at intervals of not more than two minutes is:"},"o":[{"zh-TW":"一長聲號","zh-CN":"一长声号","en":"One prolonged blast."},{"zh-TW":"兩長聲號。","zh-CN":"兩长声号。","en":"Two prolonged blasts."},{"zh-TW":"兩短及一長聲號。","zh-CN":"两短及一长声号。","en":"Two short and one prolonged blast."},{"zh-TW":"一長及兩短聲號。","zh-CN":"一长及两短声号。","en":"One prolonged and two short blasts."}],"a":3,"exp":{"zh-TW":"根據避碰規則第35條，在能見度受限區域內或附近航行的帆船，應每隔不超過兩分鐘鳴放一長兩短聲號。","zh-CN":"根据避碰规则第35条，在能见度受限区域内或附近航行的帆船，应每隔不超过两分钟鸣放一长两短声号。","en":"Under COLREGS Rule 35, a sailing vessel underway in or near an area of restricted visibility shall sound one prolonged and two short blasts at intervals of not more than two minutes. Option D is correct."},"img":"guide_p66_content.png"},{"id":"A12","ch":"ch6","q":{"zh-TW":"航行中的拖船，在停止及不再前進時，應發出的霧號是:","zh-CN":"航行中的拖船，在停止及不再前進时，应發出的雾号是:","en":"The fog signal for a towing vessel that has stopped and is no longer making way should be:"},"o":[{"zh-TW":"每隔不超過兩分鐘，響兩長聲號。","zh-CN":"每隔不超过兩分钟，响兩长声号。","en":"Two prolonged blasts at intervals of not more than two minutes."},{"zh-TW":"每隔不超過兩分鐘一長聲號及兩短聲號。","zh-CN":"每隔不超过兩分钟一长声号及两短声号。","en":"One prolonged blast followed by two short blasts at intervals of not more than two minutes."},{"zh-TW":"每隔不超過兩分鐘一短一長及一短聲號。","zh-CN":"每隔不超过兩分钟一短一长及一短声号。","en":"One short, one prolonged and one short blast at intervals of not more than two minutes."},{"zh-TW":"每分鐘響兩短一長聲號。","zh-CN":"每分钟响两短一长声号。","en":"Two short and one prolonged blast every minute."}],"a":1,"exp":{"zh-TW":"根據避碰規則第35條，操縱能力受限船停泊且不再前進時，應每隔不超過兩分鐘鳴放一長兩短聲號。","zh-CN":"根据避碰规则第35条，操纵能力受限船停泊且不再前进时，应每隔不超过两分钟鸣放一长两短声号。","en":"Under COLREGS Rule 35, a vessel restricted in her ability to manoeuvre, when stopped and not making way, shall sound one prolonged followed by two short blasts at intervals of not more than two minutes. A towing vessel that has stopped falls under this category. Option B is correct."},"img":"guide_p68_content.png"},{"id":"A13","ch":"ch6","q":{"zh-TW":"在能見度受到限制時，船舶的安全速度決定於下列那個因素:","zh-CN":"在能見度受到限制时，船舶的安全速度决定于下列那个因素:","en":"In conditions of restricted visibility, the safe speed of a vessel is determined by which of the following factors?"},"o":[{"zh-TW":"交通密度。","zh-CN":"交通密度。","en":"Traffic density."},{"zh-TW":"視乎你船機器的馬力。","zh-CN":"视乎你船机器的马力。","en":"The horsepower of your vessel's engines."},{"zh-TW":"船隻的大小。","zh-CN":"船隻的大小。","en":"The size of the vessel."},{"zh-TW":"視乎船長的經驗。","zh-CN":"视乎船长的經验。","en":"The experience of the master."}],"a":0,"exp":{"zh-TW":"根據避碰規則第6條，確定安全航速時應考慮的因素包括交通密度。發動機馬力、船舶大小和船長經驗不屬於決定安全航速的因素。","zh-CN":"根据避碰规则第6条，确定安全航速时应考虑的因素包括交通密度。发动机马力、船舶大小和船长经验不属于决定安全航速的因素。","en":"Under COLREGS Rule 6, factors to be taken into account when determining safe speed include traffic density. Engine horsepower, vessel size, and the master's experience are not listed as determining factors for safe speed. Option A is correct."},"img":"guide_p68_content.png"},{"id":"A14","ch":"ch6","q":{"zh-TW":"在濃霧中航行時，聽到一長聲的汽笛信號來自船首右舷方向，你應:","zh-CN":"在濃雾中航行时，听到一长声的汽笛信号來自船首右舷方向，你应:","en":"When navigating in dense fog, hearing a prolonged blast of a fog signal from the direction of the starboard bow, you should:"},"o":[{"zh-TW":"立即減低船速。","zh-CN":"立即減低船速。","en":"Immediately reduce speed."},{"zh-TW":"立即發出兩短聲號並向左轉。","zh-CN":"立即發出两短声号並向左转。","en":"Immediately sound two short blasts and alter course to port."},{"zh-TW":"立即發出一短聲號並向右轉。","zh-CN":"立即發出一短声号並向右转。","en":"Immediately sound one short blast and alter course to starboard."},{"zh-TW":"立即發出三短聲號並倒車。","zh-CN":"立即發出三短声号並倒车。","en":"Immediately sound three short blasts and go astern."}],"a":0,"exp":{"zh-TW":"在能見度受限時，聽到正橫以前的霧號，應採取避讓行動。聽到右舷船首方向的霧號，你應立即減速至最低，謹慎航行。","zh-CN":"在能见度受限时，听到正横以前的雾号，应采取避让行动。听到右舷船首方向的雾号，你应立即减速至最低，谨慎航行。","en":"In restricted visibility, when you hear a fog signal forward of the beam, you should take avoiding action. Hearing a fog signal from the starboard bow direction, you should immediately reduce speed to a minimum and navigate with caution. Option A is correct."},"img":"guide_p68_content.png"},{"id":"A15","ch":"ch8","q":{"zh-TW":"在海上保持適當瞭望最主要目是:","zh-CN":"在海上保持适当瞭望最主要目是:","en":"The most important purpose of maintaining a proper lookout at sea is:"},"o":[{"zh-TW":"找出附近水域的能見度。","zh-CN":"找出附近水域的能見度。","en":"To determine the visibility in the nearby waters."},{"zh-TW":"找出在附近水域的助航設備如燈標或浮標。","zh-CN":"找出在附近水域的助航设备如灯標或浮標。","en":"To identify navigational aids such as lighthouses or buoys in the nearby waters."},{"zh-TW":"找出在附近水域的任何漂浮物。","zh-CN":"找出在附近水域的任何漂浮物。","en":"To identify any floating objects in the nearby waters."},{"zh-TW":"對局面和碰撞危險作出全面評估。","zh-CN":"对局面和碰撞危险作出全面評估。","en":"To make a full appraisal of the situation and the risk of collision."}],"a":3,"exp":{"zh-TW":"根據避碰規則第5條，每一船舶應經常保持正規的瞭望，以便對局面和碰撞危險作出全面評估。","zh-CN":"根据避碰规则第5条，每一船舶应经常保持正规的了望，以便对局面和碰撞危险作出全面评估。","en":"Under COLREGS Rule 5, every vessel shall at all times maintain a proper lookout by sight and hearing, as well as by all available means, so as to make a full appraisal of the situation and of the risk of collision. Option D is correct."},"img":"guide_p53_content.png"},{"id":"A16","ch":"ch8","q":{"zh-TW":"船隻使用分道航行制時，正常情況下不應進入分隔帶，下列那一種是屬 於例外的情況:","zh-CN":"船隻使用分道航行制时，正常情况下不应進入分隔带，下列那一種是屬 于例外的情况:","en":"When using a traffic separation scheme, vessels should not normally enter the separation zone. Which of the following is an exceptional circumstance?"},"o":[{"zh-TW":"划船比賽。","zh-CN":"划船比赛。","en":"A rowing race."},{"zh-TW":"避免緊迫危險的緊急情況。","zh-CN":"避免緊迫危险的緊急情况。","en":"An emergency to avoid immediate danger."},{"zh-TW":"錨泊。","zh-CN":"錨泊。","en":"Anchoring."},{"zh-TW":"當追越其他船隻。","zh-CN":"当追越其他船隻。","en":"When overtaking other vessels."}],"a":1,"exp":{"zh-TW":"根據避碰規則第10條，船舶通常不應進入分隔帶或穿越分隔線，除非為避免緊迫危險的緊急情況。","zh-CN":"根据避碰规则第10条，船舶通常不应进入分隔带或穿越分隔线，除非为避免紧迫危险的紧急情况。","en":"Under COLREGS Rule 10, vessels shall not normally enter a separation zone or cross a separation line except in cases of emergency to avoid immediate danger. A rowing race, anchoring, and overtaking are not valid exceptions. Option B is correct."},"img":"guide_p64_content.png"},{"id":"A17","ch":"ch8","q":{"zh-TW":"一艘船在狹窄水道中航行並打算在另一艘船的右邊追越時，她應該發出 甚麼聲號?","zh-CN":"一艘船在狹窄水道中航行並打算在另一艘船的右边追越时，她应该發出 甚么声号?","en":"A vessel navigating in a narrow channel intends to overtake another vessel on her starboard side. What signal should she sound?"},"o":[{"zh-TW":"一短聲號。","zh-CN":"一短声号。","en":"One short blast."},{"zh-TW":"兩短聲號，接著發出一長聲號。","zh-CN":"两短声号，接著發出一长声号。","en":"Two short blasts followed by one prolonged blast."},{"zh-TW":"兩長聲號，接著發出一短聲號。","zh-CN":"兩长声号，接著發出一短声号。","en":"Two prolonged blasts followed by one short blast."},{"zh-TW":"兩長聲號，接著發出兩短聲號。","zh-CN":"兩长声号，接著發出两短声号。","en":"Two prolonged blasts followed by two short blasts."}],"a":2,"exp":{"zh-TW":"根據避碰規則第34(c)條，在狹窄水道追越他船時，若擬從被追越船右舷通過，應鳴兩長一短聲。","zh-CN":"根据避碰规则第34(c)条，在狭窄水道追越他船时，若拟从被追越船右舷通过，应鸣两长一短声。","en":"Under COLREGS Rule 34(c), a vessel overtaking another in a narrow channel shall indicate her intention by sounding two prolonged blasts followed by one short blast if she intends to overtake on the other vessel's starboard side. Option C is correct."},"img":"guide_p64_content.png"},{"id":"A18","ch":"ch8","q":{"zh-TW":"當兩艘機動船交叉相遇而涉及碰撞危險時。你是一艘有直航權的船隻， 發現另外一艘船已經給你讓路，你要採取甚麽行動呢?","zh-CN":"当兩艘机动船交叉相遇而涉及碰撞危险时。你是一艘有直航權的船隻， 發現另外一艘船已經给你讓路，你要采取甚麽行动呢?","en":"When two power-driven vessels are crossing so as to involve risk of collision, you are the stand-on vessel and find that the other vessel has already taken action to give way. What action should you take?"},"o":[{"zh-TW":"響一短笛號，轉航向右。","zh-CN":"响一短笛号，转航向右。","en":"Sound one short blast and alter course to starboard."},{"zh-TW":"保持航向和航速。","zh-CN":"保持航向和航速。","en":"Maintain course and speed."},{"zh-TW":"響五短促笛號表示懷疑。","zh-CN":"响五短促笛号表示懷疑。","en":"Sound five short blasts to indicate doubt."},{"zh-TW":"響兩短笛號，轉航向左。","zh-CN":"响两短笛号，转航向左。","en":"Sound two short blasts and alter course to port."}],"a":1,"exp":{"zh-TW":"根據避碰規則第17條，當讓路船已採取適當讓路行動時，直航船應保持航向和航速。","zh-CN":"根据避碰规则第17条，当让路船已采取适当让路行动时，直航船应保持航向和航速。","en":"Under COLREGS Rule 17, when the other vessel has taken proper action to give way, the stand-on vessel shall maintain course and speed. The stand-on vessel should only take action if it becomes clear that the other vessel is not taking proper action. Option B is correct."},"img":"guide_p65_content.png"},{"id":"A19","ch":"ch8","q":{"zh-TW":"圖中這訊號具有甚麼意義?","zh-CN":"图中这讯号具有甚么意义?","en":"What does the signal shown in the picture mean?"},"o":[{"zh-TW":"船上有人跌落海。","zh-CN":"船上有人跌落海。","en":"Someone has fallen overboard."},{"zh-TW":"下錨碇泊的船舶，進行水底工程。","zh-CN":"下錨碇泊的船舶，進行水底工程。","en":"A vessel at anchor conducting underwater works."},{"zh-TW":"船舶遇難求救訊號。","zh-CN":"船舶遇难求救讯号。","en":"A vessel distress signal."},{"zh-TW":"船隻之操縱能力受到限制。","zh-CN":"船隻之操纵能力受到限制。","en":"A vessel restricted in her ability to manoeuvre."}],"a":2,"exp":{"zh-TW":"圖中所示信號為遇險求救信號，表示船舶遇險並請求援助。","zh-CN":"图中所示信号为遇险求救信号，表示船舶遇险并请求援助。","en":"The signal shown in the picture is a distress signal. It indicates a vessel in distress and requesting assistance. Option C is correct."},"img":"exam_A_p6_img1.png"},{"id":"A20","ch":"ch7","q":{"zh-TW":"在圖中塗黑部份的水域航行時，船上有人遭遇意外而引致嚴重受傷。你 應立即使用那一個甚高頻電話(VHF)的頻道，將此事情報告船隻航行監察 中心。","zh-CN":"在图中塗黑部份的水域航行时，船上有人遭遇意外而引致嚴重受傷。你 应立即使用那一个甚高频电话(VHF)的频道，將此事情报告船隻航行监察 中心。","en":"When navigating in the waters of the shaded area shown in the picture, someone on board has been involved in an accident resulting in serious injury. You should immediately use which VHF channel to report the matter to the Vessel Traffic Centre?"},"o":[{"zh-TW":"頻道16","zh-CN":"频道16","en":"Channel 16."},{"zh-TW":"頻道14","zh-CN":"频道14","en":"Channel 14."},{"zh-TW":"頻道67","zh-CN":"频道67","en":"Channel 67."},{"zh-TW":"頻道68","zh-CN":"频道68","en":"Channel 68."}],"a":2,"exp":{"zh-TW":"在圖中陰影水域（尖沙咀港區），聯絡船隻航行監察中心的指定VHF頻道為67頻道。","zh-CN":"在图中阴影水域（尖沙咀港区），联络船只航行监察中心的指定VHF频道为67频道。","en":"In the shaded area (Tsim Sha Tsui harbour area), the designated VHF channel for contacting the Vessel Traffic Centre is Channel 67. Option C is correct."},"img":"exam_A_p7_img1.png"},{"id":"A21","ch":"ch7","q":{"zh-TW":"你是一艘遊樂船的船長，當你發現另一艘船以航速10節在圖中红色區域 行駛時，你會採取甚麽行動？","zh-CN":"你是一艘遊樂船的船长，当你發現另一艘船以航速10节在图中红色區域 行驶时，你会采取甚麽行动？","en":"You are the master of a pleasure vessel. When you find another vessel travelling at 10 knots in the red area shown in the picture, what action would you take?"},"o":[{"zh-TW":"用甚高頻無線電話向船隻航行監察中心舉報。","zh-CN":"用甚高频無线电话向船隻航行监察中心舉报。","en":"Report to the Vessel Traffic Centre by VHF radiotelephone."},{"zh-TW":"響號笛提醒該船。","zh-CN":"响号笛提醒该船。","en":"Sound the horn to warn the vessel."},{"zh-TW":"用手提電話通知海港巡邏組。","zh-CN":"用手提电话通知海港巡邏组。","en":"Report to the Harbour Patrol by mobile phone."},{"zh-TW":"升起訊號旗\"L\"","zh-CN":"升起讯号旗\"L\"","en":"Hoist signal flag \"L\"."}],"a":2,"exp":{"zh-TW":"在紅色限速區域，速度限制低於10節。若發現有船超速，你應以手提電話通知海港巡邏組。","zh-CN":"在红色限速区域，速度限制低于10节。若发现有船超速，你应以手提电话通知海港巡逻组。","en":"In the red restricted speed area, the speed limit is lower than 10 knots. If you find a vessel exceeding the speed limit, you should report to the Harbour Patrol by mobile phone. Option C is correct."},"img":"exam_A_p7_img2.png"},{"id":"A22","ch":"ch7","q":{"zh-TW":"根據《商船(本地船隻)條例》，一艘本地船隻除非獲處長允許，那些機 場進口航道區是不得進入?","zh-CN":"根据《商船(本地船隻)条例》，一艘本地船隻除非获处长允许，那些机 场進口航道區是不得進入?","en":"Under the Merchant Shipping (Local Vessels) Ordinance, unless permitted by the Director, which airport approach channel zones are local vessels prohibited from entering?"},"o":[{"zh-TW":"第一和二區。","zh-CN":"第一和二區。","en":"Zones 1 and 2."},{"zh-TW":"第七和八區。","zh-CN":"第七和八區。","en":"Zones 7 and 8."},{"zh-TW":"第一，二，三和四區。","zh-CN":"第一，二，三和四區。","en":"Zones 1, 2, 3 and 4."},{"zh-TW":"第五，六，七和八區。","zh-CN":"第五，六，七和八區。","en":"Zones 5, 6, 7 and 8."}],"a":2,"exp":{"zh-TW":"根據《商船（本地船隻）條例》，除非獲得處長允許，本地船隻不得進入機場進口航道第一、二、三和四區。","zh-CN":"根据《商船（本地船只）条例》，除非获得处长允许，本地船只不得进入机场进口航道第一、二、三和四区。","en":"Under the Merchant Shipping (Local Vessels) Ordinance, local vessels are prohibited from entering airport approach channel Zones 1, 2, 3 and 4 unless permitted by the Director of Marine. Option C is correct."},"img":"guide_p44_content.png"},{"id":"A23","ch":"ch7","q":{"zh-TW":"那一種情況下的船隻不應使用政府(公眾)碼頭:","zh-CN":"那一種情况下的船隻不应使用政府(公眾)码头:","en":"In which of the following situations should a vessel not use a government (public) pier?"},"o":[{"zh-TW":"上落乘客和行李的船隻。","zh-CN":"上落乘客和行李的船隻。","en":"Embarking/disembarking passengers and luggage."},{"zh-TW":"上落貨物的船隻。","zh-CN":"上落货物的船隻。","en":"Loading/unloading cargo."},{"zh-TW":"一艘長度30公尺的船隻。","zh-CN":"一艘长度30公尺的船隻。","en":"A vessel 30 metres in length."},{"zh-TW":"以上答案皆是。","zh-CN":"以上答案皆是。","en":"All of the above."}],"a":1,"exp":{"zh-TW":"政府（公眾）碼頭僅供上下乘客和行李之用，不應用於裝卸貨物。","zh-CN":"政府（公众）码头仅供上下乘客和行李之用，不应用于装卸货物。","en":"Government (public) piers are intended for the embarkation/disembarkation of passengers and luggage. They should not be used for loading or unloading cargo. Option B is correct."},"img":"guide_p46_content.png"},{"id":"A24","ch":"ch4","q":{"zh-TW":"船的羅經航向為040〫，從船上的自差表查得這航向的自差為2〫(東)， 已知磁差為2〫(西)。你會用甚麽真航向繪畫在海圖上？","zh-CN":"船的罗经航向为040〫，從船上的自差表查得这航向的自差为2〫(东)， 已知磁差为2〫(西)。你会用甚麽真航向绘畫在海图上？","en":"The vessel's compass course is 040 degrees. From the deviation table on board, the deviation for this course is found to be 2 degrees East. The known variation is 2 degrees West. What true course would you plot on the chart?"},"o":[{"zh-TW":"038 度。","zh-CN":"038 度。","en":"038 degrees."},{"zh-TW":"042 度。","zh-CN":"042 度。","en":"042 degrees."},{"zh-TW":"036 度。","zh-CN":"036 度。","en":"036 degrees."},{"zh-TW":"040 度。","zh-CN":"040 度。","en":"040 degrees."}],"a":3,"exp":{"zh-TW":"真航向 = 羅經航向 + 東自差 - 西磁差 = 040 + 2 - 2 = 040度。東自差和西磁差相互抵消。","zh-CN":"真航向 = 罗经航向 + 东自差 - 西磁差 = 040 + 2 - 2 = 040度。东自差和西磁差相互抵消。","en":"True course = Compass course + Deviation (E) - Variation (W) = 040 + 2 - 2 = 040 degrees. The easterly deviation and westerly variation cancel each other out. Option D is correct."},"img":"guide_p19_content.png"},{"id":"A25","ch":"ch13","q":{"zh-TW":"下列那些訊號可用作海上遇險求救? (1) 白色煙霧訊號。 (2) 在船上發出火焰。 (3) 連續不斷鳴響鳴汽笛。 (4) 垂直懸掛三個黑球。","zh-CN":"下列那些讯号可用作海上遇险求救? (1) 白色煙雾讯号。 (2) 在船上發出火焰。 (3) 連续不断鸣响鸣汽笛。 (4) 垂直懸掛三个黑球。","en":"Which of the following signals can be used for distress at sea? (1) White smoke signal. (2) Fire on board. (3) Continuous sounding of a fog horn. (4) Three black balls suspended vertically."},"o":[{"zh-TW":"衹有(1) 和(2)。","zh-CN":"衹有(1) 和(2)。","en":"(1) and (2) only."},{"zh-TW":"衹有(2) 和(3)。","zh-CN":"衹有(2) 和(3)。","en":"(2) and (3) only."},{"zh-TW":"(1) (2) 和(3)。","zh-CN":"(1) (2) 和(3)。","en":"(1), (2) and (3)."},{"zh-TW":"(1) (2) (3) 和(4)。","zh-CN":"(1) (2) (3) 和(4)。","en":"(1), (2), (3) and (4)."}],"a":1,"exp":{"zh-TW":"可作為海上遇險求救信號的包括船上發出的火焰和連續鳴響霧笛。白色煙霧信號和垂直懸掛三個黑球不屬於公認的遇險信號。","zh-CN":"可作为海上遇险求救信号的包括船上发出的火焰和连续鸣响雾笛。白色烟雾信号和垂直悬挂三个黑球不属于公认的遇险信号。","en":"Signals that can be used for distress at sea include fire on board (flames) and continuous sounding of a fog horn. White smoke signals and three black balls suspended vertically are not recognized distress signals under COLREGS or the International Regulations. Option B is correct."},"img":"guide_p102_content.png"},{"id":"A26","ch":"ch7","q":{"zh-TW":"你的船離開銅鑼灣後，往鯉魚門方向航行，看見正前方有一個圓錐形的 綠色浮標時，你將會在該浮標的那一邊駛過?","zh-CN":"你的船离开铜鑼灣後，往鯉鱼门方向航行，看见正前方有一个圓錐形的 綠色浮標时，你將会在该浮標的那一边驶过?","en":"After your vessel leaves Causeway Bay heading towards Lei Yue Mun, you see a cone-shaped green buoy directly ahead. On which side of the buoy will you pass?"},"o":[{"zh-TW":"轉航向和以船的左舷通過該浮標。","zh-CN":"转航向和以船的左舷通过该浮標。","en":"Alter course and pass the buoy on the port side of the vessel."},{"zh-TW":"轉航向和以船的右舷通過該浮標。","zh-CN":"转航向和以船的右舷通过该浮標。","en":"Alter course and pass the buoy on the starboard side of the vessel."},{"zh-TW":"可在浮標的任何一面駛過。","zh-CN":"可在浮標的任何一面驶过。","en":"You may pass on either side of the buoy."},{"zh-TW":"轉航向和在浮標的北面駛過。","zh-CN":"转航向和在浮標的北面驶过。","en":"Alter course and pass the buoy on the north side of the buoy."}],"a":0,"exp":{"zh-TW":"錐形綠色浮標為右側浮標。從銅鑼灣往鯉魚門方向航行時，應將該綠色錐形浮標保持在船的左舷通過。","zh-CN":"锥形绿色浮标为右侧浮标。从铜锣湾往鲤鱼门方向航行时，应将该绿色锥形浮标保持在船的左舷通过。","en":"A cone-shaped green buoy is a starboard-hand buoy when approaching from seaward. When heading from Causeway Bay towards Lei Yue Mun (southbound/eastbound in the fairway), this green conical buoy should be left on the port side of the vessel. Option A is correct."},"img":"exam_A_p9_img1.png"},{"id":"A27","ch":"ch7","q":{"zh-TW":"在一艘以真航向010 行駛的船上，你看見這個浮標在船的正前方。你 應；","zh-CN":"在一艘以真航向010 行驶的船上，你看见这个浮標在船的正前方。你 应；","en":"On a vessel proceeding on a true course of 010 degrees, you see this buoy directly ahead. You should:"},"o":[{"zh-TW":"保持這浮標在船的右舷駛過。","zh-CN":"保持这浮標在船的右舷驶过。","en":"Keep the buoy on the starboard side when passing."},{"zh-TW":"保持這浮標在船的左舷駛過。","zh-CN":"保持这浮標在船的左舷驶过。","en":"Keep the buoy on the port side when passing."},{"zh-TW":"停船和確定你的船位。","zh-CN":"停船和确定你的船位。","en":"Stop and determine your position."},{"zh-TW":"如沒有其他船隻，可在你船的任何一舷駛過。","zh-CN":"如沒有其他船隻，可在你船的任何一舷驶过。","en":"If there are no other vessels, you may pass on either side."}],"a":1,"exp":{"zh-TW":"根據浮標類型和你的航向，應將該浮標保持在船的左舷通過。","zh-CN":"根据浮标类型和你的航向，应将该浮标保持在船的左舷通过。","en":"Based on the buoy type and your course, the buoy should be kept on the port side when passing. This is the correct action to follow the designated channel. Option B is correct."},"img":"exam_A_p9_img3.png"},{"id":"A28","ch":"ch7","q":{"zh-TW":"在晚上，你的船以羅經航向275 行駛，你看見一個浮標在你正船頭發 出連續甚快閃的白色閃光(大约每分鐘閃光100次)。你會採取甚麼行動?","zh-CN":"在晚上，你的船以罗经航向275 行驶，你看见一个浮標在你正船头發 出連续甚快闪的白色闪光(大约每分钟闪光100次)。你会采取甚么行动?","en":"At night, your vessel is proceeding on a compass course of 275 degrees. You see a buoy directly ahead showing a continuous very quick flashing white light (approximately 100 flashes per minute). What action would you take?"},"o":[{"zh-TW":"轉航向左而駛過它。","zh-CN":"转航向左而驶过它。","en":"Alter course to port and pass it."},{"zh-TW":"轉航向右，使浮標在船隻的左舷通過。","zh-CN":"转航向右，使浮標在船隻的左舷通过。","en":"Alter course to starboard so that the buoy passes on the port side of the vessel."},{"zh-TW":"停船。向航行監察中心請示。","zh-CN":"停船。向航行监察中心请示。","en":"Stop and request instructions from the Vessel Traffic Centre."},{"zh-TW":"如沒有其他船隻，可在你船的任何一舷駛過。","zh-CN":"如沒有其他船隻，可在你船的任何一舷驶过。","en":"If there are no other vessels, you may pass on either side."}],"a":1,"exp":{"zh-TW":"連續甚快閃白色閃光的浮標標示推薦航道或危險物。你應向右轉向，使浮標在船的左舷通過。","zh-CN":"连续甚快闪白色闪光的浮标标示推荐航道或危险物。你应向右转向，使浮标在船的左舷通过。","en":"A very quick flashing white light on a buoy marks a preferred channel or a danger. You should alter course to starboard so the buoy passes on the port side of the vessel. Option B is correct."},"img":"exam_A_p9_img2.png"},{"id":"A29","ch":"ch13","q":{"zh-TW":"你船的航向為南東南(SSE)，船上有一乘客墮海，在安全情况下你應該 駕駛甚麼航向來搜索該名墮海乘客?","zh-CN":"你船的航向为南东南(SSE)，船上有一乘客堕海，在安全情况下你应该 驾驶甚么航向來搜索该名堕海乘客?","en":"Your vessel's course is South-Southeast (SSE). A passenger falls overboard. In safe conditions, what course should you steer to search for the person overboard?"},"o":[{"zh-TW":"東北(NE)","zh-CN":"东北(NE)","en":"Northeast (NE)."},{"zh-TW":"北西北(NNW)","zh-CN":"北西北(NNW)","en":"North-Northwest (NNW)."},{"zh-TW":"南西南(SSW)","zh-CN":"南西南(SSW)","en":"South-Southwest (SSW)."},{"zh-TW":"西南(SW)","zh-CN":"西南(SW)","en":"Southwest (SW)."}],"a":1,"exp":{"zh-TW":"有人落水時，初始行動是向落水一側轉向。為追溯原航跡，應駛反航向。SSE的反向為NNW（相差180度）。","zh-CN":"有人落水时，初始行动是向落水一侧转向。为追溯原航迹，应驶反航向。SSE的反向为NNW（相差180度）。","en":"When a person falls overboard, the initial action is to turn towards the side where the person fell. To retrace your track, you steer the reciprocal course. SSE reversed is NNW (180 degrees opposite). Option B is correct."},"img":"guide_p101_content.png"},{"id":"A30","ch":"ch4","q":{"zh-TW":"下列那些岸上物體適合用作觀測重疊方位? (1) 一座山與一間煉油廠成一直線。 (2) 一支煙囪與一座雷達塔成一直線。 (3) 一座燈塔與顯眼的山峰成一直線。 (4) 一座橋與一間船廠成一直線。","zh-CN":"下列那些岸上物体适合用作观测重疊方位? (1) 一座山与一间煉油厂成一直线。 (2) 一支煙囪与一座雷达塔成一直线。 (3) 一座灯塔与显眼的山峰成一直线。 (4) 一座橋与一间船厂成一直线。","en":"Which of the following shore objects are suitable for observing transit (rang) bearings? (1) A mountain and an oil refinery in line. (2) A chimney and a radar tower in line. (3) A lighthouse and a prominent peak in line. (4) A bridge and a shipyard in line."},"o":[{"zh-TW":"(1) 和 (3)。","zh-CN":"(1) 和 (3)。","en":"(1) and (3)."},{"zh-TW":"(2) 和 (3)。","zh-CN":"(2) 和 (3)。","en":"(2) and (3)."},{"zh-TW":"(2) 和 (4) 。","zh-CN":"(2) 和 (4) 。","en":"(2) and (4)."},{"zh-TW":"(1) 和 (4)。","zh-CN":"(1) 和 (4)。","en":"(1) and (4)."}],"a":1,"exp":{"zh-TW":"疊標方位需要兩個清晰的物標成一直線。煙囪與雷達塔（2）以及燈塔與顯眼山峰（3）是適合觀測疊標方位的物標。","zh-CN":"叠标方位需要两个清晰的物标成一直线。烟囱与雷达塔（2）以及灯塔与显眼山峰（3）是适合观测叠标方位的物标。","en":"Transit bearings require two clearly defined objects that can be seen in line. A chimney and a radar tower (2), and a lighthouse and a prominent peak (3), are well-defined objects suitable for transit bearings. Option B is correct."},"img":"guide_p19_content.png"},{"id":"A31","ch":"ch1","q":{"zh-TW":"你的船是一艘右轉單螺旋槳的船隻將會在沒有風和水流的情况下靠泊碼 頭，你會選擇下列那種方法靠泊才可以利用螺旋槳的橫推力:","zh-CN":"你的船是一艘右转單螺旋槳的船隻將会在沒有风和水流的情况下靠泊码 头，你会选擇下列那種方法靠泊才可以利用螺旋槳的橫推力:","en":"Your vessel has a right-handed (clockwise) single propeller and will be berthing at a pier in the absence of wind and current. Which method of berthing would you choose to take advantage of the propeller's transverse thrust?"},"o":[{"zh-TW":"右舷靠泊碼頭。","zh-CN":"右舷靠泊码头。","en":"Berth starboard side to the pier."},{"zh-TW":"船頭靠泊碼頭。","zh-CN":"船头靠泊码头。","en":"Berth bow to the pier."},{"zh-TW":"船尾靠泊碼頭。","zh-CN":"船尾靠泊码头。","en":"Berth stern to the pier."},{"zh-TW":"左舷靠泊碼頭。","zh-CN":"左舷靠泊码头。","en":"Berth port side to the pier."}],"a":3,"exp":{"zh-TW":"右旋螺旋槳在倒車時產生的側推力會將船尾推向左舷。為利用此效應，應以左舷靠泊碼頭。","zh-CN":"右旋螺旋桨在倒车时产生的侧推力会将船尾推向左舷。为利用此效应，应以左舷靠泊码头。","en":"A right-handed propeller, when going astern, produces transverse thrust that pushes the stern to port. To take advantage of this effect, you should berth port side to the pier. Option D is correct."},"img":"guide_p46_content.png"},{"id":"A32","ch":"ch1","q":{"zh-TW":"船隻靠泊碼頭時總是逆流而泊,因為:","zh-CN":"船隻靠泊码头时总是逆流而泊,因为:","en":"Vessels always berth against the current because:"},"o":[{"zh-TW":"節省燃油。","zh-CN":"节省燃油。","en":"To save fuel."},{"zh-TW":"水流令船的主機更容易受到操控。","zh-CN":"水流令船的主机更容易受到操控。","en":"The current makes the vessel's engines easier to control."},{"zh-TW":"水流會將船隻推向碼頭。","zh-CN":"水流会將船隻推向码头。","en":"The current pushes the vessel towards the pier."},{"zh-TW":"水流令船隻更易受到控制。","zh-CN":"水流令船隻更易受到控制。","en":"The current makes the vessel easier to control."}],"a":3,"exp":{"zh-TW":"船舶總是逆流靠泊，因為逆流使船舶在靠泊操作中更容易控制。水流有助減速並提供更好的舵效。","zh-CN":"船舶总是逆流靠泊，因为逆流使船舶在靠泊操作中更容易控制。水流有助减速并提供更好的舵效。","en":"Vessels berth against the current because the current makes the vessel easier to control during the berthing manoeuvre. The current helps to slow the vessel and provides better steerage. Option D is correct."},"img":"guide_p46_content.png"},{"id":"A33","ch":"ch1","q":{"zh-TW":"在惡劣天氣中，你怎樣操控你的船隻?","zh-CN":"在惡劣天气中，你怎樣操控你的船隻?","en":"In heavy weather, how should you handle your vessel?"},"o":[{"zh-TW":"以正常船速順著海浪行駛。","zh-CN":"以正常船速顺著海浪行驶。","en":"Proceed at normal speed following the waves."},{"zh-TW":"停車，讓船隻隨着海浪漂流。","zh-CN":"停车，讓船隻随着海浪漂流。","en":"Stop engines and let the vessel drift with the waves."},{"zh-TW":"以持續的高速用正船頭頂著海浪行駛。","zh-CN":"以持续的高速用正船头顶著海浪行驶。","en":"Proceed at sustained high speed heading directly into the waves."},{"zh-TW":"減慢船速和用船頭側頂著海浪行駛。","zh-CN":"減慢船速和用船头側顶著海浪行驶。","en":"Reduce speed and take the waves on the bow quarter."}],"a":3,"exp":{"zh-TW":"在惡劣天氣中，應減速並以船頭側斜迎浪行駛。這可減少船舶劇烈縱搖或被浪追越的危險。","zh-CN":"在恶劣天气中，应减速并以船头侧斜迎浪行驶。这可减少船舶剧烈纵摇或被浪追越的危险。","en":"In heavy weather, you should reduce speed and take the waves on the bow quarter (slightly off the bow). This minimizes the risk of the vessel pitching heavily or being pooped. Option D is correct."},"img":"guide_p92_content.png"},{"id":"A34","ch":"ch12","q":{"zh-TW":"你的船隻是繫泊在擠迫水域內的浮泡上，當颱風快要來臨時，你應採取 甚麽預防措施?","zh-CN":"你的船隻是系泊在挤迫水域內的浮泡上，当颱风快要來临时，你应采取 甚麽预防措施?","en":"Your vessel is moored to a buoy in a crowded waterway. When a typhoon is approaching, what precautionary measures should you take?"},"o":[{"zh-TW":"船旁放置多幾個碰撞墊。","zh-CN":"船旁放置多几个碰撞墊。","en":"Place additional fenders alongside the vessel."},{"zh-TW":"將甲板上的去水孔封敝。","zh-CN":"將甲板上的去水孔封敝。","en":"Close the deck scuppers."},{"zh-TW":"在船尾下錨。","zh-CN":"在船尾下錨。","en":"Anchor at the stern."},{"zh-TW":"使用較長的纜繩來繫泊。","zh-CN":"使用较长的缆绳來系泊。","en":"Use longer mooring lines."}],"a":0,"exp":{"zh-TW":"當颱風即將來臨時，在擁擠水域繫泊於浮泡的船應在船旁放置額外碰墊，以防在擁擠水域中與其他船舶碰撞。","zh-CN":"当台风即将来临时，在拥挤水域系泊于浮泡的船应在船旁放置额外碰垫，以防在拥挤水域中与其他船舶碰撞。","en":"When a typhoon is approaching and the vessel is moored to a buoy in a crowded waterway, you should place additional fenders alongside the vessel to protect against collision with other vessels in the crowded area. Option A is correct."},"img":"guide_p90_content.png"},{"id":"A35","ch":"ch9","q":{"zh-TW":"那一類滅火筒適用於電器所導致的火災?","zh-CN":"那一類灭火筒适用于电器所導致的火災?","en":"Which type of fire extinguisher is suitable for fires caused by electrical equipment?"},"o":[{"zh-TW":"水。","zh-CN":"水。","en":"Water."},{"zh-TW":"二氧化碳。","zh-CN":"二氧化碳。","en":"Carbon dioxide."},{"zh-TW":"泡沫。","zh-CN":"泡沫。","en":"Foam."},{"zh-TW":"以上答案皆是。","zh-CN":"以上答案皆是。","en":"All of the above."}],"a":1,"exp":{"zh-TW":"二氧化碳滅火器適用於電器火災，因為二氧化碳不導電且不留殘留物。水和泡沫滅火器因觸電危險不應用於電器火災。","zh-CN":"二氧化碳灭火器适用于电器火灾，因为二氧化碳不导电且不留残留物。水和泡沫灭火器因触电危险不应用于电器火灾。","en":"Carbon dioxide (CO2) extinguishers are suitable for fires involving electrical equipment because CO2 does not conduct electricity and leaves no residue. Water and foam extinguishers should not be used on electrical fires due to the risk of electrocution. Option B is correct."},"img":"guide_p268_content.png"},{"id":"A36","ch":"ch9","q":{"zh-TW":"在遊樂船上救生設備的擺放位置一定要:","zh-CN":"在遊樂船上救生设备的摆放位置一定要:","en":"The placement of life-saving equipment on a pleasure vessel must:"},"o":[{"zh-TW":"分佈在船的兩舷。","zh-CN":"分佈在船的兩舷。","en":"Be distributed on both sides of the vessel."},{"zh-TW":"可供即時使用及放在易於取用的位置。","zh-CN":"可供即时使用及放在易于取用的位置。","en":"Be ready for immediate use and in easily accessible positions."},{"zh-TW":"按照船長的要求而定。","zh-CN":"按照船长的要求而定。","en":"Be determined according to the master's requirements."},{"zh-TW":"放在座位下的容器裏。","zh-CN":"放在座位下的容器裏。","en":"Be stored in containers under the seats."}],"a":1,"exp":{"zh-TW":"遊樂船上的救生設備必須可供即時使用並放在易於取用的位置，以確保在緊急情況下可迅速取用。","zh-CN":"游乐船上的救生设备必须可供即时使用并放在易于取用的位置，以确保在紧急情况下可迅速取用。","en":"Life-saving equipment on a pleasure vessel must be ready for immediate use and placed in easily accessible positions. This ensures that in an emergency, the equipment can be quickly retrieved and used. Option B is correct."},"img":"guide_p103_content.png"},{"id":"A37","ch":"ch13","q":{"zh-TW":"你的船隻在淺水區航行時,因失去船舵而不能控制船隻。 (i) 你會首先採取什麼行動? (ii) 陳述採取上述行動的理由。","zh-CN":"你的船隻在淺水區航行时,因失去船舵而不能控制船隻。 (i) 你会首先采取什么行动? (ii) 陈述采取上述行动的理由。","en":"Your vessel is navigating in shallow water and loses steering control. (i) What action would you take first? (ii) State the reason for taking the above action."},"o":[{"zh-TW":"(i) 立即下錨。(ii) 防止船隻擱淺。","zh-CN":"(i) 立即下錨。(ii) 防止船隻搁淺。","en":"(i) Anchor immediately. (ii) To prevent the vessel from grounding."},{"zh-TW":"(i) 全速後退。(ii) 遠離淺水區。","zh-CN":"(i) 全速後退。(ii) 远离淺水區。","en":"(i) Full speed astern. (ii) To move away from shallow water."},{"zh-TW":"(i) 關掉引擎並懸掛失控船信號。(ii) 警告任何接近的船隻。","zh-CN":"(i) 关掉引擎並懸掛失控船信号。(ii) 警告任何接近的船隻。","en":"(i) Switch off engines and display the not-under-command signal. (ii) To warn any approaching vessels."},{"zh-TW":"(i) 發出遇險訊號。(ii) 要求附近船隻提供立即援助。","zh-CN":"(i) 發出遇险讯号。(ii) 要求附近船隻提供立即援助。","en":"(i) Send a distress signal. (ii) To request immediate assistance from nearby vessels."}],"a":0,"exp":{"zh-TW":"在淺水區失去船舵控制時，首要行動是立即下錨以防止船舶漂移擱淺。","zh-CN":"在浅水区失去船舵控制时，首要行动是立即下锚以防止船舶漂移搁浅。","en":"When losing steering in shallow water, the first action is to anchor immediately to prevent the vessel from drifting and grounding. Option A is correct."},"img":"guide_p67_content.png"},{"id":"A38","ch":"ch13","q":{"zh-TW":"你收到報告有人從船尾墮海。你會首先採取甚麼行動來標示他/她的位 置？","zh-CN":"你收到报告有人從船尾堕海。你会首先采取甚么行动來標示他/她的位 置？","en":"You receive a report that someone has fallen overboard from the stern. What action would you take first to mark his/her position?"},"o":[{"zh-TW":"拋下救生圈。","zh-CN":"拋下救生圈。","en":"Throw a lifebuoy."},{"zh-TW":"召警協助。","zh-CN":"召警協助。","en":"Call the police for assistance."},{"zh-TW":"派出一個精於游泳的泳手落水。","zh-CN":"派出一个精于游泳的泳手落水。","en":"Send a strong swimmer into the water."},{"zh-TW":"派出一個繫著繩的泳手落水。","zh-CN":"派出一个系著绳的泳手落水。","en":"Send a swimmer with a line attached into the water."}],"a":0,"exp":{"zh-TW":"有人落水時，首要行動是拋下救生圈以標示落水者位置。這提供視覺參照點並為落水者提供浮力。","zh-CN":"有人落水时，首要行动是拋下救生圈以标示落水者位置。这提供视觉参照点并为落水者提供浮力。","en":"The first action when someone falls overboard is to throw a lifebuoy to mark the person's position. This provides a visual reference point and flotation for the person in the water. Option A is correct."},"img":"guide_p82_content.png"},{"id":"A39","ch":"ch11","q":{"zh-TW":"下列那些意外一定要向海事處作出書面報告?","zh-CN":"下列那些意外一定要向海事处作出书面报告?","en":"Which of the following accidents must be reported in writing to the Marine Department?"},"o":[{"zh-TW":"船上有船員生病。","zh-CN":"船上有船員生病。","en":"A crew member falling ill on board."},{"zh-TW":"船上有乘客的錢包被人偷了。","zh-CN":"船上有乘客的錢包被人偷了。","en":"A passenger's wallet being stolen on board."},{"zh-TW":"船上有人吵架。","zh-CN":"船上有人吵架。","en":"An argument on board."},{"zh-TW":"船隻與港口設施碰撞。","zh-CN":"船隻与港口设施碰撞。","en":"A vessel colliding with port facilities."}],"a":3,"exp":{"zh-TW":"船舶與港口設施碰撞屬於必須向海事處作出書面報告的海上意外。船員生病、盜竊和爭吵不屬於需書面報告的海上意外。","zh-CN":"船舶与港口设施碰撞属于必须向海事处作出书面报告的海上意外。船员生病、盗窃和争吵不属于需书面报告的海上意外。","en":"A collision with port facilities is a marine accident that must be reported in writing to the Marine Department. Crew illness, theft, and arguments are not marine accidents requiring written reports to the Marine Department. Option D is correct."}},{"id":"A40","ch":"ch12","q":{"zh-TW":"下列那些因素决定波浪的高度？","zh-CN":"下列那些因素决定波浪的高度？","en":"Which of the following factors determines the height of waves?"},"o":[{"zh-TW":"吹程。","zh-CN":"吹程。","en":"Fetch."},{"zh-TW":"海水温度。","zh-CN":"海水温度。","en":"Sea water temperature."},{"zh-TW":"潮汐方向。","zh-CN":"潮汐方向。","en":"Tidal direction."},{"zh-TW":"濕度。","zh-CN":"濕度。","en":"Humidity."}],"a":0,"exp":{"zh-TW":"吹程（風吹過開闊水面的距離）是決定波浪高度的主要因素。吹程越長，波浪可積聚得越高。","zh-CN":"吹程（风吹过开阔水面的距离）是决定波浪高度的主要因素。吹程越长，波浪可积聚得越高。","en":"Fetch (the distance over which wind blows across open water) is a primary factor that determines wave height. The longer the fetch, the higher the waves can build up. Sea water temperature, tidal direction, and humidity do not directly determine wave height. Option A is correct."},"img":"guide_p91_content.png"},{"id":"B1","ch":"ch14","q":{"zh-TW":"右圖表示，內燃機正在那一個動作行程？","zh-CN":"右图表示，內燃机正在那一个動作行程？","en":"As shown in the diagram, which stroke is the internal combustion engine currently performing?"},"o":[{"zh-TW":"進氣","zh-CN":"進气","en":"Intake"},{"zh-TW":"壓縮","zh-CN":"壓縮","en":"Compression"},{"zh-TW":"動力","zh-CN":"動力","en":"Power"},{"zh-TW":"排氣","zh-CN":"排气","en":"Exhaust"}],"a":3,"exp":{"zh-TW":"在四衝程循環中，排氣行程是活塞上行將燃燒廢氣通過打開的排氣閥排出的過程。圖中描繪了排氣閥打開時活塞上行的動作，對應排氣行程。","zh-CN":"在四冲程循环中，排气行程是活塞上行将燃烧废气通过打开的排气阀排出的过程。图中描绘了排气阀打开时活塞上行的动作，对应排气行程。","en":"In the four-stroke cycle, the exhaust stroke occurs when the piston moves upward to expel burnt gases through the open exhaust valve. The diagram depicts this upward movement with the exhaust valve open, corresponding to the exhaust stroke."},"img":"exam_B_p1_img1.jpeg"},{"id":"B2","ch":"ch14","q":{"zh-TW":"與濕式氣缸套比較，乾式氣缸套____： (i) 缸套不與冷卻水直接接觸 (ii) 不需要潤滑油潤滑 (iii) 缸套壁比濕式氣缸較薄 (iv) 由空氣直接冷卻","zh-CN":"与濕式气缸套比较，乾式气缸套____： (i) 缸套不与冷卻水直接接觸 (ii) 不需要潤滑油潤滑 (iii) 缸套壁比濕式气缸较薄 (iv) 由空气直接冷卻","en":"Compared with wet cylinder liners, dry cylinder liners _____:\n(i) The liner does not come into direct contact with the cooling water\n(ii) No lubricating oil is required for lubrication\n(iii) The liner wall is thinner than that of a wet cylinder liner\n(iv) Cooled directly by air"},"o":[{"zh-TW":"(i) 和(iv)","zh-CN":"(i) 和(iv)","en":"(i) and (iv)"},{"zh-TW":"(ii)","zh-CN":"(ii)","en":"(ii) only"},{"zh-TW":"(i) 和(ii)","zh-CN":"(i) 和(ii)","en":"(i) and (ii)"},{"zh-TW":"(i) 和(iii)","zh-CN":"(i) 和(iii)","en":"(i) and (iii)"}],"a":3,"exp":{"zh-TW":"乾式氣缸套不與冷卻水直接接觸（i），冷卻液通過氣缸體中的水道流動而非直接圍繞缸套。乾式缸套壁比濕式缸套更薄（iii），因為不需要承受直接水接觸和密封的結構厚度。陳述（ii）不正確，乾式缸套仍需潤滑；陳述（iv）不正確，乾式缸套通過氣缸體間接冷卻。","zh-CN":"干式气缸套不与冷却水直接接触（i），冷却液通过气缸体中的水道流动而非直接围绕缸套。干式缸套壁比湿式缸套更薄（iii），因为不需要承受直接水接触和密封的结构厚度。陈述（ii）不正确，干式缸套仍需润滑；陈述（iv）不正确，干式缸套通过气缸体间接冷却。","en":"Dry cylinder liners do not come into direct contact with cooling water (i), as the coolant flows through passages in the cylinder block rather than around the liner. They are also thinner than wet liners (iii) since they do not need the structural thickness to withstand direct water contact and sealing. Statement (ii) is incorrect as dry liners still require lubrication, and (iv) is incorrect as they are cooled indirectly through the cylinder block."},"img":"guide_p248_content.png"},{"id":"B3","ch":"ch15","q":{"zh-TW":"一部汽油機在起動時，節氣門的作用是 (i). 使燃油／空氣混合物變成較濃厚 (ii).令火花塞較易燃點燃油／空氣混合物","zh-CN":"一部汽油机在起動时，节气门的作用是 (i). 使燃油／空气混合物变成较濃厚 (ii).令火花塞较易燃点燃油／空气混合物","en":"When starting a petrol engine, the function of the throttle is:\n(i) To make the fuel/air mixture richer\n(ii) To make it easier for the spark plug to ignite the fuel/air mixture"},"o":[{"zh-TW":"(i)","zh-CN":"(i)","en":"(i) only"},{"zh-TW":"(ii)","zh-CN":"(ii)","en":"(ii) only"},{"zh-TW":"(i) 及 (ii) 全對","zh-CN":"(i) 及 (ii) 全对","en":"Both (i) and (ii) are correct"},{"zh-TW":"(i) 及 (ii) 全不對","zh-CN":"(i) 及 (ii) 全不对","en":"Both (i) and (ii) are incorrect"}],"a":3,"exp":{"zh-TW":"起動汽油機時，節氣門的作用是通過允許更多燃油進入進氣道來加濃燃油/空氣混合物，輔助冷起動。加濃的混合物確實使點火更容易，因此陳述（i）和（ii）都是正確的。","zh-CN":"启动汽油机时，节气门的作用是通过允许更多燃油进入进气道来加浓燃油/空气混合物，辅助冷启动。加浓的混合物确实使点火更容易，因此陈述（i）和（ii）都是正确的。","en":"When starting a petrol engine, the throttle is used to enrich the fuel/air mixture by allowing more fuel into the intake, aiding cold starting. The enriched mixture does make ignition easier, so both statements (i) and (ii) are correct."},"img":"guide_p164_content.png"},{"id":"B4","ch":"ch15","q":{"zh-TW":"一部四衝程汽油機，分火器的速度為:-","zh-CN":"一部四衝程汽油机，分火器的速度为:-","en":"In a four-stroke petrol engine, the speed of the distributor is:"},"o":[{"zh-TW":"主機速度一樣","zh-CN":"主机速度一樣","en":"The same as the engine speed"},{"zh-TW":"主機速度一半","zh-CN":"主机速度一半","en":"Half the engine speed"},{"zh-TW":"主機速度兩倍","zh-CN":"主机速度兩倍","en":"Double the engine speed"},{"zh-TW":"主機速度四倍","zh-CN":"主机速度四倍","en":"Four times the engine speed"}],"a":1,"exp":{"zh-TW":"在四衝程汽油機中，曲軸每完成一個工作循環需旋轉兩圈。由於分火器必須在每個氣缸的每個循環點火一次，因此它由凸輪軸齒輪驅動，轉速為主機速度的一半。","zh-CN":"在四冲程汽油机中，曲轴每完成一个工作循环需旋转两圈。由于分电器必须在每个气缸的每个循环点火一次，因此它由凸轮轴齿轮驱动，转速为发动机转速的一半。","en":"In a four-stroke engine, the crankshaft rotates twice for every complete cycle (four strokes). Since the distributor must fire the spark plugs once per cycle per cylinder, it is driven at half the engine (crankshaft) speed by the camshaft gear."},"img":"guide_p152_content.png"},{"id":"B5","ch":"ch16","q":{"zh-TW":"在柴油機共軌燃油噴射系統中，燃油噴射壓力是由____調節。","zh-CN":"在柴油机共軌燃油噴射系统中，燃油噴射壓力是由____调节。","en":"In a diesel engine common rail fuel injection system, the fuel injection pressure is regulated by ____."},"o":[{"zh-TW":"高壓燃油泵","zh-CN":"高壓燃油泵","en":"The high-pressure fuel pump"},{"zh-TW":"高壓燃油積累管","zh-CN":"高壓燃油积累管","en":"The high-pressure fuel accumulator rail"},{"zh-TW":"噴油器","zh-CN":"噴油器","en":"The fuel injector"},{"zh-TW":"限制閥","zh-CN":"限制阀","en":"The pressure limiting valve"}],"a":3,"exp":{"zh-TW":"在共軌燃油噴射系統中，燃油噴射壓力由限制閥（也稱為壓力釋放閥）調節。當油軌壓力超過設定值時，該閥通過將多餘燃油釋放回油箱來調節油軌壓力。","zh-CN":"在共轨燃油喷射系统中，燃油喷射压力由限制阀（也称为压力释放阀）调节。当油轨压力超过设定值时，该阀通过将多余燃油释放回油箱来调节油轨压力。","en":"In a common rail fuel injection system, the fuel injection pressure is controlled by the pressure limiting valve (also known as the pressure relief valve). This valve regulates the pressure in the rail by releasing excess fuel back to the tank when the pressure exceeds the set value."},"img":"guide_p187_content.png"},{"id":"B8","ch":"ch18","q":{"zh-TW":"內燃引擎使用水冷式的排氣管及消聲器的船隻，注入消聲器的水源，通常是來自 _______。","zh-CN":"內燃引擎使用水冷式的排气管及消声器的船隻，注入消声器的水源，通常是來自 _______。","en":"For vessels using water-cooled exhaust pipes and silencers, the water supply injected into the silencer usually comes from _____."},"o":[{"zh-TW":"引擎海水冷卻系統","zh-CN":"引擎海水冷卻系统","en":"The engine seawater cooling system"},{"zh-TW":"獨立海水泵","zh-CN":"独立海水泵","en":"An independent seawater pump"},{"zh-TW":"獨立淡水水箱","zh-CN":"独立淡水水箱","en":"An independent freshwater tank"},{"zh-TW":"引擎淡水冷卻系統","zh-CN":"引擎淡水冷卻系统","en":"The engine freshwater cooling system"}],"a":0,"exp":{"zh-TW":"在使用水冷式排氣管及消聲器的船隻上，注入消聲器的冷卻水通常來自引擎海水冷卻系統。這是最實用的水源，因為海水容易獲得，且能為排氣部件提供足夠的冷卻。","zh-CN":"在使用水冷式排气管和消音器的船舶上，注入消音器的冷却水通常来自发动机海水冷却系统。这是最实用的水源，因为海水容易获得，且能为排气部件提供足够的冷却。","en":"On vessels with water-cooled exhaust systems, the silencer is typically supplied with cooling water from the engine's seawater cooling system. This is the most practical source as seawater is readily available and provides sufficient cooling for the exhaust components."},"img":"guide_p150_content.png"},{"id":"B9","ch":"ch19","q":{"zh-TW":"以下那個陳述對發動機氣缸潤滑的作用是[正確]？ (i) 冷卻氣缸套 (ii) 帶走燃燒殘留雜質 (iii) 減少噪音 (iv) 減少氣缸套和活塞磨損","zh-CN":"以下那个陈述对發動机气缸潤滑的作用是[正确]？ (i) 冷卻气缸套 (ii) 带走燃燒殘留杂质 (iii) 減少噪音 (iv) 減少气缸套和活塞磨损","en":"Which of the following statements about the functions of engine cylinder lubrication is CORRECT?\n(i) Cooling the cylinder liner\n(ii) Removing combustion residues\n(iii) Reducing noise\n(iv) Reducing wear between the cylinder liner and piston"},"o":[{"zh-TW":"(ii), (iii) 和(iv)","zh-CN":"(ii), (iii) 和(iv)","en":"(ii), (iii) and (iv)"},{"zh-TW":"(i), (ii) 和(iv)","zh-CN":"(i), (ii) 和(iv)","en":"(i), (ii) and (iv)"},{"zh-TW":"(ii) 和(iv)","zh-CN":"(ii) 和(iv)","en":"(ii) and (iv)"},{"zh-TW":"(iv)","zh-CN":"(iv)","en":"(iv) only"}],"a":0,"exp":{"zh-TW":"氣缸潤滑有多種重要功能：帶走燃燒殘留雜質（ii）、通過緩衝活塞運動減少噪音（iii）、以及減少氣缸套與活塞環之間的磨損（iv）。雖然潤滑確實提供一定的冷卻效果，但冷卻氣缸套主要是冷卻水系統的功能，而非潤滑的作用。","zh-CN":"气缸润滑有多种重要功能：带走燃烧残留物（ii）、通过缓冲活塞运动减少噪音（iii）、以及减少气缸套与活塞环之间的磨损（iv）。虽然润滑确实提供一定的冷却效果，但冷却气缸套主要是冷却水系统的功能，而非润滑的作用。","en":"Cylinder lubrication serves multiple important functions: it removes combustion residues (ii), reduces noise by cushioning piston movement (iii), and reduces wear between the cylinder liner and piston rings (iv). While lubrication does provide some cooling effect, cooling the cylinder liner is primarily the function of the cooling water system, not lubrication."},"img":"guide_p150_content.png"},{"id":"B10","ch":"ch16","q":{"zh-TW":"柴油發動機低壓燃油管中有空氣會導致： (i) 發動機振動 (ii) 噴油系統過熱 (iii) 發動機啟動故障","zh-CN":"柴油發動机低壓燃油管中有空气会導致： (i) 發動机振動 (ii) 噴油系统过熱 (iii) 發動机啟動故障","en":"Air in the low-pressure fuel line of a diesel engine can cause:\n(i) Engine vibration\n(ii) Overheating of the fuel injection system\n(iii) Engine starting failure"},"o":[{"zh-TW":"(iii)","zh-CN":"(iii)","en":"(iii) only"},{"zh-TW":"(i) 和(ii)","zh-CN":"(i) 和(ii)","en":"(i) and (ii)"},{"zh-TW":"(i)","zh-CN":"(i)","en":"(i) only"},{"zh-TW":"(i) 和(iii)","zh-CN":"(i) 和(iii)","en":"(i) and (iii)"}],"a":3,"exp":{"zh-TW":"低壓燃油管中的空氣會破壞正常的燃油輸送，由於燃燒不均勻會導致發動機振動（i），並且由於燃油系統無法建立必要的壓力而導致發動機啟動故障（iii）。但燃油管中的空氣不會導致噴油系統過熱（ii）。","zh-CN":"低压燃油管中的空气会破坏正常的燃油输送，由于燃烧不均匀会导致发动机振动（i），并且由于燃油系统无法建立必要的压力而导致发动机启动故障（iii）。但燃油管中的空气不会导致喷油系统过热（ii）。","en":"Air in the low-pressure fuel line disrupts proper fuel delivery, which can cause engine vibration (i) due to uneven combustion and engine starting failure (iii) because the fuel system cannot build up the necessary pressure. However, air in the fuel line does not cause overheating of the injection system (ii)."},"img":"guide_p187_content.png"},{"id":"B11","ch":"ch19","q":{"zh-TW":"潤滑油壓力異常低的原因有： （i）海水過度冷卻 （ii）曲軸箱中的油位高 （iii）輕微磨損的活塞環和氣缸套 （iv）潤滑油壓力錶失靈 （v）嚴重磨損的潤滑油泵","zh-CN":"潤滑油壓力异常低的原因有： （i）海水过度冷卻 （ii）曲軸箱中的油位高 （iii）轻微磨损的活塞环和气缸套 （iv）潤滑油壓力錶失灵 （v）嚴重磨损的潤滑油泵","en":"Possible causes of abnormally low lubricating oil pressure include:\n(i) Excessive cooling by seawater\n(ii) High oil level in the crankcase\n(iii) Slightly worn piston rings and cylinder liner\n(iv) Faulty lubricating oil pressure gauge\n(v) Severely worn lubricating oil pump"},"o":[{"zh-TW":"(i) 和(ii)","zh-CN":"(i) 和(ii)","en":"(i) and (ii)"},{"zh-TW":"(ii) 和(iii)","zh-CN":"(ii) 和(iii)","en":"(ii) and (iii)"},{"zh-TW":"(iii) 和(iv)","zh-CN":"(iii) 和(iv)","en":"(iii) and (iv)"},{"zh-TW":"(iv) 和(v)","zh-CN":"(iv) 和(v)","en":"(iv) and (v)"}],"a":3,"exp":{"zh-TW":"潤滑油壓力錶失靈（iv）可能在實際壓力正常時顯示低讀值。潤滑油泵嚴重磨損（v）無法產生足夠的壓力，導致油壓真正偏低。油位偏高（ii）和輕微磨損的活塞環及缸套（iii）不會導致油壓低；海水過度冷卻（i）會增加潤滑油粘度，可能反而使壓力升高。","zh-CN":"润滑油压力表故障（iv）可能在实际压力正常时显示低读值。润滑油泵严重磨损（v）无法产生足够的压力，导致油压真正偏低。油位偏高（ii）和轻微磨损的活塞环及缸套（iii）不会导致油压低；海水过度冷却（i）会增加润滑油粘度，可能反而使压力升高。","en":"A faulty lubricating oil pressure gauge (iv) can give a false low reading even though actual pressure is normal. A severely worn lubricating oil pump (v) cannot generate adequate pressure, resulting in genuinely low oil pressure. High oil level (ii) and slightly worn piston rings (iii) would not cause low oil pressure; excessive seawater cooling (i) would increase oil viscosity and potentially raise pressure."},"img":"guide_p150_content.png"},{"id":"B12","ch":"ch19","q":{"zh-TW":"主柴油機剛起動後，控制錶板上有何顯示 (i). 冷卻淡水溫度錶指示最高溫度 (ii). 潤滑油壓力錶指示額定壓力 (iii). 轉速錶指示全速轉數","zh-CN":"主柴油机剛起動後，控制錶板上有何显示 (i). 冷卻淡水温度錶指示最高温度 (ii). 潤滑油壓力錶指示额定壓力 (iii). 转速錶指示全速转数","en":"Immediately after starting the main diesel engine, what should the control panel instruments show?\n(i) The cooling freshwater temperature gauge indicates maximum temperature\n(ii) The lubricating oil pressure gauge indicates rated pressure\n(iii) The tachometer indicates full speed RPM"},"o":[{"zh-TW":"(i)","zh-CN":"(i)","en":"(i)"},{"zh-TW":"(ii)","zh-CN":"(ii)","en":"(ii)"},{"zh-TW":"(iii)","zh-CN":"(iii)","en":"(iii)"},{"zh-TW":"(i) and (iii)","zh-CN":"(i) and (iii)","en":"(i) and (iii)"}],"a":1,"exp":{"zh-TW":"主柴油機剛起動後，潤滑油壓力錶應顯示額定壓力（ii），因為油泵開始在整個發動機中循環潤滑油。冷卻淡水溫度錶可能最初讀數較高（在恆溫器打開和水開始循環之前），轉速錶應顯示怠速轉數，而非全速轉數。","zh-CN":"柴油机刚启动后，润滑油压力表应显示额定压力（ii），因为油泵开始在整个发动机中循环润滑油。冷却水温度表可能最初读数较高（在恒温器打开和水开始循环之前），转速表应显示怠速转速，而非全速转速。","en":"Immediately after starting a diesel engine, the lubricating oil pressure gauge should show rated pressure (ii) as the oil pump begins circulating oil throughout the engine. The cooling water temperature gauge may initially read high (before the thermostat opens and water circulates), and the tachometer would show idle speed, not full speed RPM."},"img":"guide_p187_content.png"},{"id":"B13","ch":"ch18","q":{"zh-TW":"液壓式舵機出現氣鎖的原因 (i).管路接口有洩漏 (ii).油量不足","zh-CN":"液壓式舵机出現气锁的原因 (i).管路接口有洩漏 (ii).油量不足","en":"The causes of air lock in a hydraulic steering gear are:\n(i) Leakage at pipeline connections\n(ii) Insufficient oil level"},"o":[{"zh-TW":"(i)","zh-CN":"(i)","en":"(i)"},{"zh-TW":"(ii)","zh-CN":"(ii)","en":"(ii)"},{"zh-TW":"(i) 及 (ii) 全對","zh-CN":"(i) 及 (ii) 全对","en":"Both (i) and (ii) are correct"},{"zh-TW":"(i) 及 (ii) 全不對","zh-CN":"(i) 及 (ii) 全不对","en":"Both (i) and (ii) are incorrect"}],"a":2,"exp":{"zh-TW":"液壓式舵機出現氣鎖的原因包括管路接口洩漏（i），這會使空氣進入液壓系統；以及油量不足（ii），這意味著沒有足夠的油液充滿系統，可能形成氣泡。兩者都是液壓系統中氣鎖的常見原因。","zh-CN":"液压舵机出现气锁的原因包括管路接口泄漏（i），这会使空气进入液压系统；以及油量不足（ii），这意味着没有足够的油液充满系统，可能形成气泡。两者都是液压系统中气锁的常见原因。","en":"Air lock in a hydraulic steering gear can be caused by both leakage at pipeline connections (i), which allows air to enter the hydraulic system, and insufficient oil level (ii), which means there is not enough oil to fill the system and air pockets can form. Both are common causes of air lock in hydraulic systems."},"img":"guide_p218_content.png"},{"id":"B14","ch":"ch17","q":{"zh-TW":"起動小型簡單舷外汽油機時，首先兩個重要步驟是：","zh-CN":"起動小型简單舷外汽油机时，首先兩个重要步驟是：","en":"When starting a small simple outboard petrol engine, the first two important steps are:"},"o":[{"zh-TW":"將舷外汽油機的波箱降低到水線以下位置，然後檢查齒輪是否在中立檔位置","zh-CN":"將舷外汽油机的波箱降低到水线以下位置，然後檢查齿轮是否在中立檔位置","en":"Lower the outboard engine gearbox below the waterline, then check that the gear is in the neutral position"},{"zh-TW":"按起動機按鈕和開啟節氣門","zh-CN":"按起動机按鈕和开啟节气门","en":"Press the starter button and open the throttle"},{"zh-TW":"將齒輪放在中立檔位置和開啟節氣門","zh-CN":"將齿轮放在中立檔位置和开啟节气门","en":"Place the gear in the neutral position and open the throttle"},{"zh-TW":"拉扯起動機繩索和嚙合齒輪","zh-CN":"拉扯起動机绳索和嚙合齿轮","en":"Pull the starter rope and engage the gear"}],"a":0,"exp":{"zh-TW":"起動小型簡單舷外汽油機時，安全要求首先將波箱降低到水線以下以便水泵能吸取冷卻水，然後確認齒輪在中立檔位置以防螺旋槳轉動造成危險。這些步驟必須在嘗試起動引擎之前完成。","zh-CN":"启动小型舷外汽油机时，安全要求首先将齿轮箱降到水线以下以便水泵能吸取冷却水，然后确认齿轮在空档位置以防螺旋桨转动造成危险。这些步骤必须在尝试启动发动机之前完成。","en":"When starting a small outboard petrol engine, safety requires first lowering the gearbox below the waterline so the water pump can draw cooling water, and then verifying the gear is in neutral to prevent the propeller from turning and causing a hazard. These steps must be completed before attempting to start the engine."},"img":"guide_p209_content.png"},{"id":"B15","ch":"ch16","q":{"zh-TW":"正常情況下，柴油機用那種方法停車:-","zh-CN":"正常情况下，柴油机用那種方法停车:-","en":"Under normal circumstances, a diesel engine is shut down by which method?"},"o":[{"zh-TW":"截停助燃氣流","zh-CN":"截停助燃气流","en":"Cutting off the air supply for combustion"},{"zh-TW":"截停燃油供應","zh-CN":"截停燃油供应","en":"Cutting off the fuel supply"},{"zh-TW":"關閉電源","zh-CN":"关闭电源","en":"Shutting off the electrical power"},{"zh-TW":"制動停止","zh-CN":"制動停止","en":"Applying the brake to stop"}],"a":1,"exp":{"zh-TW":"柴油機正常情況下通過截停燃油供應（B）來停車。這是通過移動燃油控制桿或關閉燃油閥來實現的。與需要點火系統的汽油機不同，柴油機依靠壓縮點火，沒有可以關閉的電氣點火系統。","zh-CN":"柴油机正常情况下通过截断燃油供应（B）来停机。这是通过移动燃油控制杆或关闭燃油阀来实现的。与需要点火系统的汽油机不同，柴油机依靠压缩点火，没有可以关闭的电气点火系统。","en":"Diesel engines are normally shut down by cutting off the fuel supply (B). This is achieved by moving the fuel control lever or shutting off the fuel valve. Unlike petrol engines which require an ignition system, diesel engines rely on compression ignition and do not have an electrical ignition system that can be switched off."},"img":"guide_p187_content.png"},{"id":"B16","ch":"ch19","q":{"zh-TW":"若船隻觸礁，救援仍沒到現場前，執行下列那些措施最為適當？ (i). 停止所有主機 (ii). 檢示機艙、主機、尾軸(濕)等是否有損壞 (iii). 用艙底泵，泵走所有積水 (iv). 加大主機馬力，試圖離開礁石 (v). 拋棄貨物、放走所有燃油、淡水，使船身浮起","zh-CN":"若船隻觸礁，救援仍沒到現场前，执行下列那些措施最为适当？ (i). 停止所有主机 (ii). 檢示机艙、主机、尾軸(濕)等是否有损壞 (iii). 用艙底泵，泵走所有积水 (iv). 加大主机马力，试图离开礁石 (v). 拋棄货物、放走所有燃油、淡水，使船身浮起","en":"If a vessel runs aground and rescue has not yet arrived, which of the following measures are most appropriate?\n(i) Stop all main engines\n(ii) Inspect the engine room, main engines, and stern tube (wet) for damage\n(iii) Use the bilge pump to pump out all accumulated water\n(iv) Increase main engine power to try to leave the reef\n(v) Jettison cargo, discharge all fuel and fresh water to refloat the vessel"},"o":[{"zh-TW":"(i), (ii) 及(iii)","zh-CN":"(i), (ii) 及(iii)","en":"(i), (ii) and (iii)"},{"zh-TW":"(ii), (iii) 及(iv)","zh-CN":"(ii), (iii) 及(iv)","en":"(ii), (iii) and (iv)"},{"zh-TW":"(i), (iii) 及(iv)","zh-CN":"(i), (iii) 及(iv)","en":"(i), (iii) and (iv)"},{"zh-TW":"(iii), (iv) 及(v)","zh-CN":"(iii), (iv) 及(v)","en":"(iii), (iv) and (v)"}],"a":0,"exp":{"zh-TW":"船隻觸礁後，在救援到達之前，適當的緊急措施包括：停止所有主機（i）以防進一步損壞，檢查損壞情況（ii）評估狀況，以及用艙底泵排水（iii）維持浮力。加大馬力（iv）和拋棄貨物（v）應僅在適當評估後作為最後手段。","zh-CN":"船舶触礁后，在救援到达之前，适当的紧急措施包括：停止所有主机（i）以防进一步损坏，检查损坏情况（ii）评估状况，以及用舱底泵排水（iii）维持浮力。加大马力（iv）和抛弃货物（v）应仅在适当评估后作为最后手段。","en":"When a vessel runs aground, the appropriate immediate actions are to stop all engines (i) to prevent further damage, inspect for damage (ii) to assess the situation, and pump out accumulated water (iii) to maintain buoyancy. Increasing power (iv) and jettisoning cargo (v) should only be attempted after proper assessment and as a last resort."},"img":"guide_p223_content.png"},{"id":"B17","ch":"ch14","q":{"zh-TW":"在船身及螺旋槳正確地配合下，推進引擎的理想狀態應在","zh-CN":"在船身及螺旋槳正确地配合下，推進引擎的理想狀态应在","en":"With the hull and propeller correctly matched, the ideal operating condition for a propulsion engine should be at:"},"o":[{"zh-TW":"全馬力下加速","zh-CN":"全马力下加速","en":"Full power at accelerating"},{"zh-TW":"最小馬力下加速","zh-CN":"最小马力下加速","en":"Minimum power at accelerating"},{"zh-TW":"全馬力下全速運轉","zh-CN":"全马力下全速运转","en":"Full power at full speed"},{"zh-TW":"最小馬力下全速運轉","zh-CN":"最小马力下全速运转","en":"Minimum power at full speed"}],"a":2,"exp":{"zh-TW":"船用推進引擎的理想運行狀態是在全馬力下全速運轉（C），此時引擎在設計點運行，效率最優。船身和螺旋槳的設計與引擎在額定轉速下的全功率輸出相匹配，以獲得最大推進效率。","zh-CN":"船用推进发动机的理想运行状态是在全马力下全速运转（C），此时发动机在设计点运行，效率最优。船体和螺旋桨的设计与发动机在额定转速下的全功率输出相匹配，以获得最大推进效率。","en":"The ideal operating condition for a marine propulsion engine is running at full power at full speed (C), where the engine operates at its design point with optimal efficiency. The hull and propeller are designed to match the engine's full power output at the rated speed for maximum propulsion efficiency."},"img":"guide_p150_content.png"},{"id":"B18","ch":"ch14","q":{"zh-TW":"間接冷卻式船用發動機的恒溫器不適用於直接冷卻式的船用發動機，這是因為 (i).它們的運作原理不同 (ii).它們的操作/運作温度不同 (iii).它們在海水中不能操作","zh-CN":"间接冷卻式船用發動机的恒温器不适用于直接冷卻式的船用發動机，这是因为 (i).它們的运作原理不同 (ii).它們的操作/运作温度不同 (iii).它們在海水中不能操作","en":"The thermostat used in an indirect cooling marine engine is not suitable for a direct cooling marine engine because:\n(i) Their operating principles are different\n(ii) Their operating temperatures are different\n(iii) They cannot operate in seawater"},"o":[{"zh-TW":"(i)","zh-CN":"(i)","en":"(i)"},{"zh-TW":"(i) 和(ii)","zh-CN":"(i) 和(ii)","en":"(i) and (ii)"},{"zh-TW":"(iii)","zh-CN":"(iii)","en":"(iii)"},{"zh-TW":"(i), (ii) 及 (iii) 皆不正確","zh-CN":"(i), (ii) 及 (iii) 皆不正确","en":"None of (i), (ii) and (iii) is correct"}],"a":1,"exp":{"zh-TW":"間接冷卻和直接冷卻系統的恆溫器在運作原理（i）和操作/運作溫度（ii）上都有所不同。間接冷卻系統中恆溫器調節淡水溫度，範圍較高；而在直接使用海水冷卻時，由於海水的腐蝕性和不同的溫度要求，操作參數和材料必須不同。","zh-CN":"间接冷却和直接冷却系统的恒温器在运作原理（i）和操作温度（ii）上都有所不同。间接冷却系统中恒温器调节淡水温度，范围较高；而在直接使用海水冷却时，由于海水的腐蚀性和不同的温度要求，操作参数和材料必须不同。","en":"Thermostats for indirect and direct cooling systems differ in both operating principles (i) and operating temperatures (ii). In indirect cooling, the thermostat regulates freshwater temperature at a higher range, while in direct cooling with seawater, the operating parameters and materials must be different due to seawater's corrosive nature and different temperature requirements."},"img":"guide_p249_content.png"},{"id":"B19","ch":"ch19","q":{"zh-TW":"當潤滑油壓力報警鐘嚮起時，你會立刻：","zh-CN":"当潤滑油壓力报警钟向起时，你会立刻：","en":"When the lubricating oil pressure alarm sounds, you should immediately:"},"o":[{"zh-TW":"將發動機減速","zh-CN":"將發動机減速","en":"Reduce the engine speed"},{"zh-TW":"繼續運行，並找尋原因","zh-CN":"繼续运行，並找尋原因","en":"Continue running and look for the cause"},{"zh-TW":"添加潤滑油","zh-CN":"添加潤滑油","en":"Add lubricating oil"},{"zh-TW":"立即停機","zh-CN":"立即停机","en":"Shut down the engine immediately"}],"a":0,"exp":{"zh-TW":"當潤滑油壓力報警鐘響起時，首先應做的是將發動機減速（A）。這可以減少軸承和其他運動部件的負荷，將潤滑不足造成的潛在損害降到最低。減速後應調查油壓低的原因，再決定是否繼續運行或完全停機。","zh-CN":"当润滑油压力报警器响起时，首先应做的是降低发动机转速（A）。这可以减少轴承和其他运动部件的负荷，将润滑不足造成的潜在损害降到最低。降速后应调查油压低的原因，再决定是否继续运行或完全停机。","en":"When the lubricating oil pressure alarm sounds, the first action should be to reduce engine speed (A). This reduces the load on the bearings and other moving parts, minimizing potential damage from inadequate lubrication. After reducing speed, the cause of the low oil pressure should be investigated before deciding whether to continue operating or shut down completely."},"img":"guide_p248_content.png"},{"id":"B20","ch":"ch20","q":{"zh-TW":"隔熱物料安裝在排氣管上有何功用？ I. 減少排氣管熱力散發。 II. 降低機房溫度。 III. 防止高溫的排氣管與任何油類接觸引發火警。 IV. 防止高溫的排氣管有機會灼傷在輪機艙的工作人員。","zh-CN":"隔熱物料安裝在排气管上有何功用？ I. 減少排气管熱力散發。 II. 降低机房温度。 III. 防止高温的排气管与任何油類接觸引發火警。 IV. 防止高温的排气管有机会灼傷在轮机艙的工作人員。","en":"What are the functions of insulating material installed on exhaust pipes?\nI. Reduce heat radiation from the exhaust pipe\nII. Lower the engine room temperature\nIII. Prevent high-temperature exhaust pipes from coming into contact with any oils, which could cause a fire\nIV. Prevent high-temperature exhaust pipes from potentially burning crew members working in the engine room"},"o":[{"zh-TW":"只有(i),(iv)","zh-CN":"只有(i),(iv)","en":"(I) and (IV) only"},{"zh-TW":"只有 (i) , (ii)","zh-CN":"只有 (i) , (ii)","en":"(I) and (II) only"},{"zh-TW":"只有 (ii),(iii)","zh-CN":"只有 (ii),(iii)","en":"(II) and (III) only"},{"zh-TW":"以上皆是","zh-CN":"以上皆是","en":"All of the above"}],"a":3,"exp":{"zh-TW":"排氣管隔熱物料具有以上所有四項功用：減少熱力散發（I）、降低機房溫度（II）、防止油類接觸高溫排氣管引發火警（III）、以及防止高溫排氣管灼傷輪機艙工作人員（IV）。這些都是排氣管隔熱的重要安全和操作功能。","zh-CN":"排气管隔热材料具有以上所有四项功能：减少热辐射（I）、降低机房温度（II）、防止油类接触高温排气管引发火灾（III）、以及保护机舱工作人员免受灼伤（IV）。这些都是排气管隔热的重要安全和操作功能。","en":"Insulating material on exhaust pipes serves all four listed functions: it reduces heat radiation (I), lowers engine room temperature (II), prevents oil from contacting hot surfaces and causing fire (III), and protects personnel from burns (IV). All are important safety and operational functions of exhaust pipe insulation."},"img":"guide_p268_content.png"},{"id":"B21","ch":"ch17","q":{"zh-TW":"船尾(舷外)汽油機的入氣和排氣閥間隙不足會造成","zh-CN":"船尾(舷外)汽油机的入气和排气阀间隙不足会造成","en":"Insufficient clearance between the intake and exhaust valves of a stern (outboard) petrol engine will cause:"},"o":[{"zh-TW":"汽油／空氣混合物過濃","zh-CN":"汽油／空气混合物过濃","en":"Rich fuel/air mixture"},{"zh-TW":"汽油／空氣混合物過稀","zh-CN":"汽油／空气混合物过稀","en":"Lean fuel/air mixture"},{"zh-TW":"挺杆發出噪音","zh-CN":"挺杆發出噪音","en":"Tappet noise"},{"zh-TW":"喪失壓縮力","zh-CN":"喪失壓縮力","en":"Loss of compression"}],"a":3,"exp":{"zh-TW":"當進氣和排氣閥間隙不足（過緊）時，引擎運行時因熱膨脹導致閥門無法完全關閉。這會導致壓縮力喪失（D），因為燃燒室無法正常密封。這不會直接影響汽油/空氣混合比，也不會引起挺杆噪音（間隙過大才會產生挺杆噪音）。","zh-CN":"当气门间隙不足（过紧）时，发动机运行时因热膨胀导致气门无法完全关闭。这会导致压缩力丧失（D），因为燃烧室无法正常密封。这不会直接影响燃油/空气混合比，也不会引起挺杆噪音（间隙过大才会产生挺杆噪音）。","en":"When the valve clearance is insufficient (too tight), the valves cannot close fully due to thermal expansion when the engine is running. This results in loss of compression (D) as the combustion chamber cannot seal properly. It does not directly affect the fuel/air mixture ratio or cause tappet noise (excessive clearance would cause tappet noise)."},"img":"guide_p209_content.png"},{"id":"B22","ch":"ch18","q":{"zh-TW":"一個活塞泵，將手柄推入時，那些閥門【關閉】？","zh-CN":"一个活塞泵，將手柄推入时，那些阀门【关闭】？","en":"In a piston pump, when the handle is pushed in, which valves are CLOSED?"},"o":[{"zh-TW":"1, 4","zh-CN":"1, 4","en":"1, 4"},{"zh-TW":"2, 3","zh-CN":"2, 3","en":"2, 3"},{"zh-TW":"1, 2","zh-CN":"1, 2","en":"1, 2"},{"zh-TW":"3, 4","zh-CN":"3, 4","en":"3, 4"}],"a":1,"exp":{"zh-TW":"當活塞泵的手柄推入時，閥門2和3關閉。這在入口側產生吸力，使流體通過打開的入口閥進入，而關閉的出口閥防止回流。具體的閥門編號對應圖中所示泵的內部止回閥佈置。","zh-CN":"当活塞泵的手柄推入时，阀门2和3关闭。这在入口侧产生吸力，使流体
