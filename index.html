通过打开的入口阀进入，而关闭的出口阀防止回流。具体的阀门编号对应图中所示泵的内部止回阀布置。","en":"When the handle of a piston pump is pushed in, valves 2 and 3 close. This creates suction on the inlet side drawing fluid through the open inlet valve, while the closed outlet valve prevents backflow. The specific valve numbering corresponds to the diagram showing the pump's internal check valve arrangement."},"img":"exam_B_p7_img1.png"},{"id":"B23","ch":"ch18","q":{"zh-TW":"安裝在電池室內的風扇以防止氫氣積聚，所用的電動馬達（摩打）應為下列那一種？","zh-CN":"安裝在电池室內的风扇以防止氫气积聚，所用的电動马达（摩打）应为下列那一種？","en":"A fan installed in the battery compartment to prevent the accumulation of hydrogen gas should use which type of electric motor?"},"o":[{"zh-TW":"防滴水式","zh-CN":"防滴水式","en":"Drip-proof type"},{"zh-TW":"水密式","zh-CN":"水密式","en":"Watertight type"},{"zh-TW":"防風雨式","zh-CN":"防风雨式","en":"Weatherproof type"},{"zh-TW":"防爆式","zh-CN":"防爆式","en":"Explosion-proof type"}],"a":3,"exp":{"zh-TW":"氫氣與空氣混合後極易燃燒和爆炸。電池室必須使用防爆式電動馬達（D），因為馬達產生的任何電火花都可能點燃氫氣引發爆炸。其他類型的馬達無法提供足夠的防護來避免點燃爆炸性氣體環境。","zh-CN":"氢气与空气混合后极易燃烧和爆炸。电池室必须使用防爆型电动机（D），因为电动机产生的任何电火花都可能点燃氢气引发爆炸。其他类型的电动机无法提供足够的防护来避免点燃爆炸性气体环境。","en":"Hydrogen gas is highly flammable and explosive when mixed with air. An explosion-proof (flameproof) motor (D) is required in battery compartments because any electrical spark from the motor could ignite the hydrogen gas and cause an explosion. Other motor types do not provide adequate protection against igniting explosive gas atmospheres."},"img":"guide_p231_content.png"},{"id":"B24","ch":"ch18","q":{"zh-TW":"單元電池的容量依賴於","zh-CN":"單元电池的容量依賴于","en":"The capacity of a battery cell depends on:"},"o":[{"zh-TW":"能維持一定時間的電壓","zh-CN":"能维持一定时间的电壓","en":"The voltage it can maintain over a certain period of time"},{"zh-TW":"充電的時間","zh-CN":"充电的时间","en":"The charging time"},{"zh-TW":"浸在電解液裏的電池板表面面積","zh-CN":"浸在电解液裏的电池板表面面积","en":"The surface area of the battery plates immersed in the electrolyte"},{"zh-TW":"單元電池的數目","zh-CN":"單元电池的数目","en":"The number of battery cells"}],"a":2,"exp":{"zh-TW":"單元電池的容量取決於浸在電解液裏的電池板表面面積（C）。更大的板表面積提供更多活性物質用於化學反應，使電池能夠儲存和釋放更多電能。單元電池的電壓由其化學成分決定，而非容量。","zh-CN":"单格电池的容量取决于浸在电解液中的电池极板表面积（C）。更大的极板表面积提供更多的活性物质用于化学反应，使电池能够储存和释放更多电能。电池的电压由其化学成分决定，而非容量。","en":"The capacity of a battery cell depends on the surface area of the battery plates immersed in the electrolyte (C). A larger plate surface area provides more active material for the chemical reaction, allowing the cell to store and deliver more electrical energy. The voltage of a cell is determined by its chemistry, not its capacity."},"img":"guide_p231_content.png"},{"id":"B25","ch":"ch18","q":{"zh-TW":"發電機在操作中的一般注意事項:- (i) 應該保持清潔和乾燥 (ii) 軸承要保持潤滑良好 (iii) 調速器要保持在良好的狀況 (iv) 應該保持一定不變負載","zh-CN":"發电机在操作中的一般注意事项:- (i) 应该保持清洁和乾燥 (ii) 軸承要保持潤滑良好 (iii) 调速器要保持在良好的狀况 (iv) 应该保持一定不变负载","en":"General precautions during generator operation:\n(i) Should be kept clean and dry\n(ii) Bearings should be kept well lubricated\n(iii) The governor should be maintained in good condition\n(iv) Should maintain a constant unchanging load"},"o":[{"zh-TW":"(i), (ii) 及(iii)","zh-CN":"(i), (ii) 及(iii)","en":"(i), (ii) and (iii)"},{"zh-TW":"(ii), (iii) 及(iv)","zh-CN":"(ii), (iii) 及(iv)","en":"(ii), (iii) and (iv)"},{"zh-TW":"(i), (iii) 及(iv)","zh-CN":"(i), (iii) 及(iv)","en":"(i), (iii) and (iv)"},{"zh-TW":"(i), (ii) 及(iv)","zh-CN":"(i), (ii) 及(iv)","en":"(i), (ii) and (iv)"}],"a":0,"exp":{"zh-TW":"發電機操作的一般注意事項包括保持清潔乾燥（i）、軸承保持良好潤滑（ii）以及調速器保持良好狀況（iii）。保持一定不變負載（iv）不是一般要求，發電機設計用於在其額定容量內處理變化的負載。","zh-CN":"发电机操作的一般注意事项包括保持清洁干燥（i）、轴承保持良好润滑（ii）以及调速器保持良好状态（iii）。保持恒定不变的负荷（iv）不是一般要求，发电机设计用于在其额定容量内处理变化的负荷。","en":"General generator operating precautions include keeping the generator clean and dry (i), maintaining well-lubricated bearings (ii), and ensuring the governor is in good condition (iii). Maintaining a constant load (iv) is not a general requirement - generators are designed to handle varying loads within their rated capacity."},"img":"guide_p218_content.png"},{"id":"B26","ch":"ch18","q":{"zh-TW":"一艘遊艇靠泊在浮碼頭。接駁岸電電源線之前，你首先要________。(請選擇最合適答案)","zh-CN":"一艘遊艇靠泊在浮码头。接驳岸电电源线之前，你首先要________。(请选擇最合适答案)","en":"A yacht is moored at a floating pier. Before connecting the shore power cable, you must first ________. (Please select the most appropriate answer)"},"o":[{"zh-TW":"關閉碼頭供電箱的主電源供應斷路器及船上配電系統的斷路器","zh-CN":"关闭码头供电箱的主电源供应断路器及船上配电系统的断路器","en":"Switch off the main circuit breaker on the shore power supply box and the circuit breaker on the vessel's distribution system"},{"zh-TW":"拔掉發動機起動電池電線","zh-CN":"拔掉發動机起動电池电线","en":"Disconnect the engine starting battery cables"},{"zh-TW":"固定及收緊所有繫泊纜繩，若有需要，須額外多放幾個護舷。","zh-CN":"固定及收緊所有系泊缆绳，若有需要，须额外多放几个护舷。","en":"Secure and tighten all mooring lines, and if necessary, place additional fenders"},{"zh-TW":"穿上救生衣，預備一瓶二氧化碳滅火器","zh-CN":"穿上救生衣，预备一瓶二氧化碳灭火器","en":"Put on a life jacket and prepare a CO2 fire extinguisher"}],"a":0,"exp":{"zh-TW":"接駁岸電之前，最關鍵的安全步驟是關閉碼頭供電箱的主斷路器及船上配電系統的斷路器（A）。這可以防止在接駁過程中發生觸電、電弧或短路。其他選項雖然是一般良好的做法，但不是接駁岸電之前最關鍵的立即步驟。","zh-CN":"连接岸电之前，最关键的安全步骤是关闭码头供电箱的主断路器和船上配电系统的断路器（A）。这可以防止在连接过程中发生电击、电弧或短路。其他选项虽然是良好的做法，但不是连接岸电之前最关键的立即步骤。","en":"Before connecting shore power, the most critical safety step is to switch off both the shore power supply breaker and the vessel's distribution system breaker (A). This prevents electrical shock, arcing, or short circuits during the connection process. The other options, while good practices in general, are not the most critical immediate step before connecting shore power."},"img":"guide_p46_content.png"},{"id":"B27","ch":"ch20","q":{"zh-TW":"如果有人在機房內觸電，傷者部份身體仍受電擊，在進行營救之 前，你首先必須：","zh-CN":"如果有人在机房內觸电，傷者部份身体仍受电擊，在進行营救之 前，你首先必须：","en":"If someone receives an electric shock in the engine room and part of the victim's body is still in contact with the electrical source, before attempting a rescue you must first:"},"o":[{"zh-TW":"將電源關閉。","zh-CN":"將电源关闭。","en":"Switch off the power supply"},{"zh-TW":"將傷者放在復原位置，及召喚醫護人員。","zh-CN":"將傷者放在復原位置，及召喚医护人員。","en":"Place the victim in the recovery position and call for medical assistance"},{"zh-TW":"開始進行體外心壓法。","zh-CN":"开始進行体外心壓法。","en":"Begin external chest compressions (CPR)"},{"zh-TW":"召喚醫護人員，之後施行人工呼吸及體外心壓法。","zh-CN":"召喚医护人員，之後施行人工呼吸及体外心壓法。","en":"Call for medical assistance, then perform artificial respiration and external chest compressions"}],"a":0,"exp":{"zh-TW":"當有人觸電時，首要任務是將電源關閉（A），以防止傷者和救援者進一步受傷。在傷者仍與電源接觸時，切勿觸碰傷者。只有在電源關閉後才能評估傷者並提供急救。","zh-CN":"当有人触电时，首要任务是切断电源（A），以防止受害者和救援者进一步受伤。在受害者仍与电源接触时，切勿触碰受害者。只有在电源关闭后才能评估受害者并提供急救。","en":"The absolute first priority when someone is being electrocuted is to switch off the power supply (A) to prevent further injury to both the victim and the rescuer. Never touch the victim while they are still in contact with the electrical source. Only after the power is off should you assess the victim and provide first aid."},"img":"guide_p268_content.png"},{"id":"B28","ch":"ch16","q":{"zh-TW":"關於在柴油機起動困難，以下那一說明是不正確的原因:-","zh-CN":"关于在柴油机起動困难，以下那一说明是不正确的原因:-","en":"Regarding diesel engine starting difficulties, which of the following is NOT a correct cause?"},"o":[{"zh-TW":"起動馬達（摩打）轉動柴油機時速度緩慢","zh-CN":"起動马达（摩打）转動柴油机时速度緩慢","en":"The starter motor turns the diesel engine at slow speed"},{"zh-TW":"沒有足夠的潤滑油在曲軸箱內","zh-CN":"沒有足够的潤滑油在曲軸箱內","en":"Insufficient lubricating oil in the crankcase"},{"zh-TW":"空氣過濾器阻塞","zh-CN":"空气过濾器阻塞","en":"Blocked air filter"},{"zh-TW":"燃油泵有氣鎖（空氣）現象","zh-CN":"燃油泵有气锁（空气）現象","en":"Air lock (air) in the fuel pump"}],"a":1,"exp":{"zh-TW":"曲軸箱內潤滑油不足（B）不會直接導致啟動困難——它會在發動機運行後造成磨損增加和潛在損壞，但不會阻止發動機啟動。起動馬達轉速緩慢、空氣過濾器阻塞和燃油泵中有空氣都是柴油機啟動困難的有效原因。","zh-CN":"曲轴箱内润滑油不足（B）不会直接导致启动困难——它会在发动机运行后造成磨损增加和潜在损坏，但不会阻止发动机启动。启动马达转速过慢、空气过滤器堵塞和燃油泵中有空气都是柴油机启动困难的有效原因。","en":"Insufficient lubricating oil in the crankcase (B) does not directly cause starting difficulties - it would cause increased wear and potential damage once running, but would not prevent the engine from starting. Slow starter motor speed, blocked air filter, and air in the fuel pump are all valid causes of diesel engine starting difficulties."},"img":"guide_p150_content.png"},{"id":"B29","ch":"ch17","q":{"zh-TW":"如果船尾(舷外)汽油機不能加速，原因是:-","zh-CN":"如果船尾(舷外)汽油机不能加速，原因是:-","en":"If a stern (outboard) petrol engine cannot accelerate, the cause is:"},"o":[{"zh-TW":"汽油及潤滑油混合物比例不正常","zh-CN":"汽油及潤滑油混合物比例不正常","en":"Abnormal petrol/oil mixture ratio"},{"zh-TW":"化油器噴咀有污物","zh-CN":"化油器噴咀有污物","en":"Blocked carburetor jet"},{"zh-TW":"燃油喉沒有充油","zh-CN":"燃油喉沒有充油","en":"Fuel hose not primed with fuel"},{"zh-TW":"引燃系統有故障","zh-CN":"引燃系统有故障","en":"Ignition system malfunction"}],"a":1,"exp":{"zh-TW":"化油器噴嘴堵塞（B）限制了燃油流向發動機，導致無法正常加速，因為發動機在較高轉速時無法獲得足夠的燃油。雖然其他選項也可能導致各種運行問題，但噴嘴堵塞是舷外汽油機無法加速最常見和直接的原因。","zh-CN":"化油器喷嘴堵塞（B）限制了燃油流向发动机，导致无法正常加速，因为发动机在较高转速时无法获得足够的燃油。虽然其他选项也可能导致各种运行问题，但喷嘴堵塞是舷外汽油机无法加速最常见和直接的原因。","en":"A blocked carburetor jet (B) restricts fuel flow to the engine, which prevents proper acceleration as the engine cannot receive sufficient fuel at higher speeds. While the other options could cause various running problems, a blocked jet is the most common and direct cause of inability to accelerate in an outboard petrol engine."},"img":"guide_p165_content.png"},{"id":"B30","ch":"ch16","q":{"zh-TW":"噴油器洩漏會造成 (i) 動力減弱 (ii) 黑煙 (iii) 震動 (iv) 多耗燃油","zh-CN":"噴油器洩漏会造成 (i) 動力減弱 (ii) 黑煙 (iii) 震動 (iv) 多耗燃油","en":"A leaking fuel injector will cause:\n(i) Reduced power\n(ii) Black smoke\n(iii) Vibration\n(iv) Excessive fuel consumption"},"o":[{"zh-TW":"(i), (ii) 及 (iii)","zh-CN":"(i), (ii) 及 (iii)","en":"(i), (ii) and (iii)"},{"zh-TW":"(i), (iii) 及 (iv)","zh-CN":"(i), (iii) 及 (iv)","en":"(i), (iii) and (iv)"},{"zh-TW":"(ii), (iii) 及 (iv)","zh-CN":"(ii), (iii) 及 (iv)","en":"(ii), (iii) and (iv)"},{"zh-TW":"(i), (ii), (iii) 及 (iv)","zh-CN":"(i), (ii), (iii) 及 (iv)","en":"(i), (ii), (iii) and (iv)"}],"a":3,"exp":{"zh-TW":"噴油器洩漏會導致所有四種症狀：由於燃油輸送正時不正確導致動力減弱（i）、多餘燃油不完全燃燒產生黑煙（ii）、各缸燃燒不均勻引起震動（iii）、以及洩漏造成燃油浪費導致多耗燃油（iv）。所列症狀都是噴油器洩漏的直接後果。","zh-CN":"喷油器泄漏会导致所有四种症状：由于燃油输送正时不正确导致功率下降（i）、多余燃油不完全燃烧产生黑烟（ii）、各缸燃烧不均匀引起振动（iii）、以及泄漏造成燃油浪费导致油耗增加（iv）。所列症状都是喷油器泄漏的直接后果。","en":"A leaking fuel injector causes all four symptoms: reduced power (i) due to improper fuel delivery timing, black smoke (ii) from incomplete combustion of excess fuel, vibration (iii) from uneven combustion across cylinders, and excessive fuel consumption (iv) from fuel waste through the leak. All listed effects are direct consequences of injector leakage."},"img":"guide_p185_content.png"},{"id":"B31","ch":"ch19","q":{"zh-TW":"下列那項是最易引起汽缸磨耗的原因？","zh-CN":"下列那项是最易引起汽缸磨耗的原因？","en":"Which of the following is the most likely cause of cylinder wear?"},"o":[{"zh-TW":"引擎在高速度運作","zh-CN":"引擎在高速度运作","en":"Engine operating at high speed"},{"zh-TW":"引擎在低速度運作","zh-CN":"引擎在低速度运作","en":"Engine operating at low speed"},{"zh-TW":"引擎在冷卻水溫太低運作","zh-CN":"引擎在冷卻水温太低运作","en":"Engine operating with cooling water temperature too low"},{"zh-TW":"引擎在怠速運作時間太長","zh-CN":"引擎在怠速运作时间太长","en":"Engine idling for too long"}],"a":2,"exp":{"zh-TW":"冷卻水溫太低運作（C）是最容易引起汽缸磨耗的原因。當冷卻水過冷時，氣缸壁在低於最佳溫度下運作，導致不完全燃燒並形成酸性燃燒副產物腐蝕缸壁。此外，冷缸壁使燃油凝結在壁上，沖走潤滑油膜。","zh-CN":"冷却水温过低运行（C）是最容易引起汽缸磨损的原因。当冷却水过冷时，气缸壁在低于最佳温度下运行，导致不完全燃烧并形成酸性燃烧副产物腐蚀缸壁。此外，冷缸壁使燃油凝结在壁上，冲走润滑油膜。","en":"Operating with cooling water temperature too low (C) is the most likely cause of cylinder wear. When the cooling water is too cold, the cylinder walls operate below the optimal temperature, causing incomplete combustion and the formation of acidic combustion by-products that corrode the cylinder walls. Additionally, cold cylinders cause fuel to condense on the walls, washing away the lubricating oil film."},"img":"guide_p150_content.png"},{"id":"B32","ch":"ch14","q":{"zh-TW":"下列那一項原因可導致內燃機的「壓縮」消失","zh-CN":"下列那一项原因可導致內燃机的「壓縮」消失","en":"Which of the following can cause loss of 'compression' in an internal combustion engine?"},"o":[{"zh-TW":"燃油的等級不對","zh-CN":"燃油的等级不对","en":"Incorrect fuel grade"},{"zh-TW":"排氣槽洩漏","zh-CN":"排气槽洩漏","en":"Exhaust port leakage"},{"zh-TW":"有排氣閥黏著在開啟的位置","zh-CN":"有排气阀黏著在开啟的位置","en":"An exhaust valve stuck in the open position"},{"zh-TW":"入氣槽洩漏","zh-CN":"入气槽洩漏","en":"Inlet port leakage"}],"a":2,"exp":{"zh-TW":"排氣閥黏著在開啟位置（C）會直接導致壓縮力喪失，因為燃燒室在壓縮行程中無法密封。燃燒廢氣通過打開的排氣閥逸出，阻礙了壓縮所需的壓力積聚。燃油等級不正確會影響燃燒質量但不會影響壓縮，氣槽洩漏會造成一定損失但不如黏著開啟的閥門嚴重。","zh-CN":"排气阀卡在开启位置（C）会直接导致压缩力丧失，因为燃烧室在压缩行程中无法密封。燃烧废气通过打开的排气阀逸出，阻碍了压缩所需的压力积聚。燃油等级不正确会影响燃烧质量但不会影响压缩，气口泄漏会造成一定损失但不如卡开的阀门严重。","en":"An exhaust valve stuck in the open position (C) directly causes loss of compression because the combustion chamber cannot seal during the compression stroke. The burnt gases escape through the open exhaust valve, preventing the pressure build-up needed for compression. Incorrect fuel grade would affect combustion quality but not compression, and port leakage would cause some loss but less severe than a stuck open valve."},"img":"guide_p148_content.png"},{"id":"B33","ch":"ch15","q":{"zh-TW":"汽油機所產生的廢氣較少黑煙，因為： (i) 所燒的燃油較少 (ii) 容易達到完全燃燒 (iii) 汽油含碳量較少 (iv) 汽油容易燃點","zh-CN":"汽油机所產生的廢气较少黑煙，因为： (i) 所燒的燃油较少 (ii) 容易达到完全燃燒 (iii) 汽油含碳量较少 (iv) 汽油容易燃点","en":"Petrol engines produce less black smoke in their exhaust because:\n(i) They burn less fuel\n(ii) Complete combustion is more easily achieved\n(iii) Petrol contains less carbon\n(iv) Petrol ignites easily"},"o":[{"zh-TW":"(i), (ii) 及(iii)","zh-CN":"(i), (ii) 及(iii)","en":"(i), (ii) and (iii)"},{"zh-TW":"(i), (iii) 及(iv)","zh-CN":"(i), (iii) 及(iv)","en":"(i), (iii) and (iv)"},{"zh-TW":"(ii), (iii) 及(iv)","zh-CN":"(ii), (iii) 及(iv)","en":"(ii), (iii) and (iv)"},{"zh-TW":"(i), (ii) 及(iv)","zh-CN":"(i), (ii) 及(iv)","en":"(i), (ii) and (iv)"}],"a":2,"exp":{"zh-TW":"汽油機產生的黑煙較少，因為汽油更容易達到完全燃燒（ii），汽油含碳量比柴油少（iii），且汽油容易燃點（iv）導致更高效的燃燒。所燒的燃油量（i）不是黑煙較少的主要原因，關鍵是燃燒的完全程度。","zh-CN":"汽油机产生的黑烟较少，因为汽油更容易实现完全燃烧（ii），汽油含碳量比柴油少（iii），且汽油容易点燃（iv）导致更高效的燃烧。燃油消耗量（i）不是黑烟较少的主要原因，关键是燃烧的完全程度。","en":"Petrol engines produce less black smoke because complete combustion is more easily achieved (ii) due to better fuel-air mixing, petrol contains less carbon (iii) than diesel fuel, and petrol ignites easily (iv) leading to more efficient combustion. The amount of fuel burned (i) is not a primary reason for less black smoke - it is the completeness of combustion that matters."},"img":"guide_p161_content.png"},{"id":"B35","ch":"ch18","q":{"zh-TW":"當發現油壓式絞盤機儲油櫃內的潤滑油油位太低時，最適當的反應是：","zh-CN":"当發現油壓式絞盤机儲油櫃內的潤滑油油位太低时，最适当的反应是：","en":"When the lubricating oil level in the oil reservoir of a hydraulic winch is found to be too low, the most appropriate response is:"},"o":[{"zh-TW":"馬上停止絞盤機的運作，檢查絞盤機附近及所有喉管是否有漏油的現象","zh-CN":"马上停止絞盤机的运作，檢查絞盤机附近及所有喉管是否有漏油的現象","en":"Immediately stop the winch operation and inspect the winch area and all piping for oil leaks"},{"zh-TW":"馬上將儲油櫃重新注滿","zh-CN":"马上將儲油櫃重新注滿","en":"Immediately refill the reservoir"},{"zh-TW":"確定及排放出儲油櫃內的積水及淤渣","zh-CN":"确定及排放出儲油櫃內的积水及淤渣","en":"Check and drain any accumulated water and sludge from the reservoir"},{"zh-TW":"釋放出儲油櫃內因潤滑油膨脤所產生的壓力","zh-CN":"释放出儲油櫃內因潤滑油膨脤所產生的壓力","en":"Release pressure in the reservoir caused by oil expansion"}],"a":0,"exp":{"zh-TW":"最適當的反應是馬上停止絞盤機運作並檢查漏油（A）。不查明洩漏原因就直接加油會浪費油液，且可能掩蓋嚴重問題。在重新注滿儲油櫃之前，必須找出並修復洩漏源，以防問題再次發生。","zh-CN":"最适当的反应是立即停止绞盘机运作并检查漏油（A）。不查明泄漏原因就直接加油会浪费油液，且可能掩盖严重问题。在重新注满储油柜之前，必须找出并修复泄漏源，以防问题再次发生。","en":"The most appropriate response is to immediately stop the winch and inspect for oil leaks (A). Simply refilling without finding the leak would waste oil and potentially hide a serious problem. Identifying and fixing the leak source is essential before refilling the reservoir to prevent the problem from recurring."},"img":"guide_p248_content.png"},{"id":"B36","ch":"ch20","q":{"zh-TW":"火警之因素為何? (i) 有燃料 (ii) 有空氣 (iii) 燃料與空氣達到燃燒溫度","zh-CN":"火警之因素为何? (i) 有燃料 (ii) 有空气 (iii) 燃料与空气达到燃燒温度","en":"What are the factors required for a fire?\n(i) Fuel\n(ii) Air\n(iii) Fuel and air reaching ignition temperature"},"o":[{"zh-TW":"(i)及(ii)","zh-CN":"(i)及(ii)","en":"(i) and (ii)"},{"zh-TW":"(ii)及(iii)","zh-CN":"(ii)及(iii)","en":"(ii) and (iii)"},{"zh-TW":"(i)及(iii)","zh-CN":"(i)及(iii)","en":"(i) and (iii)"},{"zh-TW":"(i), (ii)及(iii)","zh-CN":"(i), (ii)及(iii)","en":"(i), (ii) and (iii)"}],"a":3,"exp":{"zh-TW":"火警需要火三角的三個要素：燃料（i）、空氣/氧氣（ii）以及達到燃燒溫度的足夠熱量（iii）。三個因素必須同時存在才能發生燃燒。移除這三個要素中的任何一個都能撲滅或預防火災。","zh-CN":"火灾需要火三角的三个要素：燃料（i）、空气/氧气（ii）以及达到着火温度的足够热量（iii）。三个因素必须同时存在才能发生燃烧。移除这三个要素中的任何一个都能扑灭或预防火灾。","en":"A fire requires all three elements of the fire triangle: fuel (i), air/oxygen (ii), and heat sufficient to reach ignition temperature (iii). All three factors must be present simultaneously for combustion to occur. Removing any one of these three elements will extinguish or prevent a fire."},"img":"guide_p268_content.png"},{"id":"B37","ch":"ch20","q":{"zh-TW":"以下那項不適宜救電器失火 (i). 乾粉滅火筒 (ii). 泡沫滅火筒 (iii). 二氧化碳滅火筒","zh-CN":"以下那项不适宜救电器失火 (i). 乾粉灭火筒 (ii). 泡沫灭火筒 (iii). 二氧化碳灭火筒","en":"Which of the following is NOT suitable for fighting electrical fires?\n(i) Dry powder extinguisher\n(ii) Foam extinguisher\n(iii) CO2 extinguisher"},"o":[{"zh-TW":"(i)","zh-CN":"(i)","en":"(i)"},{"zh-TW":"(ii)","zh-CN":"(ii)","en":"(ii)"},{"zh-TW":"(iii)","zh-CN":"(iii)","en":"(iii)"},{"zh-TW":"(i), (ii) 及 (iii) 全不適宜","zh-CN":"(i), (ii) 及 (iii) 全不适宜","en":"None of (i), (ii) and (iii) is suitable"}],"a":1,"exp":{"zh-TW":"泡沫滅火筒（ii）不適宜用於救電器失火，因為泡沫含有導電的水份，對操作人員構成嚴重的觸電風險。對於電器火災，應使用乾粉或二氧化碳滅火筒，因為它們不導電，可在帶電設備上安全使用。","zh-CN":"泡沫灭火器（ii）不适用于扑灭电气火灾，因为泡沫含有导电的水分，对操作人员构成严重的触电风险。对于电气火灾，应使用干粉或二氧化碳灭火器，因为它们不导电，可在带电设备上安全使用。","en":"Foam extinguishers (ii) are not suitable for fighting electrical fires because the foam contains water which conducts electricity, posing a serious electrocution risk to the operator. For electrical fires, dry powder or CO2 extinguishers should be used as they are non-conductive and safe to use on energized equipment."},"img":"guide_p268_content.png"},{"id":"B38","ch":"ch20","q":{"zh-TW":"機房的防火措施不包括","zh-CN":"机房的防火措施不包括","en":"Fire prevention measures in the engine room do NOT include:"},"o":[{"zh-TW":"定期檢查沙箱及滅火器","zh-CN":"定期檢查沙箱及灭火器","en":"Regular inspection of sand boxes and fire extinguishers"},{"zh-TW":"發電機避免有超負荷的情形發生","zh-CN":"發电机避免有超负荷的情形發生","en":"Preventing the generator from being overloaded"},{"zh-TW":"定期舉行消防演習","zh-CN":"定期舉行消防演习","en":"Regular fire drills"},{"zh-TW":"定期操練應急消防水泵系統","zh-CN":"定期操练应急消防水泵系统","en":"Regular drills for the emergency fire pump system"}],"a":1,"exp":{"zh-TW":"防止發電機超負荷（B）是電氣安全措施，而非機房的專用防火措施。雖然超負荷可能導致過熱和火災，但主要是電氣系統管理的問題。其他三個選項都是直接的防火措施：定期檢查消防設備、舉行消防演習和操練應急消防水泵系統。","zh-CN":"防止发电机过载（B）是电气安全措施，而非机房的专用防火措施。虽然过载可能导致过热和火灾，但主要是电气系统管理的问题。其他三个选项都是直接的防火措施：定期检查消防设备、举行消防演习和操练应急消防水泵系统。","en":"Preventing generator overloading (B) is an electrical safety measure, not a fire prevention measure specific to the engine room. While overloading can potentially cause overheating and fire, it is primarily an electrical system management concern. The other three options are all direct fire prevention measures: regular inspection of firefighting equipment, conducting fire drills, and practicing with the emergency fire pump system."},"img":"guide_p83_content.png"},{"id":"B39","ch":"ch21","q":{"zh-TW":"有關『石油氣瓶』的說法，下列那項是不正確：","zh-CN":"有关『石油气瓶』的说法，下列那项是不正确：","en":"Regarding LPG cylinders, which of the following statements is INCORRECT?"},"o":[{"zh-TW":"應放於陽光不會直接照射的地方","zh-CN":"应放于阳光不会直接照射的地方","en":"Should be stored in a location not exposed to direct sunlight"},{"zh-TW":"石油氣瓶與爐灶的石油氣喉管以最短為原則","zh-CN":"石油气瓶与爐灶的石油气喉管以最短为原則","en":"The LPG hose connecting the cylinder to the stove should be as short as possible"},{"zh-TW":"如果石油氣瓶放在櫃內，櫃底必須設有適當的透氣管路","zh-CN":"如果石油气瓶放在櫃內，櫃底必须设有适当的透气管路","en":"If the LPG cylinder is stored in a cabinet, the bottom of the cabinet must have proper ventilation"},{"zh-TW":"石油氣瓶應儲存在甲板上","zh-CN":"石油气瓶应儲存在甲板上","en":"LPG cylinders should be stored on deck"}],"a":1,"exp":{"zh-TW":"石油氣瓶應儲存在甲板上（D）這一說法不正確。石油氣瓶應儲存在通風良好、避免陽光直射和過度高溫的地方，但不應簡單地放在露天甲板上，以免暴露於天氣、海水飛濺或物理損壞。其他說法都是石油氣瓶儲存的正確安全做法。","zh-CN":"石油气瓶应储存在甲板上（D）这一说法不正确。石油气瓶应储存在通风良好、避免阳光直射和过度高温的地方，但不应简单地放在露天甲板上，以免暴露于天气、海水飞溅或物理损坏。其他说法都是石油气瓶存储的正确安全做法。","en":"The statement that LPG cylinders should be stored on deck (D) is incorrect. LPG cylinders should be stored in a well-ventilated area that is protected from direct sunlight and excessive heat, but they should not simply be placed on the open deck where they could be exposed to weather, sea spray, or physical damage. The other statements are all correct safety practices for LPG cylinder storage."}},{"id":"B40","ch":"ch14","q":{"zh-TW":"為何有些柴油燃料的顏色呈現微紅？","zh-CN":"为何有些柴油燃料的颜色呈現微紅？","en":"Why do some diesel fuels have a reddish colour?"},"o":[{"zh-TW":"因應 - 《應課稅品(碳氫油的標記及染色)規例》，而加染色物質進入柴油燃料。","zh-CN":"因应 - 《应课稅品(碳氫油的標记及染色)规例》，而加染色物质進入柴油燃料。","en":"A dye is added to the diesel fuel in accordance with the 'Dutiable Commodities (Marking and Colouring of Hydrocarbon Oils) Regulations'"},{"zh-TW":"柴油燃料與空氣接觸，產生氧化作用而呈現微紅色。","zh-CN":"柴油燃料与空气接觸，產生氧化作用而呈現微紅色。","en":"The diesel fuel comes into contact with air and produces a reddish colour due to oxidation"},{"zh-TW":"柴油燃料與空氣中的水份接觸，產生化學作用而呈現微紅色。","zh-CN":"柴油燃料与空气中的水份接觸，產生化學作用而呈現微紅色。","en":"The diesel fuel comes into contact with moisture in the air and produces a reddish colour due to a chemical reaction"},{"zh-TW":"這是人為加進去的顏色，用作區分燃料油的品質及分級，微紅色標示該油料為 “超低硫柴油 (ULSD)”。","zh-CN":"这是人为加進去的颜色，用作區分燃料油的品质及分级，微紅色標示该油料为 “超低硫柴油 (ULSD)”。","en":"The colour is artificially added to distinguish the quality and grade of fuel oil; a reddish colour indicates the fuel is 'Ultra Low Sulphur Diesel (ULSD)'"}],"a":0,"exp":{"zh-TW":"柴油呈現微紅色是根據《應課稅品（碳氫油的標記及染色）規例》加染色物質進入柴油燃料（A）。政府添加染色劑以區分已繳稅的柴油和未繳稅的燃油，使當局能夠偵測非法使用未繳稅燃油的行為。這是法規要求，與燃料品質分級無關。","zh-CN":"柴油呈微红色是根据《应课税品（碳氢油的标记及染色）规例》添加了染色物质（A）。政府添加染色剂以区分已缴税的柴油和未缴税的燃油，使当局能够检测非法使用未缴税燃油的行为。这是法规要求，与燃料品质分级无关。","en":"Diesel fuel is dyed red in accordance with the 'Dutiable Commodities (Marking and Colouring of Hydrocarbon Oils) Regulations' (A). The dye is added by the government to distinguish duty-paid diesel from untaxed fuel oil, enabling authorities to detect illegal use of untaxed fuel. This is a regulatory requirement, not related to fuel quality grading."},"img":"guide_p187_content.png"},{"id":"P0","ch":"ch6","q":{"zh-CN":"能见度不良是指：","zh-TW":"能見度不良是指：","en":"Poor visibility means"},"o":[{"zh-CN":"雾。","zh-TW":"霧。","en":"Fog."},{"zh-CN":"薄雾。","zh-TW":"薄霧。","en":"Mist."},{"zh-CN":"大雨。","zh-TW":"大雨。","en":"Heavy rain."},{"zh-CN":"以上皆是。","zh-TW":"以上皆是。","en":"All of the above."}],"a":3,"exp":{"zh-CN":"能见度不良包括雾、薄雾和大雨等导致能见度降低的天气状况。","zh-TW":"能見度不良包括霧、薄霧和大雨等導致能見度降低的天氣狀況。","en":"From DBYC HK PVOL quiz Q1"},"img":"guide_p68_content.png"},{"id":"P1","ch":"ch8","q":{"zh-CN":"识别这面旗帜：","zh-TW":"識別這面旗幟：","en":"Identify this flag:"},"o":[{"zh-CN":"我遇险。","zh-TW":"我遇險。","en":"I am in Distress."},{"zh-CN":"我有潜水员在水下。","zh-TW":"我有潛水員在水下。","en":"I have a diver down."},{"zh-CN":"你应立即停船。","zh-TW":"你應立即停船。","en":"You should stop your vessel immediately."},{"zh-CN":"需要援助。","zh-TW":"需要援助。","en":"Require assistance."}],"a":1,"exp":{"zh-CN":"A旗（蓝白旗）表示有潜水员在水下作业，他船应保持远离。","zh-TW":"A旗（藍白旗）表示有潛水員在水下作業，他船應保持遠離。","en":"From DBYC HK PVOL quiz Q3"},"img":"guide_p102_content.png"},{"id":"P2","ch":"ch12","q":{"zh-CN":"以下哪些信号表示遇险？","zh-TW":"以下哪些訊號表示遇險？","en":"Which of these signals indicate distress?"},"o":[{"zh-CN":"红色手持火焰信号。","zh-TW":"紅色手持火焰訊號。","en":"A red hand flare."},{"zh-CN":"红色火箭信号。","zh-TW":"紅色火箭訊號。","en":"Red rocket flare."},{"zh-CN":"红色火焰信号。","zh-TW":"紅色火焰訊號。","en":"Red flare."},{"zh-CN":"以上全部。","zh-TW":"以上全部。","en":"All."}],"a":3,"exp":{"zh-CN":"红色手持火焰、红色火箭和红色火焰信号均属于遇险信号。","zh-TW":"紅色手持火焰、紅色火箭及紅色火焰訊號均屬於遇險訊號。","en":"From DBYC HK PVOL quiz Q4"},"img":"guide_p90_content.png"},{"id":"P3","ch":"ch12","q":{"zh-CN":"以下哪项是遇险信号？","zh-TW":"以下哪項是遇險訊號？","en":"Whis is / or are a distress signal?"},"o":[{"zh-CN":"每隔一分钟发射的红色火箭信号。","zh-TW":"每隔一分鐘發射的紅色火箭訊號。","en":"Red Rockets fired at intervals of one minute."},{"zh-CN":"在身体两侧缓慢上下举起和放下手臂。","zh-TW":"在身體兩側緩慢上下舉起和放下手臂。","en":"Raising and lowering your arms slowly at right angles of your body."},{"zh-CN":"发出橙色烟雾的烟雾信号。","zh-TW":"發出橙色煙霧的煙霧訊號。","en":"Smoke signal giving off orange colored smoke."},{"zh-CN":"以上全部。","zh-TW":"以上全部。","en":"All of the above."}],"a":3,"exp":{"zh-CN":"火箭信号、手臂信号和橙色烟雾信号均属于国际认可的遇险信号。","zh-TW":"火箭訊號、手臂訊號及橙色煙霧訊號均屬於國際認可的遇險訊號。","en":"From DBYC HK PVOL quiz Q5"},"img":"guide_p90_content.png"},{"id":"P4","ch":"ch7","q":{"zh-CN":"你不应该在哪里滑水？","zh-TW":"你不應該在哪裡滑水？","en":"Where should you not ski?"},"o":[{"zh-CN":"该区域没有船只。","zh-TW":"該區域沒有船隻。","en":"No boats in the area."},{"zh-CN":"海滩上没有救生员。","zh-TW":"海灘上沒有救生員。","en":"No lifeguard on the beach."},{"zh-CN":"该区域没有标志物。","zh-TW":"該區域沒有標誌物。","en":"There are no markers in the area."},{"zh-CN":"游泳区浮标内。","zh-TW":"游泳區浮標內。","en":"Swimming area buoys."}],"a":3,"exp":{"zh-CN":"不应在游泳区浮标范围内滑水，因为那里有游泳者，容易发生危险。","zh-TW":"不應在游泳區浮標範圍內滑水，因為那裡有游泳者，容易發生危險。","en":"From DBYC HK PVOL quiz Q6"},"img":"guide_p53_content.png"},{"id":"P5","ch":"ch6","q":{"zh-CN":"在能见度受限的情况下，为了让别人更容易看到你，你应该：","zh-TW":"在能見度受限的情況下，為了讓別人更容易看到你，你應該：","en":"In restricted visibility to make yourself better seen you:"},"o":[{"zh-CN":"悬挂一个黑球。","zh-TW":"懸掛一個黑球。","en":"Hoist a black ball."},{"zh-CN":"悬挂湿帆布或帆。","zh-TW":"懸掛濕帆布或帆。","en":"Hoist wet canvas or sail."},{"zh-CN":"开启号灯。","zh-TW":"開啟號燈。","en":"Switch on navigation lights."},{"zh-CN":"穿上救生衣。","zh-TW":"穿上救生衣。","en":"Put on your life jacket."}],"a":2,"exp":{"zh-CN":"在能见度受限时，应开启号灯以增加自身的可见性。","zh-TW":"在能見度受限時，應開啟號燈以增加自身的可見性。","en":"From DBYC HK PVOL quiz Q7"},"img":"guide_p68_content.png"},{"id":"P6","ch":"ch13","q":{"zh-CN":"有人从你的船上落水，你应该：","zh-TW":"有人從你的船上落水，你應該：","en":"A person fails overboard from your boat. Do you:"},"o":[{"zh-CN":"派最会游泳的人去救援。","zh-TW":"派最會游泳的人去救援。","en":"Send the strongest swimmer to rescue."},{"zh-CN":"让他/她自己游回船旁。","zh-TW":"讓她/他自己游回船旁。","en":"Let her/him swim back to the boat."},{"zh-CN":"抛出救生圈。","zh-TW":"拋出救生圈。","en":"Throw a lifebelt."},{"zh-CN":"派一名游泳者系好连接船的绳索前往救援。","zh-TW":"派一名游泳者繫好連接船的繩索前往救援。","en":"Send a swimmer with a line secured to the boat."}],"a":2,"exp":{"zh-CN":"首要行动是立即抛出救生圈给落水者，以确保其浮在水面。","zh-TW":"首要行動是立即拋出救生圈給落水者，以確保其浮在水面。","en":"From DBYC HK PVOL quiz Q8"},"img":"guide_p82_content.png"},{"id":"P7","ch":"ch8","q":{"zh-CN":"哪种船舶悬挂这面旗帜？","zh-TW":"哪種船舶懸掛這面旗幟？","en":"Which vessel flies this flag?"},"o":[{"zh-CN":"入境事务处。","zh-TW":"入境事務處。","en":"Immigration Department."},{"zh-CN":"引航船。","zh-TW":"引航船。","en":"Pilot vessel."},{"zh-CN":"海事处。","zh-TW":"海事處。","en":"Marine Department."},{"zh-CN":"警察。","zh-TW":"警察。","en":"Police."}],"a":2,"exp":{"zh-CN":"H旗是引航船的标志旗。","zh-TW":"H旗是引航船的標誌旗。","en":"From DBYC HK PVOL quiz Q9"},"img":"guide_p63_content.png"},{"id":"P8","ch":"ch8","q":{"zh-CN":"使用叠标（transit）时，你应该：","zh-TW":"使用疊標（transit）時，你應該：","en":"With a transit do you:"},"o":[{"zh-CN":"测量右侧开口标志的方位。","zh-TW":"測量右側開口標誌的方位。","en":"Take a bearing of the open mark to the right."},{"zh-CN":"测量左侧开口标志的方位。","zh-TW":"測量左側開口標誌的方位。","en":"Take a bearing of the open mark to the left."},{"zh-CN":"保持在叠标的右侧或左侧。","zh-TW":"保持在疊標的右側或左側。","en":"Keep to the right or left of the transit."},{"zh-CN":"在海图上从叠标画一条线，然后用罗经核对比对方位。","zh-TW":"在海圖上從疊標畫一條線，然後用羅經核對比對方位。","en":"Draw a line from the transit on the chart then check and compare the bearing with your compass."}],"a":3,"exp":{"zh-CN":"使用叠标时，应在海图上画线确定叠标方位，然后与罗经读数比对，以确认船位。","zh-TW":"使用疊標時，應在海圖上畫線確定疊標方位，然後與羅經讀數比對，以確認船位。","en":"From DBYC HK PVOL quiz Q10"},"img":"guide_p19_content.png"},{"id":"P9","ch":"ch6","q":{"zh-CN":"在能见度受限的情况下，帆船如何让使用雷达的船舶更容易发现你？","zh-TW":"在能見度受限的情況下，帆船如何讓使用雷達的船舶更容易發現你？","en":"In a sail boat how can you make yourself more visible to vessels using radar in restricted visibility?"},"o":[{"zh-CN":"用海水打湿船帆。","zh-TW":"用海水打濕船帆。","en":"Wet the sails with sea water."},{"zh-CN":"升起一个黑色菱形号型。","zh-TW":"升起一個黑色菱形號型。","en":"Raise a black diamond shape."},{"zh-CN":"升起雷达反射器。","zh-TW":"升起雷達反射器。","en":"Hoist a radar reflector."},{"zh-CN":"使用动力航行。","zh-TW":"使用動力航行。","en":"Proceed under power."}],"a":2,"exp":{"zh-CN":"在能见度受限时，帆船应升起雷达反射器，以便其他使用雷达的船舶更容易探测到。","zh-TW":"在能見度受限時，帆船應升起雷達反射器，以便其他使用雷達的船舶更容易探測到。","en":"From DBYC HK PVOL quiz Q11"},"img":"guide_p66_content.png"},{"id":"P10","ch":"ch8","q":{"zh-CN":"海上事故和意外的主要原因是什么？","zh-TW":"海上事故和意外的主要原因是什麼？","en":"What is the chief cause of accidents & mishaps at sea?"},"o":[{"zh-CN":"未携带足够的燃油。","zh-TW":"未攜帶足夠的燃油。","en":"Not carrying enough fuel."},{"zh-CN":"润滑油不足。","zh-TW":"潤滑油不足。","en":"Not enough lubricating oil."},{"zh-CN":"没有逻辑思考。","zh-TW":"沒有邏輯思考。","en":"Not thinking logically."},{"zh-CN":"没有提前考虑。","zh-TW":"沒有提前考慮。","en":"Not thinking ahead."}],"a":3,"exp":{"zh-CN":"海上事故的主要原因是没有提前做好规划和预判。","zh-TW":"海上事故的主要原因是沒有提前做好規劃和預判。","en":"From DBYC HK PVOL quiz Q12"},"img":"guide_p248_content.png"},{"id":"P11","ch":"ch12","q":{"zh-CN":"遇险信号可以通过什么方式发送？","zh-TW":"遇險訊號可以透過什麼方式發送？","en":"How can distress signals be sent?"},"o":[{"zh-CN":"无线电话。","zh-TW":"無線電話。","en":"Radio telephony."},{"zh-CN":"无线电报。","zh-TW":"無線電報。","en":"Radio telegraph."},{"zh-CN":"VHF无线电。","zh-TW":"VHF無線電。","en":"VHF Radio."},{"zh-CN":"以上三种均可。","zh-TW":"以上三種均可。","en":"All three."}],"a":3,"exp":{"zh-CN":"遇险信号可以通过无线电话、无线电报和VHF无线电发送。","zh-TW":"遇險訊號可透過無線電話、無線電報及VHF無線電發送。","en":"From DBYC HK PVOL quiz Q13"},"img":"guide_p90_content.png"},{"id":"P12","ch":"ch6","q":{"zh-CN":"在雾中建议的停船距离是多少？","zh-TW":"在霧中建議的停船距離是多少？","en":"What is the recommended stopping distance in fog?"},"o":[{"zh-CN":"能见距离的四分之一","zh-TW":"能見距離的四分之一","en":"1/4 visibility distance"},{"zh-CN":"能见距离的二分之一","zh-TW":"能見距離的二分之一","en":"1/2 visibility distance"},{"zh-CN":"能见距离","zh-TW":"能見距離","en":"Visibility distance"},{"zh-CN":"在安全航速范围内，以避免与他船碰撞","zh-TW":"在安全航速範圍內，以避免與他船碰撞","en":"Within a safe speed so as to avoid collision with another vessel"}],"a":3,"exp":{"zh-CN":"在雾中航行时，应以安全航速行驶，确保能够在适当距离内停船以避免碰撞。","zh-TW":"在霧中航行時，應以安全航速行駛，確保能夠在適當距離內停船以避免碰撞。","en":"From DBYC HK PVOL quiz Q14"}},{"id":"P13","ch":"ch12","q":{"zh-CN":"台风避风塘内的最高限速是多少？","zh-TW":"颱風避風塘內的最高限速是多少？","en":"What is the maximum speed in a Typhoon shelter?"},"o":[{"zh-CN":"10节。","zh-TW":"10節。","en":"10 kts."},{"zh-CN":"5节。","zh-TW":"5節。","en":"5 kts."},{"zh-CN":"1节。","zh-TW":"1節。","en":"1 knot."},{"zh-CN":"3节。","zh-TW":"3節。","en":"3 kts."}],"a":1,"exp":{"zh-CN":"台风避风塘内的最高限速为5节。","zh-TW":"颱風避風塘內的最高限速為5節。","en":"From DBYC HK PVOL quiz Q15"},"img":"guide_p45_content.png"},{"id":"P14","ch":"ch6","q":{"zh-CN":"在雾中航行时，你应该：","zh-TW":"在霧中航行時，你應該：","en":"When underway in fog - should you"},"o":[{"zh-CN":"加速行驶。","zh-TW":"加速行駛。","en":"Speed up."},{"zh-CN":"让所有人进入船舱。","zh-TW":"讓所有人進入船艙。","en":"Send everybody down below."},{"zh-CN":"减少船上的噪音。","zh-TW":"減少船上的噪音。","en":"Reduce noise on board."},{"zh-CN":"正常航行。","zh-TW":"正常航行。","en":"Proceed along normally."}],"a":2,"exp":{"zh-CN":"在雾中航行时，应减少船上的噪音，以便能听到雾号和其他声响信号。","zh-TW":"在霧中航行時，應減少船上的噪音，以便能聽到霧號和其他聲響信號。","en":"From DBYC HK PVOL quiz Q16"}},{"id":"P15","ch":"ch13","q":{"zh-CN":"救生衣最好配有：","zh-TW":"救生衣最好配有：","en":"A lifejacket should preferably have:"},"o":[{"zh-CN":"系有一根绳索。","zh-TW":"繫有一根繩索。","en":"A line attached to it."},{"zh-CN":"装有一个哨子。","zh-TW":"裝有一個哨子。","en":"A whistle fitted to it."},{"zh-CN":"标注有船名。","zh-TW":"標註有船名。","en":"The name of the vessel marked on it."},{"zh-CN":"标有合格印章。","zh-TW":"標有合格印章。","en":"Marked with a stamp of approval."}],"a":1,"exp":{"zh-CN":"救生衣最好配有哨子，以便在水中发出信号引起注意。","zh-TW":"救生衣最好配有哨子，以便在水中發出訊號引起注意。","en":"From DBYC HK PVOL quiz Q17"},"img":"guide_p81_content.png"},{"id":"P16","ch":"ch8","q":{"zh-CN":"当与他船存在碰撞危险时，你不应该做什么？","zh-TW":"當與他船存在碰撞危險時，你不應該做什麼？","en":"What should you NOT do when risk of collision exists with another vessel?"},"o":[{"zh-CN":"尽早改变航向。","zh-TW":"儘早改變航向。","en":"Make early alterations of course."},{"zh-CN":"做出较大幅度的明显行动。","zh-TW":"做出較大幅度的明顯行動。","en":"Make longer and obvious movements."},{"zh-CN":"做出微小且不易察觉的航向和航速改变。","zh-TW":"做出微小且不易察覺的航向和航速改變。","en":"Make small indiscernible changes of course and speed."},{"zh-CN":"作为直航船时保持特权。","zh-TW":"作為直航船時保持特權。","en":"Maintain your privilege when 'stand on' vessel."}],"a":2,"exp":{"zh-CN":"存在碰撞危险时，不应做出微小且不易察觉的航向和航速改变，应做出大幅度的明显避让行动。","zh-TW":"存在碰撞危險時，不應做出微小且不易察覺的航向和航速改變，應做出大幅度的明顯避讓行動。","en":"From DBYC HK PVOL quiz Q18"},"img":"guide_p65_content.png"},{"id":"P17","ch":"ch8","q":{"zh-CN":"这些号灯显示在什么类型的船舶上？","zh-TW":"這些號燈顯示在什麼類型的船舶上？","en":"These lights are shown on what kind of vessel?"},"o":[{"zh-CN":"帆船可选号灯。","zh-TW":"帆船可選號燈。","en":"Sailing vessel optional lights."},{"zh-CN":"失控船。","zh-TW":"失控船。","en":"Not under command."},{"zh-CN":"岸上灯光。","zh-TW":"岸上燈光。","en":"Lights ashore."},{"zh-CN":"挖泥船，此侧有危险。","zh-TW":"挖泥船，此側有危險。","en":"Dredger danger on this side."}],"a":1,"exp":{"zh-CN":"两盏环照红灯表示该船为失控船。","zh-TW":"兩盞環照紅燈表示該船為失控船。","en":"From DBYC HK PVOL quiz Q19"},"img":"guide_p66_content.png"},{"id":"P18","ch":"ch7","q":{"zh-CN":"你驾驶一艘快艇在香港维多利亚港内，你应该：","zh-TW":"你駕駛一艘快艇在香港維多利亞港內，你應該：","en":"You are in Victoria Harbour in a fast speed boat do you."},"o":[{"zh-CN":"放置碰垫。","zh-TW":"放置碰墊。","en":"Put on fenders."},{"zh-CN":"检查水下障碍物。","zh-TW":"檢查水下障礙物。","en":"Check for underwater obstructions."},{"zh-CN":"为小舢板减速。","zh-TW":"為小舢板減速。","en":"Reduce speed for small sampans."},{"zh-CN":"查阅最小比例尺海图。","zh-TW":"查閱最小比例尺海圖。","en":"Refer to the smallest scale chart."}],"a":2,"exp":{"zh-CN":"在维多利亚港驾驶快艇时，应注意为小舢板减速，以免产生过大浪涌。","zh-TW":"在維多利亞港駕駛快艇時，應注意為小舢板減速，以免產生過大浪湧。","en":"From DBYC HK PVOL quiz Q20"},"img":"guide_p19_content.png"},{"id":"P19","ch":"ch7","q":{"zh-CN":"最适合抛锚的底质是什么？","zh-TW":"最適合拋錨的底質是什麼？","en":"State the best ground for anchoring."},"o":[{"zh-CN":"R（礁石）","zh-TW":"R（礁石）","en":"R"},{"zh-CN":"St（石质）","zh-TW":"St（石質）","en":"St"},{"zh-CN":"M（泥）","zh-TW":"M（泥）","en":"M"},{"zh-CN":"Wd（杂草）","zh-TW":"Wd（雜草）","en":"Wd"}],"a":2,"exp":{"zh-CN":"泥质底质（M）最适合抛锚，因为锚爪能较好地抓入泥中。","zh-TW":"泥質底質（M）最適合拋錨，因為錨爪能較好地抓入泥中。","en":"From DBYC HK PVOL quiz Q21"},"img":"guide_p40_content.png"},{"id":"P20","ch":"ch12","q":{"zh-CN":"台风即将来临，你的船停泊在系泊浮筒上，你应该做什么？","zh-TW":"颱風即將來臨，你的船停泊在繫泊浮筒上，你應該做什麼？","en":"A typhoon is imminent what should you do to your boat when at a mooring."},"o":[{"zh-CN":"更换电池。","zh-TW":"更換電池。","en":"Change your batteries."},{"zh-CN":"加满油箱。","zh-TW":"加滿油箱。","en":"Top up fuel tanks."},{"zh-CN":"关闭所有开口。","zh-TW":"關閉所有開口。","en":"Close all openings."},{"zh-CN":"放出碰垫。","zh-TW":"放出碰墊。","en":"Put out your fenders."}],"a":2,"exp":{"zh-CN":"台风来临前应关闭船上所有开口，防止进水。","zh-TW":"颱風來臨 ater, what do you do?"},"o":[{"zh-CN":"驶离。","zh-TW":"駛離。","en":"Turn away."},{"zh-CN":"前往查看。","zh-TW":"前往查看。","en":"Go and have a look."},{"zh-CN":"返回出发地。","zh-TW":"返回出發地。","en":"Go back to where you came from."},{"zh-CN":"保持航向和航速。","zh-TW":"保持航向和航速。","en":"Keep course and speed."}],"a":1,"exp":{"zh-CN":"看到有人落水时，应前往查看并提供援助，这是海上义务。","zh-TW":"看到有人落水時，應前往查看並提供援助，這是海上義務。","en":"From DBYC HK PVOL quiz Q26"},"img":"guide_p101_content.png"},{"id":"P25","ch":"ch12","q":{"zh-CN":"船长看到遇险信号后的首要责任是什么？","zh-TW":"船長看到遇險訊號後的首要責任是什麼？","en":"What is the Masters first responsibility when seeing a distress signal?"},"o":[{"zh-CN":"前往调查。","zh-TW":"前往調查。","en":"Investigate."},{"zh-CN":"致电海事处。","zh-TW":"致電海事處。","en":"Call the Marine Department."},{"zh-CN":"报警。","zh-TW":"報警。","en":"Call the Police."},{"zh-CN":"转发消息。","zh-TW":"轉發消息。","en":"Relay the message."}],"a":0,"exp":{"zh-CN":"船长看到遇险信号后的首要责任是前往调查并提供援助。","zh-TW":"船長看到遇險訊號後的首要責任是前往調查並提供援助。","en":"From DBYC HK PVOL quiz Q27"},"img":"guide_p90_content.png"},{"id":"P26","ch":"ch7","q":{"zh-CN":"南方位标志浮标的灯光是什么样的？","zh-TW":"南方界標誌浮標的燈光是什麼樣的？","en":"What are the lights on a South Cardinal marker buoy?"},"o":[{"zh-CN":"连续白色闪光。","zh-TW":"連續白色閃光。","en":"Continuous flashing white."},{"zh-CN":"六短闪白光后接一长闪白光。","zh-TW":"六短閃白光後接一長閃白光。","en":"Six short white flashes followed by one long flash."},{"zh-CN":"两红闪光。","zh-TW":"兩紅閃光。","en":"Two red flashes."},{"zh-CN":"九短闪白光。","zh-TW":"九短閃白光。","en":"Nine short white flashes."}],"a":1,"exp":{"zh-CN":"南方位标志浮标显示六短闪白光后接一长闪白光（快闪加一长闪）。","zh-TW":"南方界標誌浮標顯示六短閃白光後接一長閃白光（快閃加一長閃）。","en":"From DBYC HK PVOL quiz Q28"},"img":"guide_p53_content.png"},{"id":"P27","ch":"ch8","q":{"zh-CN":"除非获得豁免，超过此长度的游艇不得使用公共码头。","zh-TW":"除非獲得豁免，超過此長度的遊艇不得使用公共碼頭。","en":"Unless exempted, a Pleasure Vessel exceeding this length must not use public pier"},"o":[{"zh-CN":"10米","zh-TW":"10米","en":"10 m"},{"zh-CN":"12米","zh-TW":"12米","en":"12 m"},{"zh-CN":"15米","zh-TW":"15米","en":"15 m"},{"zh-CN":"35米","zh-TW":"35米","en":"35 m"}],"a":3,"exp":{"zh-CN "o":[{"zh-CN":"3节。","zh-TW":"3節。","en":"3 kts."},{"zh-CN":"5节。","zh-TW":"5節。","en":"5 kts."},{"zh-CN":"10节。","zh-TW":"10節。","en":"10 kts."},{"zh-CN":"15节。","zh-TW":"15節。","en":"15 kts."}],"a":2,"exp":{"zh-CN":"西部危险品锚地的最高限速为10节。","zh-TW":"西部危險品錨地的最高限速為10節。","en":"From DBYC HK PVOL quiz Q109"},"img":"guide_p45_content.png"},{"id":"P108","ch":"ch8","q":{"zh-CN":"你可以接近昂船洲高潮标记到什么距离？","zh-TW":"你可以接近昂船洲高潮標記到什麼距離？","en":"How close can you go to Stonecutters H.W. mark?"},"o":[{"zh-CN":"20米","zh-TW":"20米","en":"20m"},{"zh-CN":"50米","zh-TW":"50米","en":"50m"},{"zh-CN":"100米","zh-TW":"100米","en":"100m"},{"zh-CN":"150米","zh-TW":"150米","en":"150m"}],"a":3,"exp":{"zh-CN":"不得接近昂船洲高潮标记150米以内。","zh-TW":"不得接近昂船洲高潮標記150米以內。","en":"From DBYC HK PVOL quiz Q110"},"img":"guide_p63_content.png"},{"id":"P109","ch":"ch12","q":{"zh-CN":"这是什么信号？","zh-TW":"這是什麼訊號？","en":"What is this signal?"},"o":[{"zh-CN":"八号风球，西北风。","zh-TW":"八號風球，西北風。","en":"No.8 NW"},{"zh-CN":"八号风球，东北风。","zh-TW":"八號風球，東北風。","en":"No.8 NE"},{"zh-CN":"八号风球，西南风。","zh-TW":"八號風球，西南風。","en":"No.8 SW"},{"zh-CN":"八号风球，东南风。","zh-TW":"八號風球，東南風。","en":"No.8 SE"}],"a":0,"exp":{"zh-CN":"这是八号风球信号，风向来自西北。","zh-TW":"這是八號風球訊號，風向來自西北。","en":"From DBYC HK PVOL quiz Q111"},"img":"guide_p90_content.png"},{"id":"P110","ch":"ch7","q":{"zh-CN":"驶出吐露港时，你看到一个红白竖条纹浮标。你应该：","zh-TW":"駛出吐露港時，你看到一個紅白豎條紋浮標。你應該：","en":"Coming out of Tolo Harbour you sight a red and white vertical striped buoy. Do you"},"o":[{"zh-CN":"从任一侧通过。","zh-TW":"從任一側通過。","en":"Pass it on either side."},{"zh-CN":"向左转向。","zh-TW":"向左轉向。","en":"Alter course to port."},{"zh-CN":"从其左侧通过。","zh-TW":"從其左側通過。","en":"Pass it to port."},{"zh-CN":"从其右侧通过。","zh-TW":"從其右側通過。","en":"Pass it to starboard."}],"a":0,"exp":{"zh-CN":"红白竖条纹浮标是安全水域标志，可以从任一侧通过。","zh-TW":"紅白豎條紋浮標是安全水域標誌，可以從任一側通過。","en":"From DBYC HK PVOL quiz Q112"},"img":"guide_p53_content.png"},{"id":"P111","ch":"ch6","q":{"zh-CN":"你在雾中航行，听到右船首方向传来一声响亮的雾号。你应该：","zh-TW":"你在霧中航行，聽到右船首方向傳來一聲響亮的霧號。你應該：","en":"You are underway in fog and hear a loud whistle on the starboard bow. Do you:"},"o":[{"zh-CN":"减速。","zh-TW":"減速。","en":"Reduce speed."},{"zh-CN":"掉头返回。","zh-TW":"掉頭返回。","en":"Turn around and go back."},{"zh-CN":"向右转向。","zh-TW":"向右轉向。","en":"Turn to starboard."},{"zh-CN":"完全停船。","zh-TW":"完全停船。","en":"Take off all way."}],"a":0,"exp":{"zh-CN":"在雾中听到他船雾号在正前方或正前方附近时，应减速或停船。","zh-TW":"在霧中聽到他船霧號在正前方或正前方附近時，應減速或停船。","en":"From DBYC HK PVOL quiz Q113"},"img":"guide_p68_content.png"},{"id":"P112","ch":"ch6","q":{"zh-CN":"在能见度良好的情况下，你听到右船首方向传来一长声。你应该：","zh-TW":"在能見度良好的情況下，你聽到右船首方向傳來一長聲。你應該：","en":"You hear one prolonged blast on the starboard bow in clear visibility. Do you"},"o":[{"zh-CN":"鸣放两短声并向右转向。","zh-TW":"鳴放兩短聲並向右轉向。","en":"Sound . . and turn to starboard."},{"zh-CN":"鸣放一长声并减速。","zh-TW":"鳴放一長聲並減速。","en":"Sound _ and reduce speed."},{"zh-CN":"鸣放一短声并向左转向。","zh-TW":"鳴放一短聲並向左轉向。","en":"Sound . and turn to port."},{"zh-CN":"保持航向和航速。","zh-TW":"保持航向和航速。","en":"Stand on."}],"a":0,"exp":{"zh-CN":"在能见度良好时，听到一长声表示船舶正在航行驶，应根据避碰规则采取相应行动。","zh-TW":"在能見度良好時，聽到一長聲表示船舶正在航行，應根據避碰規則採取相應行動。","en":"From DBYC HK PVOL quiz Q114"},"img":"guide_p68_content.png"},{"id":"P113","ch":"ch8","q":{"zh-CN":"什么类型的船舶显示这些号灯？","zh-TW":"什麼類型的船舶顯示這些號燈？","en":"What type of vessel shows these lights?"},"o":[{"zh-CN":"推船。","zh-TW":"推船。","en":"A vessel pushing."},{"zh-CN":"挖泥船，右侧为有碍航行的一侧。","zh-TW":"挖泥船，右側為有礙航行的一側。","en":"A dredger foul side to starboard."},{"zh-CN":"挖泥船，左侧为有碍航行的一侧。","zh-TW":"挖泥船，左側為有礙航行的一側。","en":"A dredger foul side to port."},{"zh-CN":"以上皆非。","zh-TW":"以上皆非。","en":"None of the above"}],"a":2,"exp":{"zh-CN":"这些号灯表示挖泥船，其左侧（左舷）为有碍航行的一侧。","zh-TW":"這些號燈表示挖泥船，其左側（左舷）為有礙航行的一側。","en":"From DBYC HK PVOL quiz Q115"},"img":"guide_p63_content.png"},{"id":"P114","ch":"ch12","q":{"zh-CN":"这是什么信号？","zh-TW":"這是什麼訊號？","en":"What is this signal?"},"o":[{"zh-CN":"八号风球，西北风。","zh-TW":"八號風球，西北風。","en":"No.8 NW"},{"zh-CN":"三号强风信号，22-33节。","zh-TW":"三號強風訊號，22-33節。","en":"No.3 Strong Wind 22-33 kts"},{"zh-CN":"强烈季候风信号，22-35节。","zh-TW":"強烈季候風訊號，22-35節。","en":"Strong Monsoon 22-35 kts"},{"zh-CN":"一号风球。","zh-TW":"一號風球。","en":"No.1"}],"a":2,"exp":{"zh-CN":"这是强烈季候风信号，风速22-35节。","zh-TW":"這是強烈季候風訊號，風速22-35節。","en":"From DBYC HK PVOL quiz Q116"},"img":"guide_p90_content.png"},{"id":"P115","ch":"ch7","q":{"zh-CN":"每分钟闪光100次的白色闪光浮标，你应该从哪一侧通过？","zh-TW":"每分鐘閃光100次的白色閃光浮標，你應該從哪一側通過？","en":"Which side do you pass a buoy flashing white 100 times a minute?"},"o":[{"zh-CN":"你的北侧。","zh-TW":"你的北側。","en":"Your north side."},{"zh-CN":"你的南侧。","zh-TW":"你的南側。","en":"Your South side."},{"zh-CN":"你的海侧。","zh-TW":"你的海側。","en":"Your Seaward side."},{"zh-CN":"任何一侧。","zh-TW":"任何一側。","en":"Either side."}],"a":0,"exp":{"zh-CN":"快速白色闪光（每分钟100次以上）通常是北方位标志浮标，应从其北侧通过。","zh-TW":"快速白色閃光（每分鐘100次以上）通常是北方界標誌浮標，應從其北側通過。","en":"From DBYC HK PVOL quiz Q117"},"img":"guide_p53_content.png"},{"id":"P116","ch":"ch12","q":{"zh-CN":"这是什么信号？","zh-TW":"這是什麼訊號？","en":"What is this signal?"},"o":[{"zh-CN":"八号风球，西北风。","zh-TW":"八號風球，西北風。","en":"No.8 NW"},{"zh-CN":"八号风球，东北风。","zh-TW":"八號風球，東北風。","en":"No.8 NE"},{"zh-CN":"八号风球，西南风。","zh-TW":"八號風球，西南風。","en":"No.8 SW"},{"zh-CN":"八号风球，东南风。","zh-TW":"八號風球，東南風。","en":"No.8 SE"}],"a":2,"exp":{"zh-CN":"这是八号风球信号，风向来自西南。","zh-TW":"這是八號風球訊號，風向來自西南。","en":"From DBYC HK PVOL quiz Q118"},"img":"guide_p90_content.png"},{"id":"P117","ch":"ch12","q":{"zh-CN":"这是什么信号？","zh-TW":"這是什麼訊號？","en":"What is this signal?"},"o":[{"zh-CN":"八号风球，西北风。","zh-TW":"八號風球，西北風。","en":"No.8 NW"},{"zh-CN":"八号风球，东北风。","zh-TW":"八號風球，東北風。","en":"No.8 NE"},{"zh-CN":"八号风球，西南风。","zh-TW":"八號風球，西南風。","en":"No.8 SW"},{"zh-CN":"八号风球，东南风。","zh-TW":"八號風球，東南風。","en":"No.8 SE"}],"a":3,"exp":{"zh-CN":"这是八号风球信号，风向来自东南。","zh-TW":"這是八號風球訊號，風向來自東南。","en":"From DBYC HK PVOL quiz Q119"},"img":"guide_p90_content.png"},{"id":"P118","ch":"ch6","q":{"zh-CN":"在雾中，一艘被拖带但未在前进的机动船应发出什么声响？","zh-TW":"在霧中，一艘被拖帶但未在前進的機動船應發出什麼聲響？","en":"In Fog a vessel towing under power but making no way should sound?"},"o":[{"zh-CN":"每两分钟一长声。","zh-TW":"每兩分鐘一長聲。","en":"One long blast every two minutes."},{"zh-CN":"每两分钟两长声。","zh-TW":"每兩分鐘兩長聲。","en":"Two long blasts every two minutes."},{"zh-CN":"每两分钟一长一短声。","zh-TW":"每兩分鐘一長一短聲。","en":"One long and short blast every two minutes."},{"zh-CN":"每一分钟一长三短声。","zh-TW":"每一分鐘一長三短聲。","en":"One long and three short every one minute."}],"a":1,"exp":{"zh-CN":"在能见度受限时，被拖带的船舶应鸣放两长声，间隔不超过两分钟。","zh-TW":"在能見度受限時，被拖帶的船舶應鳴放兩長聲，間隔不超過兩分鐘。","en":"From DBYC HK PVOL quiz Q120"}},{"id":"N2_1","ch":"ch2","q":{"zh-CN":"选择锚地时，以下哪个因素最重要？","zh-TW":"選擇錨地時，以下哪個因素最重要？","en":"When selecting an anchorage, which factor is most important?"},"o":[{"zh-CN":"水底为软泥或泥沙，抓着力强","zh-TW":"水底為軟泥或泥沙，抓著力強","en":"Soft mud or sand seabed with strong holding power"},{"zh-CN":"水底为岩石，较为平坦","zh-TW":"水底為岩石，較為平坦","en":"Rocky but flat seabed"},{"zh-CN":"附近有很多船只","zh-TW":"附近有很多船隻","en":"Many vessels nearby"},{"zh-CN":"水深越浅越好","zh-TW":"水深越淺越好","en":"The shallower the better"}],"a":0,"exp":{"zh-CN":"选择锚地应选抓着力强的海床（如软泥、泥沙），水深适宜，不受强风急流影响。","zh-TW":"選擇錨地應選抓著力強的海床（如軟泥、泥沙），水深適宜，不受強風急流影響。","en":"Choose anchorage with strong holding seabed (soft mud/sand), appropriate depth, sheltered from wind/current."}},{"id":"N2_2","ch":"ch2","q":{"zh-CN":"锚泊时，锚链长度应至少为水深的多少倍？","zh-TW":"錨泊時，錨鏈長度應至少為水深的多少倍？","en":"When anchoring, the anchor chain length should be at least how many times the water depth?"},"o":[{"zh-CN":"2倍","zh-TW":"2倍","en":"2 times"},{"zh-CN":"4倍或以上","zh-TW":"4倍或以上","en":"4 times or more"},{"zh-CN":"6倍","zh-TW":"6倍","en":"6 times"},{"zh-CN":"1倍","zh-TW":"1倍","en":"1 time"}],"a":1,"exp":{"zh-CN":"锚链长度应为水深的4倍或以上，越长的锚链抓着力越强。","zh-TW":"錨鏈長度應為水深的4倍或以上，越長的錨鏈抓著力越強。","en":"Chain length should be 4x or more of water depth; longer chain = stronger holding."}},{"id":"N2_3","ch":"ch2","q":{"zh-CN":"下锚后应立即做什么？","zh-TW":"下錨後應立即做什麼？","en":"What should be done immediately after anchoring?"},"o":[{"zh-CN":"关闭发动机","zh-TW":"關閉發動機","en":"Shut down the engine"},{"zh-CN":"显示锚泊信号","zh-TW":"顯示錨泊信號","en":"Display anchoring signal"},{"zh-CN":"放下救生艇","zh-TW":"放下救生艇","en":"Lower the lifeboat"},{"zh-CN":"发送VHF广播","zh-TW":"發送VHF廣播","en":"Broadcast on VHF"}],"a":1,"exp":{"zh-CN":"下锚后立即显示锚泊信号：日间悬挂黑球形，夜间悬挂白色环照灯。","zh-TW":"下錨後立即顯示錨泊信號：日間懸掛黑球形，夜間懸掛白色環照燈。","en":"Display anchoring signal immediately: black ball by day, white all-round light by night."},"img":"guide_p90_content.png"},{"id":"N2_4","ch":"ch2","q":{"zh-CN":"小型船只切勿从哪里下锚？","zh-TW":"小型船隻切勿從哪裡下錨？","en":"Small vessels should never anchor from which part?"},"o":[{"zh-CN":"船头","zh-TW":"船頭","en":"Bow"},{"zh-CN":"船尾","zh-TW":"船尾","en":"Stern"},{"zh-CN":"左舷","zh-TW":"左舷","en":"Port side"},{"zh-CN":"右舷","zh-TW":"右舷","en":"Starboard side"}],"a":1,"exp":{"zh-CN":"小型船只切勿从船尾下锚，因为主机和重装备在船尾，船尾干舷较小，遇风浪时船尾较易入水，降低船只稳性。","zh-TW":"小型船隻切勿從船尾下錨，因為主機和重裝備在船尾，船尾乾舷較小，遇風浪時船尾較易入水，降低船隻穩性。","en":"Never anchor from stern — engine/heavy equipment at stern reduces freeboard and stability."}},{"id":"N2_5","ch":"ch2","q":{"zh-CN":"发现船只正在爬锚时，首先应采取什么行动？","zh-TW":"發現船隻正在爬錨時，首先應採取什麼行動？","en":"When dragging anchor is detected, what is the first action?"},"o":[{"zh-CN":"立即启航离开","zh-TW":"立即啟航離開","en":"Leave immediately"},{"zh-CN":"放出更长的锚链增强抓着力","zh-TW":"放出更長的錨鏈增強抓著力","en":"Pay out more chain to increase holding"},{"zh-CN":"收起锚链重新下锚","zh-TW":"收起錨鏈重新下錨","en":"Haul in chain and re-anchor"},{"zh-CN":"发出求救信号","zh-TW":"發出求救信號","en":"Send distress signal"}],"a":1,"exp":{"zh-CN":"如有足够空间，首先放出更长的锚链增强抓着力。如爬锚严重，则启动引擎控制船只。","zh-TW":"如有足夠空間，首先放出更長的錨鏈增強抓著力。如爬錨嚴重，則啟動引擎控制船隻。","en":"First, pay out more chain if space allows. If dragging is severe, start engine to control vessel."},"img":"guide_p90_content.png"},{"id":"N2_6","ch":"ch2","q":{"zh-CN":"船锚被水底物缠绕无法收回时，应如何处理？","zh-TW":"船錨被水底物纏繞無法收回時，應如何處理？","en":"When the anchor is fouled and cannot be recovered, what should you do?"},"o":[{"zh-CN":"用引擎全速拉起","zh-TW":"用引擎全速拉起","en":"Pull it up at full engine power"},{"zh-CN":"放弃锚，先拆开锚链，缚上浮标标记位置，通知海事处","zh-TW":"放棄錨，先拆開錨鏈，縛上浮標標記位置，通知海事處","en":"Abandon anchor, disconnect chain, attach buoy to mark position, notify Marine Dept"},{"zh-CN":"直接剪断锚链","zh-TW":"直接剪斷錨鏈","en":"Cut the chain directly"},{"zh-CN":"潜水解开缠绕","zh-TW":"潛水解開纏繞","en":"Dive to untangle it"}],"a":1,"exp":{"zh-CN":"应先收緊锚链，用船舵和前车环绕锚盘旋转尝试从不同方向绞起。如不成功，拆开锚链，缚上浮标标记位置，通知海事处并安排打捞。","zh-TW":"應先收緊錨鏈，用船舵和前車環繞錨盤旋轉嘗試從不同方向絞起。如不成功，拆開錨鏈，縛上浮標標記位置，通知海事處並安排打撈。","en":"Try to free it by maneuvering around it. If unsuccessful, disconnect chain, attach buoy, notify Marine Dept."},"img":"guide_p53_content.png"},{"id":"N3_1","ch":"ch3","q":{"zh-CN":"出航前，以下哪项不是必须检查的项目？","zh-TW":"出航前，以下哪項不是必須檢查的項目？","en":"Before departure, which of the following is NOT a required check?"},"o":[{"zh-CN":"燃油和淡水是否充足","zh-TW":"燃油和淡水是否充足","en":"Sufficient fuel and freshwater"},{"zh-CN":"船上娱乐设备是否齐全","zh-TW":"船上娛樂設備是否齊全","en":"Entertainment equipment is complete"},{"zh-CN":"安全设备是否在位且状态良好","zh-TW":"安全設備是否在位且狀態良好","en":"Safety equipment is in place and good condition"},{"zh-CN":"船底塞是否已装好","zh-TW":"船底塞是否已裝好","en":"Drain plug is installed"}],"a":1,"exp":{"zh-CN":"出航前应检查燃油、淡水、安全设备、船底塞、发动机、通讯设备等，娱乐设备不是必检项。","zh-TW":"出航前應檢查燃油、淡水、安全設備、船底塞、發動機、通訊設備等，娛樂設備不是必檢項。","en":"Pre-departure checks include fuel, water, safety gear, drain plug, engine, comms — not entertainment."}},{"id":"N3_2","ch":"ch3","q":{"zh-CN":"出航前应检查船底塞（drain plug）的什么状态？","zh-TW":"出航前應檢查船底塞（drain plug）的什麼狀態？","en":"What should you check about the drain plug before departure?"},"o":[{"zh-CN":"是否已拆除以便排水","zh-TW":"是否已拆除以便排水","en":"Whether it has been removed for drainage"},{"zh-CN":"是否已装好并拧紧","zh-TW":"是否已裝好並擰緊","en":"Whether it is installed and tightened"},{"zh-CN":"是否涂了润滑油","zh-TW":"是否塗了潤滑油","en":"Whether it is lubricated"},{"zh-CN":"是否是原厂配件","zh-TW":"是否是原廠配件","en":"Whether it is an original part"}],"a":1,"exp":{"zh-CN":"出航前必须确认船底塞已装好并拧紧，否则海水会从排水孔涌入船舱。","zh-TW":"出航前必須確認船底塞已裝好並擰緊，否則海水會從排水孔湧入船艙。","en":"Drain plug must be installed and tightened before departure to prevent water ingress."},"img":"guide_p248_content.png"},{"id":"N3_3","ch":"ch3","q":{"zh-CN":"出航前检查发动机时，以下哪项是必须的？","zh-TW":"出航前檢查發動機時，以下哪項是必須的？","en":"When checking the engine before departure, which is required?"},"o":[{"zh-CN":"检查机油液位和冷却水液位","zh-TW":"檢查機油液位和冷卻水液位","en":"Check oil level and coolant level"},{"zh-CN":"更换所有滤芯","zh-TW":"更換所有濾芯","en":"Replace all filters"},{"zh-CN":"拆卸检查气缸","zh-TW":"拆卸檢查氣缸","en":"Remove and inspect cylinders"},{"zh-CN":"测试最高速度","zh-TW":"測試最高速度","en":"Test maximum speed"}],"a":0,"exp":{"zh-CN":"出航前应检查机油液位、冷却水液位、电池状态、皮带松紧度等基本项目。","zh-TW":"出航前應檢查機油液位、冷卻水液位、電池狀態、皮帶鬆緊度等基本項目。","en":"Check oil level, coolant level, battery condition, belt tension etc. before departure."},"img":"guide_p150_content.png"},{"id":"N3_4","ch":"ch3","q":{"zh-CN":"止航（回航）后，以下哪项操作是正确的？","zh-TW":"止航（回航）後，以下哪項操作是正確的？","en":"After returning to port, which operation is correct?"},"o":[{"zh-CN":"立即关闭所有电源离开","zh-TW":"立即關閉所有電源離開","en":"Turn off all power and leave immediately"},{"zh-CN":"关闭燃油阀门，检查船只状态，清洗船只","zh-TW":"關閉燃油閥門，檢查船隻狀態，清洗船隻","en":"Close fuel valve, check vessel condition, wash the vessel"},{"zh-CN":"不需要做任何检查","zh-TW":"不需要做任何檢查","en":"No checks needed"},{"zh-CN":"只检查发动机即可","zh-TW":"只檢查發動機即可","en":"Only check the engine"}],"a":1,"exp":{"zh-CN":"止航后应关闭燃油阀门，检查船只有无损坏，清洗船只，为下次出航做好准备。","zh-TW":"止航後應關閉燃油閥門，檢查船隻有無損壞，清洗船隻，為下次出航做好準備。","en":"After return: close fuel valve, inspect for damage, wash vessel, prepare for next trip."},"img":"guide_p150_content.png"},{"id":"N5_1","ch":"ch5","q":{"zh-CN":"什么是大潮（Spring Tide）？","zh-TW":"什麼是大潮（Spring Tide）？","en":"What is a Spring Tide?"},"o":[{"zh-CN":"每月朔或望时期，潮差特别大的潮汐","zh-TW":"每月朔或望時期，潮差特別大的潮汐","en":"Tide with exceptionally large range during new/full moon"},{"zh-CN":"每月上弦或下弦时期，潮差特别小的潮汐","zh-TW":"每月上弦或下弦時期，潮差特別小的潮汐","en":"Tide with small range during first/last quarter moon"},{"zh-CN":"风暴引起的异常高潮","zh-TW":"風暴引起的異常高潮","en":"Abnormally high tide caused by storms"},{"zh-CN":"每天发生的普通潮汐","zh-TW":"每天發生的普通潮汐","en":"Normal daily tide"}],"a":0,"exp":{"zh-CN":"大潮出现在每月朔（新月）或望（满月）时期，太阳和月球引力叠加，潮差特别大。","zh-TW":"大潮出現在每月朔（新月）或望（滿月）時期，太陽和月球引力疊加，潮差特別大。","en":"Spring tide occurs at new/full moon when sun and moon gravitational forces align, creating large tidal range."}},{"id":"N5_2","ch":"ch5","q":{"zh-CN":"什么是小潮（Neap Tide）？","zh-TW":"什麼是小潮（Neap Tide）？","en":"What is a Neap Tide?"},"o":[{"zh-CN":"每月朔或望时期的潮汐","zh-TW":"每月朔或望時期的潮汐","en":"Tide during new/full moon"},{"zh-CN":"每月上弦或下弦时期，潮差特别小的潮汐","zh-TW":"每月上弦或下弦時期，潮差特別小的潮汐","en":"Tide with exceptionally small range during first/last quarter moon"},{"zh-CN":"退潮时的潮汐","zh-TW":"退潮時的潮汐","en":"Tide during ebb"},{"zh-CN":"涨潮时的潮汐","zh-TW":"漲潮時的潮汐","en":"Tide during flood"}],"a":1,"exp":{"zh-CN":"小潮出现在每月上弦或下弦时期，太阳和月球引力相互抵消，潮差特别小。","zh-TW":"小潮出現在每月上弦或下弦時期，太陽和月球引力相互抵消，潮差特別小。","en":"Neap tide occurs at first/last quarter moon when sun and moon forces partially cancel, creating small tidal range."}},{"id":"N5_3","ch":"ch5","q":{"zh-CN":"涨潮是指什么？","zh-TW":"漲潮是指什麼？","en":"What is flood tide?"},"o":[{"zh-CN":"潮水退至最低时的高度","zh-TW":"潮水退至最低時的高度","en":"Height when tide recedes to lowest"},{"zh-CN":"潮水上涨至最高时的高度","zh-TW":"潮水上漲至最高時的高度","en":"Height when tide rises to highest"},{"zh-CN":"潮水流动最快的时候","zh-TW":"潮水流動最快的時候","en":"When tidal current is fastest"},{"zh-CN":"风浪最大的时候","zh-TW":"風浪最大的時候","en":"When waves are largest"}],"a":1,"exp":{"zh-CN":"涨潮是潮水上涨至最高时的高度，退潮是潮水退至最低时的高度。","zh-TW":"漲潮是潮水上漲至最高時的高度，退潮是潮水退至最低時的高度。","en":"Flood tide = tide rises to highest level. Ebb tide = tide recedes to lowest level."}},{"id":"N5_4","ch":"ch5","q":{"zh-CN":"香港潮汐表列出了多少个地点的潮汐预测？","zh-TW":"香港潮汐表列出了多少個地點的潮汐預測？","en":"How many locations does the Hong Kong tide table list predictions for?"},"o":[{"zh-CN":"5个","zh-TW":"5個","en":"5"},{"zh-CN":"8个","zh-TW":"8個","en":"8"},{"zh-CN":"11个","zh-TW":"11個","en":"11"},{"zh-CN":"15个","zh-TW":"15個","en":"15"}],"a":2,"exp":{"zh-CN":"香港天文台印制的潮汐表列出香港水域内共11处地点的潮汐预测。","zh-TW":"香港天文台印製的潮汐表列出香港水域內共11處地點的潮汐預測。","en":"The HK Observatory tide table lists predictions for 11 locations in HK waters."}},{"id":"N5_5","ch":"ch5","q":{"zh-CN":"使用海图时，海图上标注的水深与潮汐有什么关系？","zh-TW":"使用海圖時，海圖上標註的水深與潮汐有什麼關係？","en":"What is the relationship between charted depths and tides?"},"o":[{"zh-CN":"海图水深是固定不变的","zh-TW":"海圖水深是固定不變的","en":"Charted depths are fixed and unchanging"},{"zh-CN":"实际水深 = 海图水深 + 潮高","zh-TW":"實際水深 = 海圖水深 + 潮高","en":"Actual depth = charted depth + tide height"},{"zh-CN":"实际水深 = 海图水深 - 潮高","zh-TW":"實際水深 = 海圖水深 - 潮高","en":"Actual depth = charted depth - tide height"},{"zh-CN":"潮汐不影响水深","zh-TW":"潮汐不影響水深","en":"Tides do not affect water depth"}],"a":1,"exp":{"zh-CN":"实际水深等于海图基准面水深加上当时的潮高。航行时需考虑潮汐对水深的影响。","zh-TW":"實際水深等於海圖基準面水深加上當時的潮高。航行時需考慮潮汐對水深的影響。","en":"Actual depth = charted depth (above datum) + current tide height. Always consider tidal effect on depth."},"img":"guide_p19_content.png"},{"id":"N10_1","ch":"ch10","q":{"zh-CN":"海事处的VHF呼叫信号是什么？","zh-TW":"海事處的VHF呼叫信號是什麼？","en":"What is the Marine Department's VHF call sign?"},"o":[{"zh-CN":"MAYDAY","zh-TW":"MAYDAY","en":"MAYDAY"},{"zh-CN":"MARDEP","zh-TW":"MARDEP","en":"MARDEP"},{"zh-CN":"COASTGUARD","zh-TW":"COASTGUARD","en":"COASTGUARD"},{"zh-CN":"HARBOUR","zh-TW":"HARBOUR","en":"HARBOUR"}],"a":1,"exp":{"zh-CN":"海事处的呼叫信号是「MARDEP」或「MARDEP, HONG KONG」。","zh-TW":"海事處的呼叫信號是「MARDEP」或「MARDEP, HONG KONG」。","en":"Marine Dept call sign is 'MARDEP' or 'MARDEP, HONG KONG'."},"img":"guide_p90_content.png"},{"id":"N10_2","ch":"ch10","q":{"zh-CN":"VHF 16频道的用途是什么？","zh-TW":"VHF 16頻道的用途是什麼？","en":"What is VHF Channel 16 used for?"},"o":[{"zh-CN":"播放天气预报","zh-TW":"播放天氣預報","en":"Broadcasting weather forecasts"},{"zh-CN":"国际遇险和安全通信","zh-TW":"國際遇險和安全通信","en":"International distress and safety communications"},{"zh-CN":"日常港口通讯","zh-TW":"日常港口通訊","en":"Routine port communications"},{"zh-CN":"娱乐用途","zh-TW":"娛樂用途","en":"Entertainment purposes"}],"a":1,"exp":{"zh-CN":"VHF 16频道是国际遇险和安全通信频道，用于发送遇险信号和紧急通信。","zh-TW":"VHF 16頻道是國際遇險和安全通信頻道，用於發送遇險信號和緊急通信。","en":"VHF Ch 16 is for international distress and safety communications."},"img":"guide_p92_content.png"},{"id":"N10_3","ch":"ch10","q":{"zh-CN":"在香港水域，船只应使用哪个VHF频道向VTS报告西进区航道的情况？","zh-TW":"在香港水域，船隻應使用哪個VHF頻道向VTS報告西進區航道的情況？","en":"In HK waters, which VHF channel should be used to report to VTS in the Western Fairway?"},"o":[{"zh-CN":"频道16","zh-TW":"頻道16","en":"Channel 16"},{"zh-CN":"频道67","zh-TW":"頻道67","en":"Channel 67"},{"zh-CN":"频道12","zh-TW":"頻道12","en":"Channel 12"},{"zh-CN":"频道14","zh-TW":"頻道14","en":"Channel 14"}],"a":1,"exp":{"zh-CN":"VHF 67频道用于西进区航道（Western Approaches），12频道用于东进区航道，14频道用于海港。","zh-TW":"VHF 67頻道用於西進區航道（Western Approaches），12頻道用於東進區航道，14頻道用於海港。","en":"VHF Ch 67 = Western Approaches, Ch 12 = Eastern Approaches, Ch 14 = Harbour."},"img":"guide_p44_content.png"},{"id":"N10_4","ch":"ch10","q":{"zh-CN":"VHF 20频道的用途是什么？","zh-TW":"VHF 20頻道的用途是什麼？","en":"What is VHF Channel 20 used for?"},"o":[{"zh-CN":"遇险通信","zh-TW":"遇險通信","en":"Distress communications"},{"zh-CN":"航行安全通告","zh-TW":"航行安全通告","en":"Navigational safety announcements"},{"zh-CN":"天气预报","zh-TW":"天氣預報","en":"Weather forecasts"},{"zh-CN":"私人通话","zh-TW":"私人通話","en":"Private calls"}],"a":1,"exp":{"zh-CN":"VHF 20频道用于发布航行安全通告，包括海事工程、助航标移位、能见度情况等。","zh-TW":"VHF 20頻道用於發布航行安全通告，包括海事工程、助航標移位、能見度情況等。","en":"VHF Ch 20 is for navigational safety announcements including marine works, aids to navigation, visibility info."},"img":"guide_p92_content.png"},{"id":"N10_5","ch":"ch10","q":{"zh-CN":"船只遇险时使用VHF发送遇险信号，收到信号的其他船只应如何做？","zh-TW":"船隻遇險時使用VHF發送遇險信號，收到信號的其他船隻應如何做？","en":"When a vessel sends a distress signal via VHF, what should other vessels receiving it do?"},"o":[{"zh-CN":"忽略它，因为不是自己的事","zh-TW":"忽略它，因為不是自己的事","en":"Ignore it, as it's not their concern"},{"zh-CN":"在安全可行的情况下立即赶往提供援助","zh-TW":"在安全可行的情況下立即趕往提供援助","en":"Proceed to assist immediately if safe and practicable"},{"zh-CN":"只记录但不行动","zh-TW":"只記錄但不行動","en":"Only record but take no action"},{"zh-CN":"改用其他频道避免干扰","zh-TW":"改用其他頻道避免干擾","en":"Switch to another channel to avoid interference"}],"a":1,"exp":{"zh-CN":"任何船只收到遇险信号，在安全可行的情况下应立即赶往提供援助。如不能前往，应记录并转告海事处。","zh-TW":"任何船隻收到遇險信號，在安全可行的情況下應立即趕往提供援助。如不能前往，應記錄並轉告海事處。","en":"Any vessel receiving distress signal should proceed to assist if safe. If unable, record details and forward to Marine Dept."},"img":"guide_p90_content.png"},{"id":"N10_6","ch":"ch10","q":{"zh-CN":"VHF 74频道用于哪里？","zh-TW":"VHF 74頻道用於哪裡？","en":"What is VHF Channel 74 used for?"},"o":[{"zh-CN":"海港东","zh-TW":"海港東","en":"Harbour East"},{"zh-CN":"大屿南","zh-TW":"大嶼南","en":"South Lantau"},{"zh-CN":"葵涌控制站","zh-TW":"葵涌控制站","en":"Kwai Chung Control Station"},{"zh-CN":"东进区航道","zh-TW":"東進區航道","en":"Eastern Approaches"}],"a":2,"exp":{"zh-CN":"VHF频道分配：02=海港东，12=东进区航道，14=海港，16=国际遇险，20=航行安全通告，63=大屿南，67=西进区航道，74=葵涌控制站。","zh-TW":"VHF頻道分配：02=海港東，12=東進區航道，14=海港，16=國際遇險，20=航行安全通告，63=大嶼南，67=西進區航道，74=葵涌控制站。","en":"VHF channels: 02=Harbour E, 12=Eastern Approaches, 14=Harbour, 16=Distress, 20=Safety, 63=S.Lantau, 67=W.Approaches, 74=Kwai Chung."},"img":"guide_p44_content.png"},{"id":"N22_1","ch":"ch22","q":{"zh-CN":"船只的含油舱底污水应如何处理？","zh-TW":"船隻的含油艙底污水應如何處理？","en":"How should oily bilge water be handled?"},"o":[{"zh-CN":"直接排入海中","zh-TW":"直接排入海中","en":"Discharge directly into the sea"},{"zh-CN":"泵送到污油舱储存，带回码头作化学废物处理","zh-TW":"泵送到污油艙儲存，帶回碼頭作化學廢物處理","en":"Pump to oily water tank, bring back to shore for chemical waste disposal"},{"zh-CN":"用清水稀释后排出","zh-TW":"用清水稀釋後排出","en":"Dilute with fresh water then discharge"},{"zh-CN":"蒸发处理","zh-TW":"蒸發處理","en":"Let it evaporate"}],"a":1,"exp":{"zh-CN":"除危急情况外，舱底水不可直接排出海。应将含油舱底污水泵送到污油舱储存，带回码头作化学废物处理。","zh-TW":"除危急情況外，艙底水不可直接排出海。應將含油艙底污水泵送到污油艙儲存，帶回碼頭作化學廢物處理。","en":"Bilge water must not be discharged to sea. Pump to oily water tank and bring ashore for disposal."},"img":"guide_p46_content.png"},{"id":"N22_2","ch":"ch22","q":{"zh-CN":"加油时发现燃油意外倾泻，应如何处理？","zh-TW":"加油時發現燃油意外傾瀉，應如何處理？","en":"If fuel is accidentally spilled during bunkering, what should you do?"},"o":[{"zh-CN":"用水冲洗入海","zh-TW":"用水沖洗入海","en":"Wash it into the sea with water"},{"zh-CN":"用抹布吸干，放入密封容器，带回码头作化学废物处理","zh-TW":"用抹布吸乾，放入密封容器，帶回碼頭作化學廢物處理","en":"Absorb with rags, place in sealed container, bring back to shore for chemical waste disposal"},{"zh-CN":"让它自然挥发","zh-TW":"讓它自然揮發","en":"Let it evaporate naturally"},{"zh-CN":"用沙覆盖","zh-TW":"用沙覆蓋","en":"Cover it with sand"}],"a":1,"exp":{"zh-CN":"加油时如意外倾泻燃料，须用抹布吸干，放入密封容器，并带回码头作化学废物处理。","zh-TW":"加油時如意外傾瀉燃料，須用抹布吸乾，放入密封容器，並帶回碼頭作化學廢物處理。","en":"Absorb spilled fuel with rags, place in sealed container, bring ashore for chemical waste processing."},"img":"guide_p46_content.png"},{"id":"N22_3","ch":"ch22","q":{"zh-CN":"使用超低硫柴油的主要好处是什么？","zh-TW":"使用超低硫柴油的主要好處是什麼？","en":"What is the main benefit of using ultra-low sulfur diesel?"},"o":[{"zh-CN":"提高发动机功率","zh-TW":"提高發動機功率","en":"Increase engine power"},{"zh-CN":"减少悬浮粒子和氧化硫排放，保护环境","zh-TW":"減少懸浮粒子和氧化硫排放，保護環境","en":"Reduce particulate and SOx emissions, protect environment"},{"zh-CN":"降低燃油成本","zh-TW":"降低燃油成本","en":"Reduce fuel cost"},{"zh-CN":"延长燃油保质期","zh-TW":"延長燃油保質期","en":"Extend fuel shelf life"}],"a":1,"exp":{"zh-CN":"超低硫柴油含硫量少于0.005%，有助减少悬浮粒子和氧化硫排放，保护环境和减少空气污染。","zh-TW":"超低硫柴油含硫量少於0.005%，有助減少懸浮粒子和氧化硫排放，保護環境和減少空氣污染。","en":"Ultra-low sulfur diesel (<0.005% sulfur) reduces particulate and SOx emissions, protecting the environment."},"img":"guide_p150_content.png"},{"id":"N22_4","ch":"ch22","q":{"zh-CN":"船上产生的垃圾应如何处理？","zh-TW":"船上產生的垃圾應如何處理？","en":"How should garbage generated on board be handled?"},"o":[{"zh-CN":"丢入海中","zh-TW":"丟入海中","en":"Throw into the sea"},{"zh-CN":"带回岸上处理","zh-TW":"帶回岸上處理","en":"Bring back to shore for disposal"},{"zh-CN":"焚烧处理","zh-TW":"焚燒處理","en":"Burn on board"},{"zh-CN":"压缩后丢入海中","zh-TW":"壓縮後丟入海中","en":"Compress then throw into sea"}],"a":1,"exp":{"zh-CN":"应把船上产生的垃圾带回岸上处理，不可丢入海中污染海洋环境。","zh-TW":"應把船上產生的垃圾帶回岸上處理，不可丟入海中污染海洋環境。","en":"All garbage should be brought ashore for disposal — do not throw into sea."},"img":"guide_p268_content.png"},{"id":"N22_5","ch":"ch22","q":{"zh-CN":"柴油中的硫磺会造成什么问题？","zh-TW":"柴油中的硫磺會造成什麼問題？","en":"What problems does sulfur in diesel cause?"},"o":[{"zh-CN":"只影响发动机性能","zh-TW":"只影響發動機性能","en":"Only affects engine performance"},{"zh-CN":"造成空气污染并产生硫化酸损害发动机部件","zh-TW":"造成空氣污染並產生硫化酸損害發動機部件","en":"Causes air pollution and produces sulfuric acid that damages engine parts"},{"zh-CN":"只影响燃油颜色","zh-TW":"只影響燃油顏色","en":"Only affects fuel color"},{"zh-CN":"没有任何影响","zh-TW":"沒有任何影響","en":"No impact at all"}],"a":1,"exp":{"zh-CN":"硫磺燃烧产生氧化硫，造成空气污染。同时与空气中水份结合产生硫化酸，会损害汽缸、活塞环等发动机部件。","zh-TW":"硫磺燃燒產生氧化硫，造成空氣污染。同時與空氣中水份結合產生硫化酸，會損害汽缸、活塞環等發動機部件。","en":"Sulfur produces SOx (air pollution) and sulfuric acid (damages cylinders, piston rings, etc.)."},"img":"guide_p150_content.png"}];

/* ========== STATE ========== */
let lang = localStorage.getItem('pvoc_lang') || 'zh-CN';
let theme = localStorage.getItem('pvoc_theme') || 'light';
let mode = ''; // 'practice', 'examA', 'examB'
let currentQs = [];
let currentIdx = 0;
let answers = {}; // qid -> selected option index
let examTimer = null;
let examTimeLeft = 0;
let wrongIds = JSON.parse(localStorage.getItem('pvoc_wrong') || '[]');
let doneMap = JSON.parse(localStorage.getItem('pvoc_done') || '{}'); // qid -> {correct: bool}

/* ========== HELPERS ========== */
function t(key) { return (UI[lang] || UI['zh-CN'])[key] || key; }
function chName(ch) { return t('chNames')[ch] || ch; }
function qText(q) { return q.q[lang] || q.q['zh-CN'] || q.q['en'] || ''; }
function oText(q, i) { const o = q.o[i]; return o ? (o[lang] || o['zh-CN'] || o['en'] || '') : ''; }
function expText(q) { return q.exp[lang] || q.exp['zh-CN'] || q.exp['en'] || ''; }
function letter(i) { return ['A','B','C','D'][i]; }

function saveState() {
  localStorage.setItem('pvoc_lang', lang);
  localStorage.setItem('pvoc_theme', theme);
  localStorage.setItem('pvoc_wrong', JSON.stringify(wrongIds));
  localStorage.setItem('pvoc_done', JSON.stringify(doneMap));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ========== THEME ========== */
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveState();
}

/* ========== LANGUAGE ========== */
function setLang(l) {
  lang = l;
  document.documentElement.lang = l === 'zh-CN' ? 'zh-CN' : l === 'zh-TW' ? 'zh-TW' : 'en';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  saveState();
  updateUI();
  // Re-render current page
  const activePage = document.querySelector('.page.active');
  if (activePage) {
    if (activePage.id === 'menuPage') showMenu();
    else if (activePage.id === 'chapterPage') showChapters();
    else if (activePage.id === 'questionPage') renderQuestion();
    else if (activePage.id === 'resultPage') renderResult();
    else if (activePage.id === 'wrongPage') showWrong();
    else if (activePage.id === 'infoPage') showInfo();
  }
}

function updateUI() {
  document.getElementById('pageTitle').textContent = t('title');
  document.getElementById('tPractice').textContent = t('practice');
  document.getElementById('tPracticeD').textContent = t('practiceD');
  document.getElementById('tExamA').textContent = t('examA');
  document.getElementById('tExamAD').textContent = t('examAD');
  document.getElementById('tExamB').textContent = t('examB');
  document.getElementById('tExamBD').textContent = t('examBD');
  document.getElementById('tInfo').textContent = t('info');
  document.getElementById('tInfoD').textContent = t('infoD');
  document.getElementById('tWrong').textContent = t('wrong');
  document.getElementById('tWrongD').textContent = t('wrongD');
  document.getElementById('tChTitle').textContent = t('chTitle');
  document.getElementById('tBack1').textContent = t('back');
  document.getElementById('tBack2').textContent = t('back');
  document.getElementById('tBack3').textContent = t('back');
  document.getElementById('btnPrev').textContent = t('prev');
  document.getElementById('btnNext').textContent = t('next');
  document.getElementById('expLabel').textContent = t('expLabel');
  document.getElementById('tReview').textContent = t('review');
  document.getElementById('tWrongTitle').textContent = t('wrongTitle');
  updateStats();
}

function updateStats() {
  const total = ALL_Q.length;
  const done = Object.keys(doneMap).length;
  const correct = Object.values(doneMap).filter(d => d.correct).length;
  document.getElementById('statsBar').innerHTML =
    `<span>${t('totalQ')}: ${total}</span><span>${t('doneQ')}: ${done}</span><span>${t('correctQ')}: ${correct}</span>`;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

/* ========== NAVIGATION ========== */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showMenu() {
  stopTimer();
  mode = '';
  currentQs = [];
  currentIdx = 0;
  answers = {};
  showPage('menuPage');
  updateUI();
}

/* ========== CHAPTERS ========== */
function startPractice() {
  mode = 'practice';
  answers = {};
  showChapters();
}

function showChapters() {
  showPage('chapterPage');
  const isPartA = true; // show all chapters
  const chMap = {};
  ALL_Q.forEach(q => {
    if (!chMap[q.ch]) chMap[q.ch] = {total: 0, done: 0, correct: 0};
    chMap[q.ch].total++;
    if (doneMap[q.id]) {
      chMap[q.ch].done++;
      if (doneMap[q.ch]) chMap[q.ch].correct++;
    }
  });
  const chOrder = ['ch1','ch2','ch3','ch4','ch5','ch6','ch7','ch8','ch9','ch10','ch11','ch12','ch13',
                    'ch14','ch15','ch16','ch17','ch18','ch19','ch20','ch21','ch22'];
  let html = `<div class="ch-card" onclick="startChapter('all')" style="border-color:var(--warn)">
    <div><div class="ch-name">${lang==='en'?'All Chapters':'全部章节'}</div>
    <div class="ch-desc">${lang==='en'?`${ALL_Q.length} questions`:`${ALL_Q.length} 题`}</div></div>
    <div class="ch-count">${ALL_Q.length}</div></div>`;

  // Part A section
  html += `<div style="margin-top:12px;font-size:13px;font-weight:700;color:var(--danger)">${t('partA')}</div>`;
  for (const ch of chOrder.slice(0, 13)) {
    if (!chMap[ch]) continue;
    const d = chMap[ch];
    html += `<div class="ch-card" onclick="startChapter('${ch}')">
      <div><div class="ch-name">${chName(ch)}</div>
      <div class="ch-progress">${d.done}/${d.total} ${lang==='en'?'done':'已完成'}</div></div>
      <div class="ch-count">${d.total}</div></div>`;
  }

  // Part B section
  html += `<div style="margin-top:12px;font-size:13px;font-weight:700;color:#8e44ad">${t('partB')}</div>`;
  for (const ch of chOrder.slice(13)) {
    if (!chMap[ch]) continue;
    const d = chMap[ch];
    html += `<div class="ch-card" onclick="startChapter('${ch}')">
      <div><div class="ch-name">${chName(ch)}</div>
      <div class="ch-progress">${d.done}/${d.total} ${lang==='en'?'done':'已完成'}</div></div>
      <div class="ch-count">${d.total}</div></div>`;
  }
  document.getElementById('chapterList').innerHTML = html;
}

function startChapter(ch) {
  currentQs = ch === 'all' ? [...ALL_Q] : ALL_Q.filter(q => q.ch === ch);
  currentIdx = 0;
  answers = {};
  showPage('questionPage');
  renderQuestion();
}

/* ========== EXAM MODE ========== */
function startExamA() {
  mode = 'examA';
  const partA = ALL_Q.filter(q => {
    const cn = parseInt(q.ch.replace('ch',''));
    return cn >= 1 && cn <= 13;
  });
  currentQs = shuffle(partA).slice(0, 40);
  currentIdx = 0;
  answers = {};
  startTimer(45 * 60);
  showPage('questionPage');
  renderQuestion();
}

function startExamB() {
  mode = 'examB';
  const partB = ALL_Q.filter(q => {
    const cn = parseInt(q.ch.replace('ch',''));
    return cn >= 14 && cn <= 22;
  });
  currentQs = shuffle(partB).slice(0, 40);
  currentIdx = 0;
  answers = {};
  startTimer(45 * 60);
  showPage('questionPage');
  renderQuestion();
}

/* ========== TIMER ========== */
function startTimer(seconds) {
  examTimeLeft = seconds;
  updateTimerDisplay();
  document.getElementById('timerBar').classList.add('show');
  examTimer = setInterval(() => {
    examTimeLeft--;
    updateTimerDisplay();
    if (examTimeLeft <= 0) {
      clearInterval(examTimer);
      examTimer = null;
      submitExam();
    }
  }, 1000);
}

function stopTimer() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  document.getElementById('timerBar').classList.remove('show');
}

function updateTimerDisplay() {
  const m = Math.floor(examTimeLeft / 60);
  const s = examTimeLeft % 60;
  const el = document.getElementById('timerDisplay');
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.parentElement.classList.toggle('timer-warn', examTimeLeft <= 300);
}

/* ========== QUESTIONS ========== */
function renderQuestion() {
  if (!currentQs.length) return;
  const q = currentQs[currentIdx];
  document.getElementById('qNum').textContent = currentIdx + 1;
  document.getElementById('qTotal').textContent = currentQs.length;
  document.getElementById('qChapter').textContent = chName(q.ch);
  document.getElementById('qText').textContent = qText(q);

  // Image
  const imgWrap = document.getElementById('qImgWrap');
  if (q.img) {
    document.getElementById('qImg').src = 'images/' + q.img;
    imgWrap.style.display = '';
  } else {
    imgWrap.style.display = 'none';
  }

  // Options
  const answered = answers[q.id] !== undefined;
  const optBox = document.getElementById('optBox');
  let optHtml = '';
  for (let i = 0; i < 4; i++) {
    let cls = 'option';
    // No lock - allow answer changes
    if (answered && answers[q.id] === i) {
      cls += i === q.a ? ' correct' : ' wrong';
    }
    if (answered && i === q.a) cls += ' correct';
    optHtml += `<div class="${cls}" onclick="selectOption(${i})">
      <span class="letter">${letter(i)}</span>
      <span>${oText(q, i)}</span>
    </div>`;
  }
  optBox.innerHTML = optHtml;

  // Explanation
  const expBox = document.getElementById('expBox');
  const exp = expText(q);
  if (answered && exp) {
    document.getElementById('expText').textContent = exp;
    expBox.classList.add('show');
  } else {
    expBox.classList.remove('show');
  }

  // Navigation
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  const isLast = currentIdx === currentQs.length - 1;
  const btnNext = document.getElementById('btnNext');
  if (mode && isLast) {
    btnNext.textContent = t('submit');
    btnNext.onclick = submitExam;
  } else {
    btnNext.textContent = t('next');
    btnNext.onclick = nextQ;
  }
  btnNext.disabled = false;
}

function selectOption(i) {
  const q = currentQs[currentIdx];
  if (answers[q.id] !== undefined) {
    if (answers[q.id] === i) { delete answers[q.id]; delete doneMap[q.id]; renderQuestion(); return; }
    delete doneMap[q.id];
    wrongIds = wrongIds.filter(id => id !== q.id);
  }
  answers[q.id] = i;
  const correct = i === q.a;
  doneMap[q.id] = {correct};
  if (!correct && !wrongIds.includes(q.id)) wrongIds.push(q.id);
  if (correct && wrongIds.includes(q.id)) wrongIds = wrongIds.filter(id => id !== q.id);
  saveState();
  renderQuestion();
}

function prevQ() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
}

function nextQ() {
  if (currentIdx < currentQs.length - 1) { currentIdx++; renderQuestion(); }
}

/* ========== RESULTS ========== */
function submitExam() {
  stopTimer();
  let correct = 0, wrong = 0;
  const wrongQs = [];
  currentQs.forEach(q => {
    const a = answers[q.id];
    if (a !== undefined) {
      if (a === q.a) correct++;
      else { wrong++; wrongQs.push(q); }
    } else { wrong++; wrongQs.push(q); }
  });
  const total = currentQs.length;
  const pct = Math.round(correct / total * 100);
  const pass = pct >= 60;

  document.getElementById('resTitle').textContent = mode === 'examA' ? t('examA') : mode === 'examB' ? t('examB') : t('practice');
  const scoreEl = document.getElementById('resScore');
  scoreEl.textContent = pct + '%';
  scoreEl.className = 'result-score ' + (pass ? 'pass' : 'fail');
  document.getElementById('resBarFill').style.width = pct + '%';
  document.getElementById('resBarFill').style.background = pass ? 'var(--success)' : 'var(--danger)';
  document.getElementById('resMsg').textContent = pass ? t('passMsg') : t('failMsg');
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resWrong').textContent = wrong;

  // Review list
  let revHtml = '';
  wrongQs.forEach((q, idx) => {
    revHtml += `<div class="review-item" onclick="reviewQ('${q.id}')">
      <div class="ri-num">${lang==='en'?'Q':'第'}${idx+1}${lang==='en'?'':'题'} | ${chName(q.ch)}</div>
      <div class="ri-text">${qText(q).substring(0, 80)}...</div>
      <div class="ri-ans" style="color:var(--danger)">${lang==='en'?'Your':'你的'}: ${letter(answers[q.id]||0)} | ${lang==='en'?'Correct':'正确'}: ${letter(q.a)}</div>
    </div>`;
  });
  document.getElementById('reviewList').innerHTML = revHtml || `<div class="empty-msg">${lang==='en'?'All correct!':'全部答对！'}</div>`;

  showPage('resultPage');
  window.scrollTo(0, 0);
}

function reviewQ(qid) {
  const idx = currentQs.findIndex(q => q.id === qid);
  if (idx >= 0) {
    currentIdx = idx;
    showPage('questionPage');
    renderQuestion();
  }
}

function retryWrong() {
  const wq = currentQs.filter(q => wrongIds.includes(q.id));
  if (!wq.length) { showMenu(); return; }
  currentQs = shuffle(wq);
  currentIdx = 0;
  answers = {};
  mode = 'practice';
  showPage('questionPage');
  renderQuestion();
}

/* ========== WRONG ANSWERS PAGE ========== */
function showWrong() {
  showPage('wrongPage');
  document.getElementById('wrongCount').textContent =
    `${lang==='en'?'Total wrong':'错题总数'}: ${wrongIds.length}`;
  let html = '';
  wrongIds.forEach((qid, idx) => {
    const q = ALL_Q.find(x => x.id === qid);
    if (!q) return;
    html += `<div class="review-item" onclick="reviewWrongQ('${qid}')">
      <div class="ri-num">${idx+1} | ${chName(q.ch)}</div>
      <div class="ri-text">${qText(q).substring(0, 80)}...</div>
    </div>`;
  });
  document.getElementById('wrongList').innerHTML = html || `<div class="empty-msg">${t('emptyWrong')}</div>`;
}

function reviewWrongQ(qid) {
  const q = ALL_Q.find(x => x.id === qid);
  if (!q) return;
  mode = 'practice';
  currentQs = [q];
  currentIdx = 0;
  answers = {};
  showPage('questionPage');
  renderQuestion();
}

/* ========== INFO PAGE ========== */
function showInfo() {
  showPage('infoPage');
  document.getElementById('infoContent').innerHTML = t('infoHtml');
}

/* ========== INIT ========== */
function init() {
  applyTheme();
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  updateUI();
  showMenu();
}

init();
</script>
